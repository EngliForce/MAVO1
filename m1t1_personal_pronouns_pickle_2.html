<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-purple-main: #7b2cbf; --hero-purple-dark: #3c096c;
            --hero-yellow: #ffb703; --hero-cyan: #00f5d4;
            --header-bg: #ff7043; --header-border: var(--hero-yellow);
        }
        
        html, body { margin: 0; padding: 0; min-height: 100vh; }
        body { 
            font-family: 'Lexend', sans-serif; 
            background: radial-gradient(circle at center, #1a102a 0%, #05101a 100%); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        header { 
            width: 100%;
            background: var(--header-bg); 
            padding: 2rem 1rem; 
            text-align: center; 
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); 
            border-bottom: 5px solid var(--header-border); 
        }
        h1 { font-family: 'Bangers', cursive; font-size: 3rem; margin: 0; text-shadow: 3px 3px 0px var(--hero-purple-dark); }
        
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; width: 100%; max-width: 600px; }

        .stats { display: flex; gap: 20px; font-family: 'Bangers'; font-size: 1.2rem; color: var(--hero-yellow); margin-bottom: 10px; }

        #game-board { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            margin-top: 10px;
            width: 100%;
        }

        .card { 
            background: var(--hero-purple-main); 
            border: 3px solid var(--hero-cyan);
            border-radius: 12px; 
            height: 80px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-family: 'Lexend'; 
            font-weight: bold;
            font-size: 0.85rem;
            text-align: center;
            transition: 0.3s;
            user-select: none;
            padding: 5px;
        }

        .card:hover { transform: scale(1.05); }

        .flipped { background: white; color: var(--hero-purple-dark); border-color: var(--hero-yellow); }
        .matched { background: var(--hero-cyan); color: var(--hero-purple-dark); border-color: white; cursor: default; }

        .btn-action { 
            background: var(--hero-yellow); color: #000; border: none; padding: 10px 25px; 
            border-radius: 50px; font-family: 'Bangers'; font-size: 1.2rem; cursor: pointer; 
            border-bottom: 5px solid #b58900; transition: 0.2s;
        }
        .btn-action:hover { transform: translateY(-3px); }

        footer { margin-top: auto; padding: 20px; color: rgba(255,255,255,0.5); text-align: center; }
    </style>
</head>
<body>

    <header><h1>MEMORY</h1></header>

    <main>
        <div class="stats">
            <p>⏱️ Time: <span id="timer">0</span>s</p>
            <p>🏆 Best: <span id="best-time">-</span>s</p>
        </div>
        
        <button class="btn-action" onclick="restartGame()">🔄 SHUFFLE & RESTART</button>

        <div id="game-board"></div>
    </main>

    <footer>
        &copy; 2026 EngliForce – Make English your superpower!
    </footer>

    <script>
        const originalPairs = [
            { en: "I", nl: "ik" },
            { en: "you (enkelvoud)", nl: "jij" },
            { en: "he", nl: "hij" },
            { en: "she", nl: "zij (enkelvoud)" },
            { en: "it", nl: "het" },
            { en: "we", nl: "wij" },
            { en: "you (meervoud)", nl: "jullie" },
            { en: "they", nl: "zij (meervoud)" }
        ];

        let cards = [];
        let firstCard = null;
        let lock = false;
        let timerInterval;
        let seconds = 0;

        const board = document.getElementById("game-board");

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function createCards() {
            cards = [];
            originalPairs.forEach(pair => {
                cards.push({ text: pair.en, match: pair.nl });
                cards.push({ text: pair.nl, match: pair.en });
            });
            shuffle(cards);
        }

        function startTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            document.getElementById("timer").textContent = seconds;
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById("timer").textContent = seconds;
            }, 1000);
        }

        function updateBestTime() {
            const bestTime = localStorage.getItem("memory_best_time");
            if (!bestTime || seconds < parseInt(bestTime)) {
                localStorage.setItem("memory_best_time", seconds);
                document.getElementById("best-time").textContent = seconds;
            }
        }

        function loadBestTime() {
            const best = localStorage.getItem("memory_best_time");
            if (best) document.getElementById("best-time").textContent = best;
        }

        function restartGame() {
            board.innerHTML = "";
            createCards();
            firstCard = null;
            lock = false;
            cards.forEach(cardData => {
                const card = document.createElement("div");
                card.className = "card";
                card.dataset.text = cardData.text;
                card.dataset.match = cardData.match;
                card.addEventListener("click", () => {
                    if (lock || card.classList.contains("flipped") || card.classList.contains("matched")) return;
                    
                    card.textContent = card.dataset.text;
                    card.classList.add("flipped");

                    if (!firstCard) {
                        firstCard = card;
                    } else {
                        lock = true;
                        setTimeout(() => {
                            if (firstCard.dataset.text === card.dataset.match || card.dataset.text === firstCard.dataset.match) {
                                firstCard.classList.add("matched");
                                card.classList.add("matched");
                                if (document.querySelectorAll(".matched").length === cards.length) {
                                    clearInterval(timerInterval);
                                    updateBestTime();
                                }
                            } else {
                                firstCard.textContent = "";
                                card.textContent = "";
                                firstCard.classList.remove("flipped");
                                card.classList.remove("flipped");
                            }
                            firstCard = null;
                            lock = false;
                        }, 800);
                    }
                });
                board.appendChild(card);
            });
            startTimer();
        }

        loadBestTime();
        restartGame();
    </script>
</body>
</html>
