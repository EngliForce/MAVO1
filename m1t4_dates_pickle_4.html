<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngliForce Academy: High Stakes Decoder</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-blue-main: #0288d1;
            --hero-blue-dark: #01579b;
            --hero-yellow: #ffb703;
            --hero-cyan: #81d4fa;
            --dark-bg: #0b1a2a;
            --hero-orange: #ff5722;
            --money-green: #4CAF50;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Lexend', sans-serif;
            background: radial-gradient(circle at center, #102a43 0%, #05101a 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--hero-blue-main);
            padding: 1.5rem 1rem;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            border-bottom: 5px solid var(--hero-yellow);
        }

        h1 { font-family: 'Bangers', cursive; font-size: clamp(2rem, 8vw, 3.5rem); margin: 0; text-shadow: 4px 4px 0px var(--hero-blue-dark); }
        
        main { max-width: 800px; margin: 10px auto; padding: 15px; width: 100%; }

        .game-container {
            background: rgba(16, 42, 67, 0.9);
            border: 3px solid var(--hero-cyan);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .hud {
            display: flex; justify-content: space-between; font-family: 'Bangers'; font-size: 1.4rem;
            border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;
        }
        
        .bank-display { color: var(--money-green); }

        .target-box {
            background: #000;
            border: 3px solid var(--hero-orange);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .target-date { font-family: 'Bangers'; font-size: clamp(2rem, 10vw, 3.2rem); color: var(--hero-yellow); }

        input[type="text"] {
            width: 100%; padding: 12px; font-size: 1.1rem;
            border: 3px solid var(--hero-cyan); border-radius: 10px;
            background: #0b1a2a; color: white; text-align: center; margin-bottom: 15px;
        }

        .betting-zone {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px; padding: 10px; margin-bottom: 15px;
        }

        .bet-chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }

        .bet-btn {
            background: var(--dark-bg); color: white; border: 2px solid var(--money-green);
            padding: 10px; border-radius: 50px; font-family: 'Bangers';
            font-size: 1.1rem; cursor: pointer; min-width: 60px; flex: 1;
        }
        
        .bet-btn.active { background: var(--money-green); color: #000; }
        .bet-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-action {
            background: var(--hero-orange); color: white; border: none;
            padding: 12px; border-radius: 50px; font-family: 'Bangers';
            font-size: 1.5rem; cursor: pointer; border-bottom: 4px solid #bf360c; width: 100%;
        }

        .feedback-box {
            margin-top: 15px; padding: 15px; border-radius: 10px; display: none; text-align: left;
        }
        .feedback-correct { border: 2px solid #4CAF50; background: rgba(76,175,80,0.1); color: #81c784; }
        .feedback-wrong { border: 2px solid #F44336; background: rgba(244,67,54,0.1); color: #e57373; }
        
        .rule-hint { color: var(--hero-yellow); font-weight: bold; display: block; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .end-screen { display: none; }
    </style>
</head>
<body>

<header>
    <h1>ENGLIFORCE</h1>
    <p>HIGH STAKES DECODER</p>
</header>

<main>
    <div class="game-container" id="game-panel">
        <div class="hud">
            <div>Q: <span id="q-counter">1</span>/10</div>
            <div class="bank-display">💰 <span id="bank-counter">100</span></div>
        </div>

        <div id="play-area">
            <div class="target-box">
                <div class="target-date" id="target-display">LADEN...</div>
            </div>

            <input type="text" id="answer-input" placeholder="Typ je Engelse zin..." autocomplete="off">

            <div class="betting-zone">
                <div class="bet-chips">
                    <button class="bet-btn active" onclick="selectBet(10, this)">10</button>
                    <button class="bet-btn" onclick="selectBet(25, this)" id="bet-25">25</button>
                    <button class="bet-btn" onclick="selectBet(50, this)" id="bet-50">50</button>
                    <button class="bet-btn" onclick="selectBet('ALL', this)" id="bet-all" style="color:#ff5252">ALL</button>
                </div>
            </div>

            <button class="btn-action" id="btn-check" onclick="checkAnswer()">CHECK!</button>
        </div>

        <div id="feedback" class="feedback-box"></div>
        <button class="btn-action" id="btn-next" style="display: none; background: var(--hero-blue-main); border-bottom-color: var(--hero-blue-dark);" onclick="nextQuestion()">VOLGENDE ➔</button>
    </div>

    <div class="game-container end-screen" id="end-panel">
        <h2 id="end-title">KLUIZE KRAKEN KLAAR!</h2>
        <div style="font-size: 3rem; color: var(--money-green); font-family: 'Bangers';" id="final-score">💰 0</div>
        <button class="btn-action" onclick="location.reload()">NOG EEN KEER</button>
    </div>
</main>

<script>
    const nlDays = ['maandag', 'dinsdag', 'woensdag', 'donderdag', 'vrijdag', 'zaterdag', 'zondag'];
    const enDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const nlMonths = ['januari', 'februari', 'maart', 'april', 'mei', 'juni', 'juli', 'augustus', 'september', 'oktober', 'november', 'december'];
    const enMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const ordinals = ['', 'first', 'second', 'third', 'fourth', 'fifth', 'sixth', 'seventh', 'eighth', 'ninth', 'tenth', 'eleventh', 'twelfth', 'thirteenth', 'fourteenth', 'fifteenth', 'sixteenth', 'seventeenth', 'eighteenth', 'nineteenth', 'twentieth', 'twenty-first', 'twenty-second', 'twenty-third', 'twenty-fourth', 'twenty-fifth', 'twenty-sixth', 'twenty-seventh', 'twenty-eighth', 'twenty-ninth', 'thirtieth', 'thirty-first'];

    let currentQ = 1; let bank = 100; let currentBet = 10;
    let targetUK = ""; let targetUS = ""; let currentEnDay = ""; let currentEnMonth = "";

    function generateQuestion() {
        const dIdx = Math.floor(Math.random() * 7);
        const mIdx = Math.floor(Math.random() * 12);
        const dNum = Math.floor(Math.random() * 28) + 1;
        
        currentEnDay = enDays[dIdx];
        currentEnMonth = enMonths[mIdx];
        const ord = ordinals[dNum];

        document.getElementById('target-display').innerText = `${nlDays[dIdx]} ${dNum} ${nlMonths[mIdx]}`;
        targetUK = `${currentEnDay} the ${ord} of ${currentEnMonth}`;
        targetUS = `${currentEnDay}, ${currentEnMonth} ${ord}`;
    }

    function selectBet(amt, btn) {
        currentBet = (amt === 'ALL') ? bank : amt;
        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input');
        const userAns = input.value.trim().replace(/\s+/g, ' ');
        if(!userAns) return;

        const feedback = document.getElementById('feedback');
        const isCorrect = (userAns === targetUK || userAns === targetUS);
        
        document.getElementById('play-area').style.display = 'none';
        feedback.style.display = 'block';

        if (isCorrect) {
            bank += currentBet;
            feedback.className = "feedback-box feedback-correct";
            feedback.innerHTML = `<strong>KASSA! +${currentBet} credits!</strong><br>Helemaal foutloos.`;
        } else {
            bank -= currentBet;
            feedback.className = "feedback-box feedback-wrong";
            
            // SLIMME FEEDBACK LOGICA
            const lowUser = userAns.toLowerCase();
            const lowUK = targetUK.toLowerCase();
            const lowUS = targetUS.toLowerCase();
            let hint = "Helaas, de spelling klopt niet.";

            // 1. Check op de komma (Amerikaans)
            if (lowUser === lowUS.replace(',', '')) {
                hint = "Kijk uit! Je bent de <span style='color:white'>komma</span> na de dag vergeten.";
            } 
            // 2. Check op hoofdletters
            else if (lowUser === lowUK || lowUser === lowUS) {
                hint = "Bijna! Je woorden kloppen, maar je bent de <span style='color:white'>hoofdletters</span> vergeten.";
            }
            // 3. Check op Britse woordjes
            else if (lowUser.includes(currentEnDay.toLowerCase()) && lowUser.includes(currentEnMonth.toLowerCase()) && (!lowUser.includes('the') || !lowUser.includes('of'))) {
                hint = "In het Brits moet je altijd <span style='color:white'>'the'</span> en <span style='color:white'>'of'</span> gebruiken.";
            }

            feedback.innerHTML = `<strong>OEPS! -${currentBet} credits</strong><br>${hint}<br><span class="rule-hint">Juist: ${targetUK}<br>Of: ${targetUS}</span>`;
            document.getElementById('game-panel').classList.add('shake');
            setTimeout(() => document.getElementById('game-panel').classList.remove('shake'), 400);
        }

        document.getElementById('bank-counter').innerText = bank;
        document.getElementById('btn-next').style.display = 'block';
    }

    function nextQuestion() {
        if (bank <= 0 || currentQ >= 10) {
            document.getElementById('game-panel').style.display = 'none';
            document.getElementById('end-panel').style.display = 'block';
            document.getElementById('final-score').innerText = `💰 ${bank}`;
            return;
        }
        currentQ++;
        document.getElementById('q-counter').innerText = currentQ;
        document.getElementById('play-area').style.display = 'block';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('answer-input').value = "";
        generateQuestion();
        
        // Update inzet knoppen
        document.getElementById('bet-25').disabled = bank < 25;
        document.getElementById('bet-50').disabled = bank < 50;
        if (currentBet > bank) selectBet(10, document.querySelector('.bet-btn'));
    }

    generateQuestion();
</script>
</body>
</html>
