<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngliForce Academy: High Stakes Decoder</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-blue-main: #0288d1;
            --hero-blue-dark: #01579b;
            --hero-yellow: #ffb703;
            --hero-cyan: #81d4fa;
            --dark-bg: #0b1a2a;
            --hero-orange: #ff5722;
            --money-green: #4CAF50;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: radial-gradient(circle at center, #102a43 0%, #05101a 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--hero-blue-main);
            padding: 1.5rem 1rem;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            border-bottom: 5px solid var(--hero-yellow);
        }

        h1 { font-family: 'Bangers', cursive; font-size: 3.5rem; letter-spacing: 3px; margin: 0; text-shadow: 4px 4px 0px var(--hero-blue-dark); }
        h2 { font-family: 'Bangers', cursive; color: var(--hero-yellow); font-size: 2.2rem; margin-top: 10px; margin-bottom: 20px; }
        
        main { max-width: 900px; margin: 20px auto; padding: 15px; flex-grow: 1; width: 100%; }

        .game-container {
            background: rgba(16, 42, 67, 0.9);
            border: 3px solid var(--hero-cyan);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .hud {
            display: flex; justify-content: space-between; font-family: 'Bangers'; font-size: 1.8rem;
            border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 25px;
        }
        
        .bank-display { color: var(--money-green); text-shadow: 2px 2px 0px #000; }
        .round-display { color: var(--hero-cyan); }

        .target-box {
            background: #000;
            border: 4px solid var(--hero-orange);
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            max-width: 500px;
            box-shadow: inset 0 0 20px rgba(255, 87, 34, 0.4);
        }

        .target-box h3 { margin: 0; color: #fff; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .target-date { font-family: 'Bangers'; font-size: 3.5rem; color: var(--hero-yellow); margin: 10px 0; letter-spacing: 2px; }

        input[type="text"] {
            width: 100%; padding: 15px; font-size: 1.3rem;
            border: 3px solid var(--hero-cyan); border-radius: 10px;
            background: #0b1a2a; color: white; font-family: 'Lexend', sans-serif;
            text-align: center; margin-bottom: 25px; outline: none;
        }
        input[type="text"]:focus { border-color: var(--hero-yellow); box-shadow: 0 0 15px rgba(255, 183, 3, 0.5); }

        .betting-zone {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
        }

        .betting-title { font-family: 'Bangers'; font-size: 1.5rem; color: var(--hero-cyan); margin-bottom: 15px; }

        .bet-chips {
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }

        .bet-btn {
            background: var(--dark-bg); color: white; border: 3px solid var(--money-green);
            padding: 15px 25px; border-radius: 50px; font-family: 'Bangers';
            font-size: 1.5rem; cursor: pointer; transition: 0.2s;
            min-width: 80px; flex-grow: 1; max-width: 120px;
        }
        
        .bet-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4); }
        .bet-btn.active { background: var(--money-green); color: #000; transform: scale(1.1); box-shadow: 0 0 20px var(--money-green); }
        .bet-btn:disabled { border-color: #555; color: #555; cursor: not-allowed; opacity: 0.5; }
        .bet-btn.all-in { border-color: #ff5252; color: #ff5252; }
        .bet-btn.all-in.active { background: #ff5252; color: white; box-shadow: 0 0 20px #ff5252; }

        .btn-action {
            background: var(--hero-orange); color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-family: 'Bangers', cursive;
            font-size: 1.8rem; cursor: pointer; transition: 0.2s;
            border-bottom: 6px solid #bf360c; width: 100%; max-width: 400px;
        }
        .btn-action:hover { transform: translateY(-3px); background: #ff7043; border-bottom-color: #d84315; }

        .feedback-box {
            margin-top: 20px; padding: 15px; border-radius: 10px; font-size: 1.1rem; display: none; font-weight: bold;
        }
        .feedback-correct { background: rgba(76, 175, 80, 0.2); border: 2px solid #4CAF50; color: #81c784; }
        .feedback-wrong { background: rgba(244, 67, 54, 0.2); border: 2px solid #F44336; color: #e57373; }
        .feedback-rule { color: var(--hero-yellow); margin-top: 10px; display: block; font-size: 1rem; }

        .flash-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 1999; }
        .boom-text {
            position: fixed; pointer-events: none; font-family: 'Bangers', cursive;
            color: var(--hero-yellow); font-size: 5rem; z-index: 2001;
            text-shadow: 5px 5px 0px #000; animation: boomAnim 0.6s ease-out forwards;
        }
        @keyframes boomAnim { 0% { transform: scale(0) rotate(-20deg); opacity: 1; } 100% { transform: scale(2) rotate(10deg); opacity: 0; } }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }

        .end-screen { display: none; text-align: center; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .final-score { font-family: 'Bangers'; font-size: 4rem; color: var(--money-green); margin: 20px 0; text-shadow: 3px 3px 0px #000; }
        .bankrupt-score { color: #ff5252; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            h2 { font-size: 1.5rem; }
            header p { font-size: 0.9rem; margin-top: 5px; }
            
            main { padding: 10px; margin: 10px auto; }
            
            .game-container { padding: 15px; border-width: 2px; }
            
            .hud { font-size: 1.2rem; padding-bottom: 10px; margin-bottom: 15px; align-items: center; }
            
            .target-box { padding: 15px; margin: 10px auto; }
            .target-box h3 { font-size: 1rem; }
            .target-date { font-size: 2.2rem; }
            
            input[type="text"] { font-size: 1rem; padding: 12px; margin-bottom: 15px; }
            
            .betting-zone { padding: 15px; margin-bottom: 15px; }
            .betting-title { font-size: 1.2rem; }
            
            .bet-btn { font-size: 1.2rem; padding: 10px 15px; min-width: 60px; border-width: 2px; }
            .bet-btn.active { transform: scale(1.05); }
            
            .btn-action { font-size: 1.4rem; padding: 12px 20px; border-bottom-width: 4px; }
            
            .boom-text { font-size: 3rem; }
            .final-score { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div class="flash-effect" id="flash"></div>

<header>
    <h1>ENGLIFORCE ACADEMY</h1>
    <p>PICKLE MISSION: HIGH STAKES DECODER</p>
</header>

<main>
    <div class="game-container" id="game-panel">
        <div class="hud">
            <div class="round-display">VRAAG: <span id="q-counter">1</span> / 10</div>
            <div class="bank-display">💰 <span id="bank-counter">100</span></div>
        </div>

        <div id="play-area">
            <div class="target-box">
                <h3>Vertaal deze datum (Brits of Amerikaans)</h3>
                <div class="target-date" id="target-display">LADEN...</div>
            </div>

            <input type="text" id="answer-input" placeholder="Typ hier je Engelse zin..." autocomplete="off">

            <div class="betting-zone">
                <div class="betting-title">HOE ZEKER BEN JE? KIES JE INZET!</div>
                <div class="bet-chips">
                    <button class="bet-btn active" onclick="selectBet(10, this)" id="bet-10">10</button>
                    <button class="bet-btn" onclick="selectBet(25, this)" id="bet-25">25</button>
                    <button class="bet-btn" onclick="selectBet(50, this)" id="bet-50">50</button>
                    <button class="bet-btn all-in" onclick="selectBet('ALL', this)" id="bet-all">ALL-IN</button>
                </div>
            </div>

            <button class="btn-action" id="btn-check" onclick="checkAnswer(event)">LOCK BET & CHECK!</button>
        </div>

        <div id="feedback" class="feedback-box"></div>
        <button class="btn-action" id="btn-next" style="display: none; margin-top: 20px; background: var(--hero-blue-main); border-color: var(--hero-blue-dark);" onclick="nextQuestion()">VOLGENDE VRAAG ➔</button>
    </div>

    <div class="game-container end-screen" id="end-panel">
        <h2 id="end-title">MISSION ACCOMPLISHED!</h2>
        <p id="end-subtitle">Je hebt de kluis gekraakt. Dit is je eindkapitaal:</p>
        <div class="final-score" id="final-score-text">💰 0</div>
        <button class="btn-action" onclick="location.reload()">PLAY AGAIN!</button>
    </div>
</main>

<script>
    // Game Data
    const nlDays = ['maandag', 'dinsdag', 'woensdag', 'donderdag', 'vrijdag', 'zaterdag', 'zondag'];
    const enDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    
    const nlMonths = ['januari', 'februari', 'maart', 'april', 'mei', 'juni', 'juli', 'augustus', 'september', 'oktober', 'november', 'december'];
    const enMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const maxDays = [31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
    
    const ordinals = ['', 'first', 'second', 'third', 'fourth', 'fifth', 'sixth', 'seventh', 'eighth', 'ninth', 'tenth', 'eleventh', 'twelfth', 'thirteenth', 'fourteenth', 'fifteenth', 'sixteenth', 'seventeenth', 'eighteenth', 'nineteenth', 'twentieth', 'twenty-first', 'twenty-second', 'twenty-third', 'twenty-fourth', 'twenty-fifth', 'twenty-sixth', 'twenty-seventh', 'twenty-eighth', 'twenty-ninth', 'thirtieth', 'thirty-first'];

    // Game State
    let currentQ = 1;
    let bank = 100;
    let currentBet = 10;
    
    let targetUK = "";
    let targetUS = "";

    // Elements
    const elTarget = document.getElementById('target-display');
    const elInput = document.getElementById('answer-input');
    const elBank = document.getElementById('bank-counter');
    const elFeedback = document.getElementById('feedback');
    const btnCheck = document.getElementById('btn-check');
    const btnNext = document.getElementById('btn-next');
    const playArea = document.getElementById('play-area');

    // Initialize first question
    generateQuestion();
    updateBetButtons();

    // Fix voor enter-toets op mobiel toetsenbord
    elInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            btnCheck.click();
        }
    });

    function generateQuestion() {
        const dayIdx = Math.floor(Math.random() * nlDays.length);
        const monthIdx = Math.floor(Math.random() * nlMonths.length);
        const dayNum = Math.floor(Math.random() * maxDays[monthIdx]) + 1;

        elTarget.innerText = `${nlDays[dayIdx]} ${dayNum} ${nlMonths[monthIdx]}`;

        const enDayWord = enDays[dayIdx];
        const enMonthWord = enMonths[monthIdx];
        const ordWord = ordinals[dayNum];

        targetUK = `${enDayWord} the ${ordWord} of ${enMonthWord}`;
        targetUS = `${enDayWord}, ${enMonthWord} ${ordWord}`;
    }

    function selectBet(amount, btnElement) {
        if (amount === 'ALL') {
            currentBet = bank;
        } else {
            currentBet = amount;
        }

        // Update UI
        document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
    }

    function updateBetButtons() {
        // Disable buttons if player doesn't have enough money
        document.getElementById('bet-25').disabled = bank < 25;
        document.getElementById('bet-50').disabled = bank < 50;
        
        // If current bet is higher than bank, reset to 10 or max available
        if (currentBet > bank && currentBet !== bank) {
            currentBet = bank >= 10 ? 10 : bank;
            document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.remove('active'));
            if(bank > 0) document.getElementById('bet-10').classList.add('active');
        }
        
        // Ensure ALL-IN is always possible (as long as bank > 0)
        document.getElementById('bet-all').disabled = bank <= 0;
    }

    function checkAnswer(e) {
        let userAns = elInput.value.trim().replace(/\s+/g, ' ');
        
        if(userAns === "") {
            elInput.classList.add('shake');
            setTimeout(() => elInput.classList.remove('shake'), 400);
            return;
        }

        playArea.style.display = 'none';

        let isCorrect = (userAns === targetUK || userAns === targetUS);
        let feedbackHTML = "";

        if (isCorrect) {
            bank += currentBet;
            elBank.innerText = bank;
            elFeedback.className = "feedback-box feedback-correct";
            feedbackHTML = `<h2>💥 KASSA! +${currentBet} CREDITS!</h2>Perfect vertaald!`;
            createExplosion(e, 'WIN!');
        } else {
            bank -= currentBet;
            elBank.innerText = bank;
            elFeedback.className = "feedback-box feedback-wrong";
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 400);

            let lowerUser = userAns.toLowerCase();
            let lowerUK = targetUK.toLowerCase();
            let lowerUS = targetUS.toLowerCase();

            feedbackHTML = `<h2>🚨 OEPS! -${currentBet} CREDITS!</h2>`;

            if (lowerUser === lowerUK || lowerUser === lowerUS) {
                feedbackHTML += `Je hebt de juiste woorden, maar let op je <strong>HOOFDLETTERS!</strong> <br><span class="feedback-rule">Gouden regel 1: Dagen en maanden krijgen altijd een hoofdletter.</span>`;
            } else if (lowerUser === lowerUS.replace(',', '')) {
                feedbackHTML += `Bijna perfect Amerikaans! Maar je bent één ding vergeten... <br><span class="feedback-rule">Gouden regel 2: ALTIJD een komma na de dag in het Amerikaans!</span>`;
            } else if (lowerUser === lowerUK.replace('the ', '').replace(' of', '') || lowerUser === lowerUK.replace(' of', '')) {
                feedbackHTML += `Bijna perfect Brits! Maar je miste kleine woordjes. <br><span class="feedback-rule">Vergeet "the" en "of" niet in de Britse uitspraak!</span>`;
            } else {
                feedbackHTML += `Helaas, de spelling klopte niet helemaal. Kijk goed naar de rangtelwoorden!`;
            }

            feedbackHTML += `<br><br>De juiste antwoorden waren:<br>
            🇬🇧 Brits: <strong style="color:white;">${targetUK}</strong><br>
            🇺🇸 Amerikaans: <strong style="color:white;">${targetUS}</strong>`;
        }

        elFeedback.innerHTML = feedbackHTML;
        elFeedback.style.display = 'block';

        if (bank <= 0) {
            btnNext.innerText = "BEKIJK EINDRESULTAAT";
        }
        
        btnNext.style.display = 'inline-block';
    }

    function nextQuestion() {
        if (bank <= 0) {
            triggerGameOver(false);
            return;
        }

        if (currentQ >= 10) {
            triggerGameOver(true);
            return;
        }

        currentQ++;
        document.getElementById('q-counter').innerText = currentQ;
        
        btnNext.style.display = 'none';
        elFeedback.style.display = 'none';
        playArea.style.display = 'block';
        
        elInput.value = "";
        elInput.focus();
        
        generateQuestion();
        updateBetButtons();
    }

    function triggerGameOver(survived) {
        document.getElementById('game-panel').style.display = 'none';
        const endPanel = document.getElementById('end-panel');
        endPanel.style.display = 'block';
        
        const finalScoreText = document.getElementById('final-score-text');
        
        if (!survived || bank <= 0) {
            document.getElementById('end-title').innerText = "BANKRUPT!";
            document.getElementById('end-title').style.color = "#ff5252";
            document.getElementById('end-subtitle').innerText = "Je hebt al je credits verloren... Volgende keer beter!";
            finalScoreText.innerText = "💸 0";
            finalScoreText.classList.add('bankrupt-score');
        } else {
            finalScoreText.innerText = `💰 ${bank}`;
            if(bank >= 250) {
                document.getElementById('end-subtitle').innerText = "Ongelooflijk! Je bent een ware HIGH ROLLER!";
            }
        }
    }

    function createExplosion(e, message) {
        if(!e) return;
        const x = e.clientX || window.innerWidth / 2; 
        const y = e.clientY || window.innerHeight / 2;
        
        const flash = document.getElementById('flash');
        flash.style.opacity = '0.3';
        setTimeout(() => { flash.style.opacity = '0'; }, 150);

        const txt = document.createElement('div');
        txt.className = 'boom-text';
        txt.innerText = message;
        txt.style.left = (x - 80) + 'px';
        txt.style.top = (y - 80) + 'px';
        document.body.appendChild(txt);
        setTimeout(() => txt.remove(), 800);
    }
</script>

</body>
</html>
