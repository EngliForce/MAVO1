<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION: MATCHING PRONOUNS</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-purple-main: #7b2cbf; --hero-purple-dark: #3c096c;
            --hero-yellow: #ffb703; --hero-cyan: #00f5d4;
            --header-bg: #ff7043; --header-border: var(--hero-yellow);
        }
        
        html, body { margin: 0; padding: 0; min-height: 100vh; }
        body { 
            font-family: 'Lexend', sans-serif; 
            background: radial-gradient(circle at center, #1a102a 0%, #05101a 100%); 
            color: white; 
            display: flex; 
            flex-direction: column; 
        }

        header { 
            background: var(--header-bg); 
            padding: 2rem 1rem; 
            text-align: center; 
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); 
            border-bottom: 5px solid var(--header-border); 
        }
        h1 { font-family: 'Bangers', cursive; font-size: 3rem; margin: 0; text-shadow: 3px 3px 0px var(--hero-purple-dark); }
        
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }

        .container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin: 10px 0; max-width: 900px; }

        .dropzone { border: 2px dashed var(--hero-cyan); border-radius: 8px; padding: 10px; width: 100px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); font-size: 0.85rem; font-weight: bold; color: var(--hero-yellow); }
        .dropzone.occupied { background: var(--hero-purple-dark); border-style: solid; border-color: var(--hero-cyan); }
        
        .draggable { border: 2px solid var(--hero-cyan); border-radius: 8px; padding: 8px 12px; background: var(--hero-purple-main); color: white; cursor: grab; font-family: 'Bangers'; font-size: 0.85rem; user-select: none; }
        
        .btn-action { background: var(--hero-yellow); color: #000; border: none; padding: 10px 20px; border-radius: 50px; font-family: 'Bangers'; font-size: 1rem; cursor: pointer; margin: 5px; }
        .btn-check { background: var(--hero-cyan); }

        #feedback { font-family: 'Bangers'; font-size: 1.2rem; height: 1.5em; margin: 10px; }

        footer { background: #05101a; color: rgba(255,255,255,0.5); text-align: center; padding: 15px; border-top: 2px solid var(--hero-purple-dark); }
    </style>
</head>
<body>

    <header><h1>MISSION: MATCHING</h1></header>

    <main>
        <p style="margin: 5px; font-size: 0.9rem;">Sleep de Engelse woorden naar de juiste betekenis:</p>
        
        <div class="container" id="dropzones-container"></div>
        <div class="container" id="draggables-container"></div>

        <div>
            <button class="btn-action" onclick="createElements()">🔄 RESET</button>
            <button class="btn-action btn-check" onclick="checkAnswers()">✅ CHECK</button>
        </div>
        <div id="feedback"></div>
    </main>

    <footer>
        &copy; 2026 EngliForce – Make English Your Superpower!
    </footer>

    <script>
        const data = [
            { nl: "ik", en: "I", id: "I" }, 
            { nl: "jij", en: "you (enkelvoud)", id: "you-s" },
            { nl: "jullie", en: "you (meervoud)", id: "you-p" },
            { nl: "hij", en: "he", id: "he" }, 
            { nl: "zij (ev)", en: "she", id: "she" },
            { nl: "zij (mv)", en: "they", id: "they" },
            { nl: "het", en: "it", id: "it" }, 
            { nl: "wij", en: "we", id: "we" }
        ];

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function createElements() {
            const dropContainer = document.getElementById('dropzones-container');
            const dragContainer = document.getElementById('draggables-container');
            document.getElementById('feedback').textContent = "";
            dropContainer.innerHTML = ""; dragContainer.innerHTML = "";

            // Dropzones (NL)
            shuffle([...data]).forEach(item => {
                const div = document.createElement('div');
                div.className = 'dropzone';
                div.dataset.match = item.id;
                div.textContent = item.nl;
                div.addEventListener('dragover', e => e.preventDefault());
                div.addEventListener('drop', e => {
                    e.preventDefault();
                    div.textContent = e.dataTransfer.getData('text');
                    div.classList.add('occupied');
                    div.dataset.droppedId = e.dataTransfer.getData('id');
                });
                dropContainer.appendChild(div);
            });

            // Draggables (EN)
            shuffle([...data]).forEach(item => {
                const div = document.createElement('div');
                div.className = 'draggable';
                div.draggable = true;
                div.textContent = item.en; 
                div.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('text', item.en);
                    e.dataTransfer.setData('id', item.id);
                });
                dragContainer.appendChild(div);
            });
        }

        function checkAnswers() {
            let correct = 0;
            const dropzones = document.querySelectorAll('.dropzone');
            dropzones.forEach(zone => {
                if (zone.dataset.droppedId === zone.dataset.match) {
                    zone.style.borderColor = "#00f5d4";
                    correct++;
                } else {
                    zone.style.borderColor = "#d32f2f";
                }
            });
            const feedback = document.getElementById('feedback');
            feedback.textContent = (correct === data.length) ? "🚀 MISSION ACCOMPLISHED!" : "⚠️ NOG NIET GOED!";
            feedback.style.color = (correct === data.length) ? "#00f5d4" : "#d32f2f";
        }

        createElements();
    </script>
</body>
</html>
