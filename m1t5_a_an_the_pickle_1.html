<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Article Academy | EngliForce</title>    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">    <style>        :root {            --hero-purple-main: #6a1b9a;            --hero-purple-dark: #4a148c;            --hero-yellow: #ffb703;            --jedi-purple: #bc13fe;            --sith-red: #ff003c;            --lightsaber-color: #39ff14;            --legendary-purple: #bc13fe;            --accent-color: var(--jedi-purple);            --space-black: #05010a;            --glass: rgba(20, 10, 35, 0.9);        }
        body {            background: var(--space-black);            background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),                               radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.05), transparent);            color: #fff; font-family: 'Segoe UI', sans-serif;            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;            min-height: 100vh; margin: 0; overflow: hidden;        }
        header {            background: var(--hero-purple-main);            width: 100%; padding: 1.5rem 1rem 2.5rem 1rem; text-align: center;            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);            border-bottom: 5px solid var(--hero-yellow);            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;        }
        header h1 { font-family: 'Bangers', cursive; font-size: 3rem; letter-spacing: 3px; margin: 0; color: white; text-shadow: 4px 4px 0px var(--hero-purple-dark); }        header p { font-family: 'Lexend', sans-serif; font-weight: bold; letter-spacing: 2px; margin-top: 5px; color: white; }
        @keyframes shake {            0%, 100% { transform: translate(0, 0); }            10%, 30%, 50%, 70%, 90% { transform: translate(-5px, -5px); }            20%, 40%, 60%, 80% { transform: translate(5px, 5px); }        }        .unlimited-shake { animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both; }
        #app-window {            width: 90vw; max-width: 850px; background: var(--glass);            backdrop-filter: blur(20px); border: 1px solid rgba(188, 19, 254, 0.3);            border-radius: 24px; padding: 40px 30px 20px 30px; text-align: center;            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin: auto;        }
        .nav-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; }        .rank-tag { color: var(--lightsaber-color); font-weight: 900; text-shadow: 0 0 10px var(--lightsaber-color); letter-spacing: 1px; }
        .saber-wrapper { display: flex; align-items: center; margin: 25px 0; }        .hilt { width: 65px; height: 30px; background: linear-gradient(to bottom, #95a5a6, #2c3e50, #95a5a6); border-radius: 6px 2px 2px 6px; border-right: 8px solid #111; }        .saber-container { flex-grow: 1; height: 18px; background: #000; border-radius: 0 12px 12px 0; overflow: hidden; border: 1px solid #333; }        #progress-bar { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 25px var(--lightsaber-color); transition: 1s ease; }
        .stone-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }        .stone {            width: 95px; height: 95px;             background: radial-gradient(circle at 30% 30%, #888, #444 60%, #222);            clip-path: polygon(20% 0%, 80% 0%, 100% 30%, 100% 70%, 80% 100%, 20% 100%, 0% 70%, 0% 30%);            cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center;            animation: float 4s infinite ease-in-out;        }
        .stone.revealed {             background: linear-gradient(135deg, #fff, var(--lightsaber-color) 60%, #004d00);            box-shadow: 0 0 40px var(--lightsaber-color); transform: scale(1.2); z-index: 10;            clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);        }        .stone.revealed.legendary { background: linear-gradient(135deg, #fff, var(--legendary-purple) 60%, #3a005c); box-shadow: 0 0 50px var(--legendary-purple); }
        .stone.missed {            background: linear-gradient(135deg, #e0e0e0, #a0a0a0);            opacity: 0.9; cursor: default; animation: none;            clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);        }        .stone.missed .val { color: #111 !important; text-shadow: none !important; opacity: 1 !important; }
        .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }        button.opt {            background: rgba(255,255,255,0.05); border: 2px solid var(--accent-color);            color: var(--accent-color); padding: 18px; border-radius: 12px;            font-size: 1.3rem; cursor: pointer; transition: 0.3s; font-weight: 900;        }        button.opt:hover:not(:disabled) { background: var(--accent-color); color: #000; }
        .copyright { margin-top: 40px; font-size: 0.75rem; opacity: 0.3; letter-spacing: 2px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }        .hidden { display: none !important; }    </style></head><body>
    <header>        <h1>ENGLIFORCE ACADEMY</h1>        <p>THE ARTICLE TRIALS</p>    </header>
    <div id="app-window">        <div class="nav-header">            <div id="rank-tag" class="rank-tag">YOUNGLING</div>            <div id="score-label" style="font-weight: 900;">0 KYBER CRYSTALS</div>        </div>
        <div id="start-screen">            <h1 style="font-size: 2.5rem; color: var(--jedi-purple); margin-top: 0;">ARTICLE TRIALS</h1>            <p>Master A, An and The to balance the Force.</p>            <button onclick="startGame()" style="background:var(--jedi-purple); border:none; color:#fff; padding: 18px 50px; border-radius: 40px; font-weight: 900; cursor: pointer; margin-top: 20px;">I AM READY</button>        </div>
        <div id="game-screen" class="hidden">            <div class="saber-wrapper"><div class="hilt"></div><div class="saber-container"><div id="progress-bar"></div></div></div>            <h2 id="question-text" style="min-height: 70px; margin: 0 0 20px 0;"></h2>            <div id="options" class="options-grid"></div>
            <div id="stone-zone" class="hidden">                <p style="color: var(--jedi-purple); font-weight: 900; letter-spacing: 2px; font-size: 0.8rem;">TRUST YOUR INSTINCTS</p>                <div class="stone-container" id="stone-list"></div>            </div>                                    <div id="feedback-msg" style="margin-top: 25px; min-height: 60px;">                <div id="main-feedback" style="font-weight: 900; font-size: 1.3rem;"></div>            </div>        </div>
        <div class="copyright">© Mister Seb's Grammar Apps</div>    </div>
<script>    const articleDB = [
        // A (Consonant sounds)
        { q: "I saw ___ movie last night.", c: "a" }, { q: "He is ___ doctor.", c: "a" }, { q: "She has ___ cat.", c: "a" }, { q: "This is ___ very big house.", c: "a" }, { q: "I need ___ new phone.", c: "a" },
        { q: "He bought ___ car.", c: "a" }, { q: "It was ___ dark night.", c: "a" }, { q: "Do you have ___ pen?", c: "a" }, { q: "She is ___ teacher.", c: "a" }, { q: "I want to buy ___ book.", c: "a" },
        { q: "He is ___ European student.", c: "a" }, { q: "It's ___ university.", c: "a" }, { q: "That is ___ unique idea.", c: "a" }, { q: "I wear ___ uniform.", c: "a" }, { q: "He is ___ hero.", c: "a" },
        { q: "I saw ___ bird in the tree.", c: "a" }, { q: "She wants ___ dog for Christmas.", c: "a" }, { q: "There is ___ fly in my soup.", c: "a" }, { q: "I need ___ minute to think.", c: "a" }, { q: "He found ___ coin.", c: "a" },
        { q: "She works in ___ bank.", c: "a" }, { q: "I have ___ headache.", c: "a" }, { q: "It was ___ wonderful day.", c: "a" }, { q: "He is ___ good friend.", c: "a" }, { q: "I need ___ glass of water.", c: "a" },
        { q: "That is ___ beautiful painting.", c: "a" }, { q: "She lives in ___ small town.", c: "a" }, { q: "I saw ___ lion at the zoo.", c: "a" }, { q: "He wants to be ___ pilot.", c: "a" }, { q: "I bought ___ newspaper.", c: "a" },
        { q: "There is ___ table in the room.", c: "a" }, { q: "I have ___ sister.", c: "a" }, { q: "He made ___ mistake.", c: "a" }, { q: "She has ___ guitar.", c: "a" }, { q: "It is ___ long story.", c: "a" },
        { q: "I need ___ favor.", c: "a" }, { q: "He is ___ quiet boy.", c: "a" }, { q: "She wore ___ red dress.", c: "a" }, { q: "I saw ___ star in the sky.", c: "a" }, { q: "He has ___ bicycle.", c: "a" },
        { q: "This is ___ difficult task.", c: "a" }, { q: "I want ___ sandwich.", c: "a" }, { q: "She found ___ job.", c: "a" }, { q: "He told ___ joke.", c: "a" }, { q: "I saw ___ mountain.", c: "a" },
        { q: "It's ___ pleasure to meet you.", c: "a" }, { q: "She gave him ___ gift.", c: "a" }, { q: "He has ___ son.", c: "a" }, { q: "I need ___ map.", c: "a" }, { q: "That is ___ great movie.", c: "a" },

        // AN (Vowel sounds)
        { q: "I ate ___ apple.", c: "an" }, { q: "He is ___ engineer.", c: "an" }, { q: "She has ___ umbrella.", c: "an" }, { q: "It is ___ interesting story.", c: "an" }, { q: "I need ___ orange.", c: "an" },
        { q: "He is ___ honest man.", c: "an" }, { q: "I'll be ready in ___ hour.", c: "an" }, { q: "She is ___ amazing artist.", c: "an" }, { q: "It was ___ easy test.", c: "an" }, { q: "I saw ___ elephant.", c: "an" },
        { q: "He works for ___ international company.", c: "an" }, { q: "She is ___ only child.", c: "an" }, { q: "I had ___ egg for breakfast.", c: "an" }, { q: "It's ___ honor to be here.", c: "an" }, { q: "He found ___ old map.", c: "an" },
        { q: "She bought ___ expensive watch.", c: "an" }, { q: "I saw ___ octopus.", c: "an" }, { q: "He is ___ excellent cook.", c: "an" }, { q: "I need ___ eraser.", c: "an" }, { q: "It was ___ ugly sweater.", c: "an" },
        { q: "She is ___ intelligent girl.", c: "an" }, { q: "I saw ___ eagle.", c: "an" }, { q: "He has ___ interview today.", c: "an" }, { q: "I ate ___ ice cream cone.", c: "an" }, { q: "It is ___ unusual problem.", c: "an" },
        { q: "She sent ___ email.", c: "an" }, { q: "He is ___ actor.", c: "an" }, { q: "I saw ___ ant.", c: "an" }, { q: "She has ___ aunt in London.", c: "an" }, { q: "It was ___ accident.", c: "an" },
        { q: "He found ___ insect in his room.", c: "an" }, { q: "I saw ___ owl.", c: "an" }, { q: "She is ___ officer.", c: "an" }, { q: "I need ___ onion.", c: "an" }, { q: "It's ___ open door.", c: "an" },
        { q: "He is ___ optimist.", c: "an" }, { q: "I saw ___ alien in the movie.", c: "an" }, { q: "She has ___ idea.", c: "an" }, { q: "It was ___ exciting trip.", c: "an" }, { q: "He is ___ athlete.", c: "an" },
        { q: "I need ___ aspirin.", c: "an" }, { q: "She wore ___ apron.", c: "an" }, { q: "It's ___ amazing view.", c: "an" }, { q: "He is ___ early riser.", c: "an" }, { q: "I saw ___ igloo.", c: "an" },
        { q: "She has ___ appointment.", c: "an" }, { q: "It is ___ empty box.", c: "an" }, { q: "He bought ___ oven.", c: "an" }, { q: "I saw ___ ostrich.", c: "an" }, { q: "It was ___ awful day.", c: "an" },

        // THE (Specific, unique, or previously mentioned)
        { q: "___ sun is hot.", c: "the" }, { q: "___ moon is bright tonight.", c: "the" }, { q: "I liked ___ movie we saw.", c: "the" }, { q: "She is ___ tallest girl in class.", c: "the" }, { q: "Where is ___ bathroom?", c: "the" },
        { q: "___ sky is blue.", c: "the" }, { q: "He is ___ President.", c: "the" }, { q: "I'll meet you at ___ park.", c: "the" }, { q: "___ earth goes around the sun.", c: "the" }, { q: "Please close ___ door.", c: "the" },
        { q: "___ capital of France is Paris.", c: "the" }, { q: "He is ___ best player.", c: "the" }, { q: "I live in ___ red house.", c: "the" }, { q: "___ water is cold.", c: "the" }, { q: "Look at ___ stars.", c: "the" },
        { q: "___ piano is hard to play.", c: "the" }, { q: "I'm going to ___ bank.", c: "the" }, { q: "___ weather is nice today.", c: "the" }, { q: "Who is ___ owner of this car?", c: "the" }, { q: "I read ___ book you gave me.", c: "the" },
        { q: "___ end of the movie was sad.", c: "the" }, { q: "He lives on ___ second floor.", c: "the" }, { q: "___ flowers in the garden are pretty.", c: "the" }, { q: "I saw a cat. ___ cat was black.", c: "the" }, { q: "___ Himalayas are high.", c: "the" },
        { q: "___ Nile is a long river.", c: "the" }, { q: "I'll see you at ___ airport.", c: "the" }, { q: "___ world is a big place.", c: "the" }, { q: "He is ___ first person I met.", c: "the" }, { q: "Turn off ___ light, please.", c: "the" },
        { q: "___ dinner was delicious.", c: "the" }, { q: "___ kids are playing outside.", c: "the" }, { q: "I found the key to ___ car.", c: "the" }, { q: "___ Pacific Ocean is huge.", c: "the" }, { q: "He plays ___ violin.", c: "the" },
        { q: "___ 1990s were great.", c: "the" }, { q: "Pass ___ salt, please.", c: "the" }, { q: "___ teacher is late.", c: "the" }, { q: "I love ___ smell of rain.", c: "the" }, { q: "___ man in the suit is my boss.", c: "the" },
        { q: "___ Eiffel Tower is in Paris.", c: "the" }, { q: "We went to ___ beach.", c: "the" }, { q: "___ train leaves at noon.", c: "the" }, { q: "He works in ___ city center.", c: "the" }, { q: "___ radio is too loud.", c: "the" },
        { q: "___ front of the house needs paint.", c: "the" }, { q: "I saw ___ Queen.", c: "the" }, { q: "___ Amazon is a rainforest.", c: "the" }, { q: "___ internet is down.", c: "the" }, { q: "Open ___ window.", c: "the" }
    ];

    let questions = [];    let current = 0; let score = 0;    const ranks = ["YOUNGLING", "PADAWAN", "JEDI KNIGHT", "JEDI MASTER"];

    function startGame() {        questions = articleDB.sort(() => 0.5 - Math.random()).slice(0, 10);        current = 0; score = 0;        document.getElementById('score-label').innerText = "0 KYBER CRYSTALS";        document.getElementById('rank-tag').innerText = "YOUNGLING";        document.getElementById('start-screen').classList.add('hidden');        document.getElementById('game-screen').classList.remove('hidden');        loadQuestion();    }

    function loadQuestion() {        if (current >= questions.length) return endGame();        document.getElementById('progress-bar').style.width = (current * 10) + "%";        document.getElementById('question-text').innerText = questions[current].q;        document.getElementById('stone-zone').classList.add('hidden');        document.getElementById('main-feedback').innerText = "";        document.getElementById('options').classList.remove('hidden');                const opts = ["a", "an", "the"];        document.getElementById('options').innerHTML = opts.map(o => `<button class="opt" onclick="process('${o}')">${o}</button>`).join('');    }

    function process(ans) {        if (ans === questions[current].c) {            document.getElementById('main-feedback').style.color = "var(--lightsaber-color)";            document.getElementById('main-feedback').innerText = "CORRECT. CHOOSE YOUR CRYSTAL.";            document.getElementById('options').classList.add('hidden');            showStones();        } else {            document.getElementById('main-feedback').style.color = "var(--sith-red)";            document.getElementById('main-feedback').innerText = `INCORRECT. IT WAS "${questions[current].c.toUpperCase()}".`;            setTimeout(next, 1500);        }    }

    function showStones() {        const zone = document.getElementById('stone-zone');        const list = document.getElementById('stone-list');        zone.classList.remove('hidden');        list.innerHTML = "";
        let pool = [];        let available = Array.from({length: 14}, (_, i) => i + 2);        for(let i=0; i<5; i++) {            let rIdx = Math.floor(Math.random() * available.length);            pool.push(available.splice(rIdx, 1)[0]);        }
        pool.forEach((val) => {            const stone = document.createElement('div');            stone.className = 'stone';            stone.innerHTML = `<span style="display:none; font-weight:900; color:#000; font-size:1.8rem;" class="val">${val}</span>`;                        stone.onclick = function() {                const all = document.querySelectorAll('.stone');                this.classList.add('revealed');                this.querySelector('.val').style.display = 'block';
                if(val === 15) {                    this.classList.add('legendary');                    document.getElementById('app-window').classList.add('unlimited-shake');                    setTimeout(() => document.getElementById('app-window').classList.remove('unlimited-shake'), 1000);                    document.getElementById('main-feedback').innerText = "UNLIMITED POWER! (+15)";                    document.getElementById('main-feedback').style.color = "var(--legendary-purple)";                } else {                    document.getElementById('main-feedback').innerText = `+${val} KYBER CRYSTALS`;                }

                all.forEach(s => {                    s.onclick = null;                    if (!s.classList.contains('revealed')) {                        s.classList.add('missed');                        s.querySelector('.val').style.display = 'block';                    }                });

                score += val;                document.getElementById('score-label').innerText = `${score} KYBER CRYSTALS`;                document.getElementById('rank-tag').innerText = ranks[Math.min(Math.floor(score/40), 3)];                setTimeout(next, 3000);            };            list.appendChild(stone);        });    }

    function next() { current++; loadQuestion(); }

    function endGame() {        document.getElementById('game-screen').innerHTML = `            <h1 style="margin-top:0;">TRIALS COMPLETE</h1>            <h2>FINAL RANK: ${document.getElementById('rank-tag').innerText}</h2>            <div style="font-size:5rem; color:var(--lightsaber-color); text-shadow: 0 0 20px var(--lightsaber-color);">${score}</div>            <p>Kyber Crystals secured.</p>            <button onclick="location.reload()" style="background:var(--jedi-purple); border:none; padding:15px 40px; border-radius:30px; color:white; font-weight:bold; cursor:pointer; margin-top:20px;">RESTART</button>`;    }</script></body></html>
