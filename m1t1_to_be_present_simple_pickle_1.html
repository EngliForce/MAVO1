<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & drop</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-purple-main: #7b2cbf;
            --hero-purple-dark: #3c096c;
            --hero-yellow: #ffb703;
            --hero-cyan: #00f5d4;
            --hero-red: #d32f2f;
            --header-bg: #ff7043;
            --header-border: var(--hero-yellow);
        }
        body { font-family: 'Lexend', sans-serif; background: #05101a; background: radial-gradient(circle at center, #1a102a 0%, #05101a 100%); color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { background: var(--header-bg); padding: 2.5rem 1rem; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); border-bottom: 5px solid var(--header-border); }
        header h1 { font-family: 'Bangers', cursive; font-size: 3rem; margin: 0; text-shadow: 4px 4px 0px var(--hero-purple-dark); }
        
        h2 { text-align: center; color: var(--hero-yellow); margin-top: 2rem; font-family: 'Bangers', cursive; font-size: 2rem; }
        
        .dropzones { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin: 2rem 0; }
        .dropzone { border: 4px solid var(--hero-cyan); border-radius: 20px; width: 200px; min-height: 160px; padding: 1rem; text-align: center; background: rgba(0, 245, 212, 0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .dropzone h3 { margin: 0 0 10px 0; color: var(--hero-yellow); font-family: 'Bangers', cursive; font-size: 3rem; background: var(--hero-purple-dark); padding: 5px 20px; border-radius: 10px; text-transform: uppercase; }
        
        .drag-items { display: flex; justify-content: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; padding: 0 1rem; min-height: 60px; }
        .drag-item { background: var(--hero-purple-main); border: 2px solid var(--hero-cyan); border-radius: 12px; padding: 0.8rem 1.5rem; font-size: 1.2rem; font-weight: bold; color: white; cursor: grab; box-shadow: 0 4px 0 var(--hero-purple-dark); transition: 0.2s; }
        
        .correct { border-color: #00ff00 !important; background: #004400 !important; }
        .incorrect { border-color: var(--hero-red) !important; background: #440000 !important; }
        
        .button-bar { text-align: center; margin-bottom: 3rem; }
        .tab-button { background: var(--hero-purple-main); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-family: 'Bangers', cursive; font-size: 1.1rem; cursor: pointer; border-bottom: 5px solid var(--hero-purple-dark); margin: 0 0.5rem; transition: 0.2s; }
        .tab-button:hover { background: var(--hero-cyan); color: var(--hero-purple-dark); transform: translateY(-3px); }
        
        footer { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); font-family: 'Bangers'; margin-top: auto; color: var(--hero-yellow); }
    </style>
</head>
<body>

    <header>
        <h1>🔤 DRAG & DROP</h1>
    </header>

    <h2>🧲 SLEEP DE WOORDEN NAAR DE JUISTE VAKKEN</h2>

    <div class="dropzones" id="dropzones-container">
        <div class="dropzone" data-group="am"><h3>am</h3></div>
        <div class="dropzone" data-group="are"><h3>are</h3></div>
        <div class="dropzone" data-group="is"><h3>is</h3></div>
    </div>

    <div class="drag-items" id="drag-items"></div>

    <div class="button-bar">
        <button class="tab-button" onclick="checkAnswers()">✔ CONTROLEER</button>
        <button class="tab-button" onclick="reset()">🔄 OPNIEUW</button>
    </div>

    <footer>
        <p>&copy; 2026, EngliForce: Make English Your Superpower!</p>
    </footer>

    <script>
        const dragContainer = document.getElementById('drag-items');
        const dropzonesContainer = document.getElementById('dropzones-container');
        let draggedItem = null;

        const items = [
            { text: 'I', correct: 'am' },
            { text: 'You', correct: 'are' },
            { text: 'He', correct: 'is' },
            { text: 'She', correct: 'is' },
            { text: 'It', correct: 'is' },
            { text: 'We', correct: 'are' },
            { text: 'You', correct: 'are' },
            { text: 'They', correct: 'are' }
        ];

        function shuffleElements(parent) {
            const children = Array.from(parent.children);
            children.sort(() => Math.random() - 0.5);
            children.forEach(child => parent.appendChild(child));
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initGame() {
            // Hussel de dropzones
            shuffleElements(dropzonesContainer);
            
            // Verwijder oude items uit dropzones bij reset
            document.querySelectorAll('.dropzone').forEach(zone => {
                const itemsInZone = zone.querySelectorAll('.drag-item');
                itemsInZone.forEach(item => dragContainer.appendChild(item));
            });

            // Hussel drag items
            dragContainer.innerHTML = '';
            const shuffledItems = [...items];
            shuffleArray(shuffledItems);

            shuffledItems.forEach(({ text, correct }) => {
                const el = document.createElement('div');
                el.className = 'drag-item';
                el.setAttribute('draggable', 'true');
                el.setAttribute('data-correct', correct);
                el.textContent = text;
                el.addEventListener('dragstart', () => draggedItem = el);
                dragContainer.appendChild(el);
            });
        }

        // Setup drop zones
        document.querySelectorAll('.dropzone').forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', () => {
                if (draggedItem) {
                    zone.appendChild(draggedItem);
                    draggedItem = null;
                }
            });
        });

        function checkAnswers() {
            document.querySelectorAll('.drag-item').forEach(item => {
                const expected = item.getAttribute('data-correct');
                const parent = item.parentElement;
                const actual = parent.getAttribute('data-group');
                item.classList.remove('correct', 'incorrect');
                if (actual && expected === actual) item.classList.add('correct');
                else item.classList.add('incorrect');
            });
        }

        function reset() {
            document.querySelectorAll('.drag-item').forEach(item => item.classList.remove('correct', 'incorrect'));
            initGame();
        }

        initGame();
    </script>
</body>
</html>
