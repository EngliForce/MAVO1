            { i: "Use 'should or shouldn't'", q: "He ________ spend all his money.", a: "shouldn't" }, 
            { i: "Use 'should or shouldn't'", q: "________ I call her?", a: "Should" },
            { i: "Translate", q: "device", a: "apparaat" }, { i: "Translate", q: "apparaat", a: "device" }, { i: "Translate", q: "network", a: "netwerk" }, { i: "Translate", q: "netwerk", a: "network" }, { i: "Translate", q: "engineering", a: "engineering" }, { i: "Translate", q: "service", a: "dienst" }, { i: "Translate", q: "dienst", a: "service" }, { i: "Translate", q: "build", a: "bouwen" }, { i: "Translate", q: "bouwen", a: "build" }, { i: "Translate", q: "prototype", a: "testmodel" }, { i: "Translate", q: "testmodel", a: "prototype" }, { i: "Translate", q: "cost", a: "kosten / prijs" }, { i: "Translate", q: "kosten", a: "cost" }, { i: "Translate", q: "charge", a: "opladen" }, { i: "Translate", q: "opladen", a: "charge" }, { i: "Translate", q: "data", a: "gegevens" }, { i: "Translate", q: "gegevens", a: "data" }, { i: "Translate", q: "touchscreen", a: "aanraakscherm" }, { i: "Translate", q: "aanraakscherm", a: "touchscreen" }, { i: "Translate", q: "brick", a: "baksteen" }
        ];

        window.onload = () => {
            const sel = document.getElementById('class-select');
            Object.keys(state.savedClasses).forEach(c => sel.add(new Option(c, c)));
        };

        function updateAttendanceList() {
            const input = document.getElementById('names-input').value;
            const names = input.split(/[,\n]/).map(n => n.trim()).filter(n => n);
            const container = document.getElementById('attendance-list');
            container.innerHTML = '';
            names.forEach(name => {
                const chip = document.createElement('div');
                chip.className = `student-chip ${state.absents.has(name) ? 'absent' : 'present'}`;
                chip.innerText = name;
                chip.onclick = () => {
                    if (state.absents.has(name)) state.absents.delete(name);
                    else state.absents.add(name);
                    updateAttendanceList();
                };
                container.appendChild(chip);
            });
        }

        function loadSavedClass() {
            const name = document.getElementById('class-select').value;
            if(name) {
                document.getElementById('class-name-input').value = name;
                document.getElementById('names-input').value = state.savedClasses[name].join(', ');
                state.absents.clear();
                updateAttendanceList();
            }
        }

        function saveAndPreview() {
            const className = document.getElementById('class-name-input').value.trim();
            const allNames = document.getElementById('names-input').value.split(/[,\n]/).map(n => n.trim()).filter(n => n);
            const tc = parseInt(document.getElementById('team-count').value);
            const presentPlayers = allNames.filter(n => !state.absents.has(n));
            if(!className || presentPlayers.length < tc) return alert("Setup niet compleet of te weinig aanwezige spelers!");
            state.savedClasses[className] = allNames;
            localStorage.setItem('pastSimpleBattle', JSON.stringify(state.savedClasses));
            state.enabledBonuses = Array.from(document.querySelectorAll('#bonus-toggles input:checked')).map(i => i.value);
            const shuffled = presentPlayers.sort(() => Math.random() - 0.5);
            state.teams = Array.from({length: tc}, (_, i) => ({ id: i, score: 0, members: [], shield: false, double: false }));
            shuffled.forEach((p, i) => state.teams[i % tc].members.push(p));
            state.maxTurnsPerTeam = Math.max(...state.teams.map(t => t.members.length));
            const cont = document.getElementById('preview-container'); cont.innerHTML = '';
            state.teams.forEach((t, i) => cont.innerHTML += `<div class="preview-card" style="background:${COLORS[i]};"><b>TEAM ${i+1}</b><div>${t.members.join('<br>')}</div></div>`);
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('preview-screen').classList.add('active');
        }

        function startGame() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = ''; state.cards = []; state.turnCounter = 0;
            let bonusQty = parseInt(document.getElementById('bonus-qty').value);
            let types = new Array(30 - bonusQty).fill('q').concat(new Array(bonusQty).fill('b')).sort(() => Math.random() - 0.5);
            let shuffledQuestions = [...QUESTION_POOL].sort(() => Math.random() - 0.5);
            let qIndex = 0;
            types.forEach((type, i) => {
                let card = { id: i, type: type, used: false };
                if(type === 'q') {
                     let currentQ = shuffledQuestions[qIndex % shuffledQuestions.length];
                    card.instruction = currentQ.i;
                    card.sentence = currentQ.q;
                    card.answer = currentQ.a;
                    qIndex++;
                }
                state.cards.push(card);
                const d = document.createElement('div'); d.className = 'card'; d.innerText = i+1;
                d.onclick = () => openCard(i, d); grid.appendChild(d);
            });
            renderGame();
            document.getElementById('preview-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
        }

        function getCurrentPlayer() {
            const teamId = state.turnCounter % state.teams.length;
            const team = state.teams[teamId];
            const roundIndex = Math.floor(state.turnCounter / state.teams.length);
            if (roundIndex >= team.members.length) {
                const randomMember = team.members[Math.floor(Math.random() * team.members.length)];
                return { name: randomMember + " (Extra!)", teamId: teamId };
            }
            return { name: team.members[roundIndex], teamId: teamId };
        }

        function openCard(idx, el) {
            const card = state.cards[idx]; if(card.used) return; card.used = true; el.classList.add('used');
            if(card.type === 'b') handleBonus(); else showQuestion(card);
        }

        function renderGame() {
            const header = document.getElementById('score-header');
             const playerInfo = getCurrentPlayer();
            header.innerHTML = '';
            state.teams.forEach((t, i) => {
                header.innerHTML += `<div class="score-box ${i === playerInfo.teamId ? 'is-active' : ''}" style="background:${COLORS[i]}">
                    <span style="font-size:20px; font-weight:bold;">TEAM ${i+1}</span><span class="points-label">${t.score}</span>
                    <div style="font-size: 24px;">${t.shield ? '🛡️' : ''} ${t.double ? '⚡' : ''}</div>
                </div>`;
            });
            document.getElementById('current-player-name').innerText = playerInfo.name;
            document.getElementById('current-player-name').style.color = COLORS[playerInfo.teamId];
        }

        function nextTurn() {
              state.turnCounter++;
              if(state.turnCounter >= state.teams.length * state.maxTurnsPerTeam) endGame();
              else renderGame();
         }

        function handleBonus() {
            const bPool = [
                { id: 'gift', t: "THE GIFT!", d: "Geef 10 gratis punten aan een ander team!", i: "🎁" },
                { id: 'swap', t: "TEAM SWAP!", d: "Wissel jouw score met een ander team!", i: "🔄" },
                { id: 'puppet', t: "PUPPET MASTER!", d: "Wissel de scores van TWEE andere teams!", i: "🎭" },
                { id: 'steal', t: "STEAL!", d: "Steel 15 punten van een team!", i: "🕵️" },
                { id: 'sniper', t: "SNIPER!", d: "Target team verliest 10 punten!", i: "🎯" },
                { id: 'taxman', t: "TAXMAN!", d: "Steel 5 punten van allen!", i: "💰" },
                { id: 'robin', t: "ROBIN HOOD!", d: "Alle ándere teams +10 punten!", i: "🏹" },
                { id: 'shield', t: "SHIELD!", d: "Beschermd tegen de volgende aanval!", i: "🛡️" },
                { id: 'double', t: "DOUBLE!", d: "Volgende goede beurt = 20 punten!", i: "⚡" },
                { id: 'badluck', t: "BAD LUCK!", d: "Jullie team verliest 10 punten.", i: "💥" }
            ].filter(b => state.enabledBonuses.includes(b.id));
            const b = bPool[Math.floor(Math.random() * bPool.length)] || {id:'robin', t:'Pech!', d:'Geen actieve bonussen.', i:'❌'};
            state.pendingBonus = b; state.puppetTargets = [];
            const tid = state.turnCounter % state.teams.length;
            document.getElementById('bonus-icon').innerText = b.i;
            document.getElementById('bonus-title').innerText = b.t;
            document.getElementById('bonus-desc').innerText = b.d;
            if(['gift', 'swap', 'puppet', 'steal', 'sniper'].includes(b.id)) {
                document.getElementById('target-picker').style.display = 'block'; document.getElementById('bonus-cont-btn').style.display = 'none';
                updateTargetButtons();
            } else {
                document.getElementById('target-picker').style.display = 'none'; document.getElementById('bonus-cont-btn').style.display = 'inline-block';
                if(b.id === 'shield') state.teams[tid].shield = true;
                if(b.id === 'double') state.teams[tid].double = true;
                if(b.id === 'badluck') state.teams[tid].score = Math.max(0, state.teams[tid].score - 10);
                if(b.id === 'robin') state.teams.forEach((t, i) => { if(i !== tid) t.score += 10; });
                if(b.id === 'taxman') state.teams.forEach((t, i) => { if(i !== tid) { let s = Math.min(5, t.score); t.score -= s; state.teams[tid].score += s; } });
            }
            document.getElementById('bonus-modal').style.display = 'flex';
        }

        function updateTargetButtons() {
            const btns = document.getElementById('target-btns'); const tid = state.turnCounter % state.teams.length;
            btns.innerHTML = '';
            state.teams.forEach((t, i) => {
                if(i === tid || state.puppetTargets.includes(i)) return;
                let d = document.createElement('div'); d.className = 'target-btn'; d.style.backgroundColor = COLORS[i];
                d.innerHTML = `TEAM ${i+1}<br><span>${t.score} PTS</span>`; d.onclick = () => applyBonus(i); btns.appendChild(d);
            });
        }

        function applyBonus(idx) {
            const tid = state.turnCounter % state.teams.length; const b = state.pendingBonus; const target = state.teams[idx];
            if(b.id === 'puppet') {
                state.puppetTargets.push(idx); if(state.puppetTargets.length < 2) { updateTargetButtons(); return; }
                let t1 = state.teams[state.puppetTargets[0]], t2 = state.teams[state.puppetTargets[1]];
                let tmp = t1.score; t1.score = t2.score; t2.score = tmp;
            } else if(target.shield && (b.id === 'steal' || b.id === 'swap')) {
                alert("Shield Blocked!"); target.shield = false;
            } else {
                if(b.id === 'gift') target.score += 10;
                if(b.id === 'swap') { let tmp = state.teams[tid].score; state.teams[tid].score = target.score; target.score = tmp; }
                if(b.id === 'steal') { let s = Math.min(15, target.score); target.score -= s; state.teams[tid].score += s; }
                if(b.id === 'sniper') target.score = Math.max(0, target.score - 10);
            }
            document.getElementById('bonus-modal').style.display = 'none'; nextTurn();
        }

        function submitResult(correct) {
            const tid = state.turnCounter % state.teams.length;
            if(correct) state.teams[tid].score += (state.teams[tid].double ? 20 : 10);
            state.teams[tid].double = false; document.getElementById('q-modal').style.display = 'none'; nextTurn();
        }

        function showQuestion(card) {
            document.getElementById('ans-box').style.display='none'; document.getElementById('btn-reveal').style.display='inline-block';
            document.getElementById('prompt-instr').innerText = card.instruction;
            document.getElementById('prompt-sentence').innerHTML = card.sentence.replace(/\n/g, '<br>');
            document.getElementById('full-answer').innerText = card.answer;
             document.getElementById('q-modal').style.display='flex';
        }

        function revealAnswer() { document.getElementById('btn-reveal').style.display = 'none'; document.getElementById('ans-box').style.display = 'block'; }
        function closeBonus() { document.getElementById('bonus-modal').style.display = 'none'; nextTurn(); }

        function endGame() {
             document.getElementById('game-screen').classList.remove('active');
             document.getElementById('winner-screen').classList.add('active');
            const sortedTeams = [...state.teams].sort((a,b) => b.score - a.score);
            const winner = sortedTeams[0];
            document.getElementById('winner-msg').innerText = `TEAM ${winner.id+1} WINT!`;
            document.getElementById('winner-members').innerText = "Teamleden: " + winner.members.join(', ');
            const board = document.getElementById('final-scoreboard');
            board.innerHTML = '<h2 style="color: white; border-bottom: 2px solid white; padding-bottom: 10px;">Eindstand:</h2>';
            sortedTeams.forEach((t, index) => {
                const row = document.createElement('div');
                row.style = `display:flex; justify-content:space-between; align-items:center; padding:15px 25px; margin:10px 0; border-radius:15px; background:${COLORS[t.id]}; font-size:28px; font-weight:bold; border:${index === 0 ? '5px solid gold' : 'none'}; color: white;`;
                row.innerHTML = `<span>${index + 1}. Team ${t.id + 1} ${index === 0 ? '🏆' : ''}</span><span>${t.score} PTS</span>`;
                board.appendChild(row);
            });
        }
    </script></body></html>
