<!DOCTYPE html><html lang="nl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Sea Treasure | EngliForce</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sea-purple: #bc13fe; --sea-glow: #e0aaff;
            --gold: #ffb703; --water-top: #1a0533; --water-bottom: #050008;
            --bubble-color: rgba(255, 255, 255, 0.4);
        }

        body {
            background: var(--water-bottom); color: #fff; font-family: 'Lexend', sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-image: linear-gradient(180deg, var(--water-top) 0%, var(--water-bottom) 100%);
        }

        header {
            background: linear-gradient(135deg, #4a148c, #1a012a);
            padding: 0.8rem; text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            border-bottom: 3px solid var(--gold); flex-shrink: 0; z-index: 10;
        }
        header h1 { font-family: 'Bangers'; font-size: 2rem; margin: 0; color: #fff; text-shadow: 0 0 10px var(--sea-purple); }
        header p { margin: 0; font-size: 0.8rem; letter-spacing: 1px; color: var(--gold); }

        #game-container {
            flex-grow: 1; display: flex; align-items: stretch; justify-content: center;
            padding: 10px 20px; box-sizing: border-box; overflow: hidden;
        }

        /* --- De Duik-Zone --- */
        #descent-zone {
            width: 80px; position: relative; margin-right: 20px;
            border-right: 1px dashed rgba(188, 19, 254, 0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .diver-track { width: 100%; height: 100%; position: relative; }
        #diver-sprite {
            font-size: 2.5rem; position: absolute; left: 50%; transform: translateX(-50%);
            top: 0%; transition: top 1s ease-in-out; z-index: 5;
            animation: swimAngle 2s infinite ease-in-out;
        }
        @keyframes swimAngle { 0%, 100% { transform: translateX(-50%) rotate(5deg); } 50% { transform: translateX(-50%) rotate(-5deg); } }

        .bubble {
            position: absolute; border-radius: 50%; background: var(--bubble-color);
            animation: bubbleUp 1.5s forwards ease-out; opacity: 0;
        }
        @keyframes bubbleUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }

        #treasure-chest { font-size: 3rem; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--gold)); position: relative; z-index: 4; }

        /* --- Het Quiz-bord --- */
        #hunt-board {
            background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 30px;
            border: 2px solid var(--sea-purple); backdrop-filter: blur(10px);
            max-width: 500px; width: 100%; text-align: center;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.2);
            align-self: center;
        }

        #sentence-box {
            font-size: 1.2rem; font-weight: bold; min-height: 90px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 25px; padding: 0 15px; line-height: 1.5;
        }

        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .btn-opt {
            background: #1a1a1a; border: 3px solid var(--sea-purple); border-radius: 20px;
            padding: 18px 5px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-opt:hover { background: var(--sea-purple); border-color: var(--gold); transform: scale(1.05); }
        .btn-opt span { font-family: 'Bangers'; font-size: 1.8rem; color: var(--gold); line-height: 1; }
        .btn-opt small { font-size: 0.6rem; color: #fff; opacity: 0.8; letter-spacing: 1px; margin-bottom: 3px; }

        .feedback { height: 30px; margin-top: 15px; font-weight: bold; font-size: 1.1rem; }

        footer {
            padding: 0.8rem; font-size: 0.75rem; text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; color: #aaa;
        }

        #win-screen h2 { font-family: 'Bangers'; font-size: 2.5rem; color: var(--gold); margin: 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <h1>DEEP SEA TREASURE</h1>
    <p>MASTER IN, ON, AT (A1/A2)</p>
</header>

<div id="game-container">
    <div id="descent-zone">
        <div class="diver-track">
            <div id="diver-sprite">🤿</div>
        </div>
        <div id="treasure-chest">💰</div>
    </div>

    <div id="hunt-board">
        <div id="sentence-box">Laden...</div>
        <div class="btn-grid">
            <div class="btn-opt" onclick="check('in')"><small>LOCATION</small><span>IN</span></div>
            <div class="btn-opt" onclick="check('on')"><small>LOCATION</small><span>ON</span></div>
            <div class="btn-opt" onclick="check('at')"><small>LOCATION</small><span>AT</span></div>
        </div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div id="win-screen" class="hidden" style="text-align: center; align-self: center;">
        <div style="font-size: 5rem; margin-bottom: 10px;">🏆</div>
        <h2>TREASURE FOUND!</h2>
        <p>You completed your mission!</p>
        <button onclick="location.reload()" style="background:var(--sea-purple); border:none; color:white; padding:12px 30px; border-radius:20px; cursor:pointer; font-weight:bold; margin-top:15px; font-family:'Lexend';">DIVE AGAIN</button>
    </div>
</div>

<footer>
    © 2026, EngliForce: Make English Your Superpower!
</footer>

        {q: "The shoes are ___ the rug.", c: "on"}, {q: "He is ___ the deck.", c: "on"}, {q: "She is ___ the balcony.", c: "on"}, {q: "I am ___ the guest list.", c: "on"}, {q: "The stain is ___ the shirt.", c: "on"},

        {q: "Meet me ___ the bus stop.", c: "at"}, {q: "He is ___ home.", c: "at"}, {q: "She is ___ school.", c: "at"}, {q: "I am ___ work.", c: "at"}, {q: "I'll see you ___ the station.", c: "at"},

    ];

    // Automatische aanvulling voor demonstratie (vul dit aan met jouw 150 zinnen)
    while(db.length < 150) {
        db.push({q: "The diver found a secret ___ the sand.", c: "in"});
    }

    let currentIdx = 0;
    let progress = 0;
    let activeQuestions = db.sort(() => 0.5 - Math.random()).slice(0, 10);

    function loadQ() {
        if (currentIdx >= 10) { showWin(); return; }
        document.getElementById('sentence-box').innerText = activeQuestions[currentIdx].q;
        document.getElementById('feedback').innerText = "";
    }

    function check(ans) {
        const correct = activeQuestions[currentIdx].c;
        const fb = document.getElementById('feedback');
        const diver = document.getElementById('diver-sprite');

        if (ans === correct) {
            fb.innerText = "SPLASH! CORRECT! 🌊"; fb.style.color = "var(--sea-glow)";
            progress += 10;
            diver.style.top = (progress * 0.85) + "%"; 
            createBubbles();
        } else {
            fb.innerText = `BUBBLES! Correct was: ${correct.toUpperCase()}`;
            fb.style.color = "#ff003c";
        }
        currentIdx++; 
        setTimeout(loadQ, 1300);
    }

    function createBubbles() {
        const track = document.querySelector('.diver-track');
        for (let i = 0; i < 6; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.style.width = (Math.random() * 8 + 4) + "px";
            b.style.height = b.style.width;
            b.style.left = (40 + Math.random() * 20) + "%";
            b.style.top = document.getElementById('diver-sprite').style.top;
            track.appendChild(b);
            setTimeout(() => b.remove(), 1500);
        }
    }

    function showWin() {
        document.getElementById('descent-zone').classList.add('hidden');
        document.getElementById('hunt-board').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');
    }
    
    loadQ();
</script>
</body></html>
