<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Master - iPad Pro Edition</title>
    <style>
        :root {
            --bg: #050a14;
            --glass: rgba(255, 255, 255, 0.12);
            --neon-cyan: #00ffff;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffff00;
            --neon-green: #39ff14;
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050a14 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; color: white; overflow: hidden;
            touch-action: manipulation;
        }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 40px;
            padding: 2.5rem; box-shadow: 0 0 60px rgba(0,0,0,0.8);
            text-align: center; 
            width: 92vw; 
            max-width: 700px; /* Groter voor iPad Pro/Air */
            z-index: 10;
        }

        h1 { color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); margin: 0; font-size: 2.5rem; }
        
        #setup-screen, #game-screen, #result-screen { width: 100%; display: none; }
        #setup-screen { display: block; }

        .selector-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-opt { 
            padding: 15px 22px; font-size: 1.1rem; background: rgba(255,255,255,0.08); 
            border: 2px solid rgba(255,255,255,0.2); color: white; border-radius: 20px; cursor: pointer; transition: 0.2s;
        }
        .btn-opt.active { 
            background: var(--neon-cyan); color: black; border-color: var(--neon-cyan); box-shadow: 0 0 20px var(--neon-cyan); 
        }

        /* Dynamische klokgrootte */
        #clock-wrapper { 
            width: 45vh; height: 45vh; 
            min-width: 300px; min-height: 300px;
            max-width: 500px; max-height: 500px;
            display: flex; align-items: center; justify-content: center; 
            margin: 20px auto; position: relative; 
        }
        #clock-canvas { width: 100% !important; height: 100% !important; }

        #digital-display { font-size: 6rem; font-family: 'Courier New', monospace; color: var(--neon-cyan); text-shadow: 0 0 30px var(--neon-cyan); display: none; }
        #target-display { font-size: 1.8rem; font-weight: bold; min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; margin-bottom: 10px; }

        .stat-box { display: flex; justify-content: space-between; font-size: 1.2rem; margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 15px 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }

        button.action-btn { 
            width: 100%; padding: 25px; border-radius: 60px; border: none; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; font-size: 1.5rem; margin-top: 20px; 
            -webkit-tap-highlight-color: transparent; 
        }
        .primary { background: var(--neon-pink); color: white; box-shadow: 0 0 25px var(--neon-pink); }
        .success { background: var(--neon-green); color: black; box-shadow: 0 0 25px var(--neon-green); }

        #feedback-box { margin: 20px 0; min-height: 100px; }
        .stopped-info { background: rgba(255, 255, 0, 0.1); border: 2px solid var(--neon-yellow); color: var(--neon-yellow); padding: 15px; border-radius: 20px; font-size: 1.2rem; }
        
        label { font-size: 1rem; color: var(--neon-yellow); text-transform: uppercase; display: block; margin-top: 20px; letter-spacing: 1px; }

        .turn-indicator { padding: 10px 30px; border-radius: 30px; font-weight: bold; margin-bottom: 15px; display: inline-block; font-size: 1.2rem; }
        .p1-turn { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }
        .p2-turn { background: var(--neon-pink); color: white; box-shadow: 0 0 15px var(--neon-pink); }
        
        input[type=number] { 
            background: none; border: 2px solid var(--neon-cyan); color: white; font-size: 1.5rem; 
            padding: 10px; border-radius: 15px; width: 80px; text-align: center; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div id="setup-screen">
        <h1>Time Master Duo</h1>
        <div style="margin: 20px 0;">
            <label>Aantal Spelers</label>
            <div class="selector-group">
                <button class="btn-opt active" onclick="setPlayers(1, this)">1 Speler</button>
                <button class="btn-opt" onclick="setPlayers(2, this)">2 Spelers</button>
            </div>

            <label>Klok Type</label>
            <div class="selector-group">
                <button class="btn-opt active" onclick="setClockMode('analog', this)">Analog</button>
                <button class="btn-opt" onclick="setClockMode('digital', this)">Digital</button>
                <button class="btn-opt" onclick="setClockMode('mixed', this)">Mixed</button>
            </div>

            <label>Aantal Ronden</label>
            <input type="number" id="rounds-input" value="3" min="1">
        </div>
        <button class="action-btn primary" onclick="initGame()">Start Spel</button>
    </div>

    <div id="game-screen">
        <div id="turn-display" class="turn-indicator p1-turn">Speler 1</div>
        <div class="stat-box">
            <div id="p1-stats">P1: <span id="p1-score">0</span></div>
            <div id="round-display">Ronde: <span id="cur-round">1</span></div>
            <div id="p2-stats" style="display:none;">P2: <span id="p2-score">0</span></div>
        </div>
        <div id="target-display"></div>
        
        <div id="clock-wrapper">
            <canvas id="clock-canvas" width="500" height="500"></canvas>
            <div id="digital-display">00:00</div>
        </div>

        <div id="speed-control-container">
            <label>Snelheid:</label>
            <div class="selector-group">
                <button class="btn-opt" onclick="setSpeed(0.2, this)">Very Slow</button>
                <button class="btn-opt" onclick="setSpeed(0.8, this)">Slow</button>
                <button class="btn-opt active" onclick="setSpeed(1.5, this)">Average</button>
                <button class="btn-opt" onclick="setSpeed(3, this)">Fast</button>
            </div>
        </div>

        <div id="feedback-box"></div>
        <button id="stop-btn" class="action-btn primary">STOP (of Spatie)</button>
        <button id="next-btn" class="action-btn success" style="display:none;">VOLGENDE</button>
    </div>

    <div id="result-screen">
        <h1>Eindscore</h1>
        <div id="final-stats" style="margin: 30px 0; line-height: 1.8; font-size: 1.5rem;"></div>
        <button class="action-btn primary" onclick="location.reload()">Opnieuw Spelen</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
    const canvas = document.getElementById('clock-canvas');
    const ctx = canvas.getContext('2d');
    const digital = document.getElementById('digital-display');
    const radius = canvas.width / 2;
    ctx.translate(radius, radius);

    let config = { clockType: 'analog', speed: 1.5, rounds: 3, numPlayers: 1 };
    let state = { currentPlayer: 1, currentRound: 1, p1Score: 0, p2Score: 0, currentMinExact: 0, targetMin: 0, isRunning: false, activeType: 'analog', cycleMax: 720 };

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && state.isRunning) { e.preventDefault(); handleStop(); }
    });

    function setPlayers(n, btn) { config.numPlayers = n; toggleActive(btn); }
    function setClockMode(m, btn) { config.clockType = m; toggleActive(btn); }
    function setSpeed(val, btn) { config.speed = val; toggleActive(btn); }
    function toggleActive(btn) { Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

    function getEnglishTimeText(totalMin) {
        let total = Math.floor(totalMin);
        let m = total % 60;
        let h12 = (Math.floor(total / 60) % 12) || 12;
        const words = ["twelve", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten", "eleven", "twelve", "thirteen", "fourteen", "quarter", "sixteen", "seventeen", "eighteen", "nineteen", "twenty", "twenty-one", "twenty-two", "twenty-three", "twenty-four", "twenty-five", "twenty-six", "twenty-seven", "twenty-eight", "twenty-nine", "half"];
        if (m === 0) return `${words[h12]} o'clock`;
        if (m <= 30) return `${words[m]} past ${words[h12]}`;
        let nextH = (h12 % 12) + 1;
        return `${words[60 - m]} to ${words[nextH]}`;
    }

    function draw() {
        if (!state.isRunning) return;
        let exactTime = state.currentMinExact % state.cycleMax;

        if (state.activeType === 'analog') {
            canvas.style.display = 'block'; digital.style.display = 'none';
            ctx.clearRect(-radius, -radius, canvas.width, canvas.height);
            ctx.beginPath(); ctx.arc(0, 0, radius * 0.92, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fill();
            ctx.strokeStyle = state.currentPlayer === 1 ? '#00ffff' : '#ff00ff'; ctx.lineWidth = 6; ctx.stroke();
            
            ctx.font = "bold 24px Arial"; ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            for (let i = 1; i <= 60; i++) {
                let angle = i * Math.PI / 30;
                ctx.rotate(angle);
                if (i % 5 === 0) {
                    ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 5;
                    ctx.moveTo(0, -radius * 0.82); ctx.lineTo(0, -radius * 0.9); ctx.stroke();
                    ctx.save(); ctx.translate(0, -radius * 0.72); ctx.rotate(-angle); ctx.fillText(i/5, 0, 0); ctx.restore();
                } else {
                    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
                    ctx.moveTo(0, -radius * 0.86); ctx.lineTo(0, -radius * 0.9); ctx.stroke();
                }
                ctx.rotate(-angle);
            }
            const hPos = (exactTime / 60) * (Math.PI / 6); 
            const mPos = (exactTime % 60) * (Math.PI / 30);
            drawHand(hPos, radius * 0.48, 14, '#ff00ff');
            drawHand(mPos, radius * 0.82, 8, '#00ffff');
        } else {
            canvas.style.display = 'none'; digital.style.display = 'flex';
            let h = Math.floor(exactTime / 60).toString().padStart(2, '0');
            let m = Math.floor(exactTime % 60).toString().padStart(2, '0');
            digital.textContent = `${h}:${m}`;
        }
        state.currentMinExact = (state.currentMinExact + (config.speed / 5)) % state.cycleMax;
        requestAnimationFrame(draw);
    }

    function drawHand(angle, len, width, color) {
        ctx.beginPath(); ctx.lineWidth = width; ctx.lineCap = "round";
        ctx.strokeStyle = color; ctx.shadowBlur = 15; ctx.shadowColor = color;
        ctx.moveTo(0, 0); ctx.rotate(angle - Math.PI/2); ctx.lineTo(len, 0); ctx.stroke();
        ctx.rotate(-(angle - Math.PI/2)); ctx.shadowBlur = 0;
    }

    function initGame() {
        config.rounds = parseInt(document.getElementById('rounds-input').value) || 3;
        state.currentRound = 1; state.currentPlayer = 1; state.p1Score = 0; state.p2Score = 0;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        if(config.numPlayers == 2) document.getElementById('p2-stats').style.display = 'block';
        startRound();
    }

    function startRound() {
        const td = document.getElementById('turn-display');
        td.textContent = `Beurt: Speler ${state.currentPlayer}`;
        td.className = `turn-indicator ${state.currentPlayer === 1 ? 'p1-turn' : 'p2-turn'}`;
        state.activeType = config.clockType === 'mixed' ? (Math.random() > 0.5 ? 'analog' : 'digital') : config.clockType;
        state.cycleMax = (state.activeType === 'analog') ? 720 : 1440;
        let randomHours = (state.activeType === 'analog') ? Math.floor(Math.random() * 12) : Math.floor(Math.random() * 24);
        state.targetMin = randomHours * 60 + (Math.floor(Math.random() * 12) * 5);
        document.getElementById('target-display').innerHTML = `Stop op:<br><span style="color:var(--neon-yellow); font-size: 2.2rem;">${getEnglishTimeText(state.targetMin)}</span>`;
        state.currentMinExact = (state.targetMin + 400 + Math.random() * 300) % state.cycleMax;
        document.getElementById('feedback-box').innerHTML = "";
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'block';
        document.getElementById('cur-round').textContent = state.currentRound;
        state.isRunning = true;
        draw();
    }

    function handleStop() {
        if(!state.isRunning) return;
        state.isRunning = false;
        const finalMin = Math.floor(state.currentMinExact) % state.cycleMax;
        const diff = Math.min(Math.abs(finalMin - state.targetMin), state.cycleMax - Math.abs(finalMin - state.targetMin));
        if(state.currentPlayer === 1) { state.p1Score += diff; document.getElementById('p1-score').textContent = state.p1Score; } 
        else { state.p2Score += diff; document.getElementById('p2-score').textContent = state.p2Score; }
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('feedback-box').innerHTML = `
            <div style="font-size: 1.8rem; margin-bottom: 10px; color: ${diff === 0 ? 'var(--neon-green)' : 'var(--neon-pink)'}">
                ${diff === 0 ? 'PERFECT! 🏆' : 'Penalty: ' + diff + ' min'}
            </div>
            <div class="stopped-info">Je stopte op: <strong>${getEnglishTimeText(finalMin)}</strong></div>`;
        if(diff === 0) confetti({ particleCount: 200, spread: 90, origin: { y: 0.7 } });
        document.getElementById('next-btn').style.display = 'block';
    }

    document.getElementById('stop-btn').onclick = handleStop;

    document.getElementById('next-btn').onclick = () => {
        if (config.numPlayers == 2) {
            if (state.currentPlayer === 1) { state.currentPlayer = 2; startRound(); } 
            else { 
                if (state.currentRound < config.rounds) { state.currentRound++; state.currentPlayer = 1; startRound(); } 
                else { showResults(); }
            }
        } else {
            if (state.currentRound < config.rounds) { state.currentRound++; startRound(); } 
            else { showResults(); }
        }
    };

    function showResults() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        let res = `<div style="color:var(--neon-cyan)">Speler 1: ${state.p1Score} pnt</div>`;
        if(config.numPlayers == 2) {
            res += `<div style="color:var(--neon-pink)">Speler 2: ${state.p2Score} pnt</div><br>`;
            if(state.p1Score < state.p2Score) res += "<strong style='font-size:2rem; color:var(--neon-green)'>🏆 SPELER 1 WINT!</strong>";
            else if(state.p2Score < state.p1Score) res += "<strong style='font-size:2rem; color:var(--neon-green)'>🏆 SPELER 2 WINT!</strong>";
            else res += "<strong>GELIJKSPEL!</strong>";
        }
        document.getElementById('final-stats').innerHTML = res;
        confetti({ particleCount: 300, spread: 120, origin: { y: 0.6 } });
    }
</script>
</body>
</html>
