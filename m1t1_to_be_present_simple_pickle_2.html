<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reflex Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
        --hero-purple-main: #7b2cbf;
        --hero-purple-dark: #3c096c;
        --hero-yellow: #ffb703;
        --hero-cyan: #00f5d4;
        --hero-red: #d32f2f;
        --hero-green: #2ecc71;
        --header-bg: #ff7043;
    }
    body { font-family: 'Lexend', sans-serif; background: #05101a; background: radial-gradient(circle at center, #1a102a 0%, #05101a 100%); color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; text-align: center; transition: background 0.3s; }
    .flash-correct { background: #064a2a !important; }
    .flash-incorrect { background: #641e16 !important; }
    header { background: var(--header-bg); padding: 2rem 1rem; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); border-bottom: 5px solid var(--hero-yellow); }
    header h1 { font-family: 'Bangers', cursive; font-size: 3rem; margin: 0; text-shadow: 4px 4px 0px var(--hero-purple-dark); }
    .game-container { padding: 2rem; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn { background: var(--hero-purple-main); color: white; border: none; padding: 15px 30px; margin: 0.5rem; border-radius: 50px; font-family: 'Bangers', cursive; font-size: 1.2rem; cursor: pointer; border-bottom: 5px solid var(--hero-purple-dark); transition: 0.2s; }
    .btn:hover { background: var(--hero-cyan); color: var(--hero-purple-dark); transform: translateY(-3px); }
    .btn.active { background: var(--hero-cyan); color: var(--hero-purple-dark); border-bottom-color: #00a892; }
    .stars { font-size: 2.5rem; color: var(--hero-yellow); margin-bottom: 1rem; }
    .score { font-size: 1.5rem; color: var(--hero-cyan); font-family: 'Bangers'; margin-bottom: 1rem; }
    .sentence-wrapper { height: 80px; display: flex; justify-content: center; align-items: center; margin: 2rem 0; }
    .sentence { font-size: 2rem; font-weight: bold; color: white; background: rgba(255,255,255,0.1); padding: 1rem 2rem; border-radius: 15px; border: 2px solid var(--hero-cyan); }
    .hidden { display: none; }
  </style>
</head>
<body>

<header><h1>💥 REFLEX GAME</h1></header>

<div class="game-container">
  <div id="setup-screen">
    <h2 style="font-family: 'Bangers'; color: var(--hero-cyan);">KIES MODUS:</h2>
    <button class="btn" id="btn-full" onclick="selectMode('full')">VOLLEDIG</button>
    <button class="btn" id="btn-short" onclick="selectMode('short')">AFKORTING</button>
    <h2 style="font-family: 'Bangers'; color: var(--hero-cyan); margin-top:2rem;">KIES SNELHEID:</h2>
    <button class="btn" onclick="selectLevel(1)">1</button><button class="btn" onclick="selectLevel(2)">2</button><button class="btn" onclick="selectLevel(3)">3</button><button class="btn" onclick="selectLevel(4)">4</button><button class="btn" onclick="selectLevel(5)">5</button>
    <div style="margin-top: 2rem;"><button class="btn" id="startBtn" onclick="startGame()" disabled>▶ START SPEL</button></div>
  </div>

  <div id="game" class="hidden">
    <div class="stars" id="stars">⭐ ⭐ ⭐</div>
    <div class="score" id="score">SCORE: 0</div>
    <div class="sentence-wrapper"><div class="sentence" id="sentence">...</div></div>
    <div class="answer-buttons">
      <button class="btn" id="btn-am"></button><button class="btn" id="btn-are"></button><button class="btn" id="btn-is"></button>
    </div>
  </div>

  <div id="game-over" class="hidden">
    <h2 style="font-family: 'Bangers'; font-size: 3rem; color: var(--hero-red);">GAME OVER!</h2>
    <p id="final-score" style="font-size: 1.5rem;"></p>
    <button class="btn" onclick="window.location.reload()">🔄 OPNIEUW</button>
  </div>
</div>

<script>
  const sentenceEl = document.getElementById('sentence');
  let mode = '', levelSpeed = 0, selectedLevel = 0, sentences = [], currentIndex = 0, score = 0, lives = 3;
  const levelSpeeds = { 1: 10000, 2: 8000, 3: 6000, 4: 4000, 5: 2500 };

  // 100 vragen gegenereerd
  const allSentences = Array.from({ length: 100 }, (_, i) => {
    const subs = ['I', 'You', 'He', 'She', 'It', 'We', 'They', 'John', 'The cat', 'My friends'];
    const sub = subs[i % subs.length];
    let correct = sub === 'I' ? 'am' : (['He', 'She', 'It', 'John', 'The cat'].includes(sub) ? 'is' : 'are');
    return { 
        sentence: `${sub} ___ there.`, 
        correctFull: correct, 
        correctShort: correct === 'am' ? "'m" : (correct === 'is' ? "'s" : "'re") 
    };
  });

  function selectMode(s) { mode = s; document.querySelectorAll('#btn-full, #btn-short').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); updateButtons(); checkReady(); }
  function updateButtons() { document.getElementById('btn-am').textContent = mode === 'short' ? "'m" : "am"; document.getElementById('btn-are').textContent = mode === 'short' ? "'re" : "are"; document.getElementById('btn-is').textContent = mode === 'short' ? "'s" : "is"; }
  function selectLevel(l) { selectedLevel = l; levelSpeed = levelSpeeds[l]; checkReady(); }
  function checkReady() { if(mode && selectedLevel) document.getElementById('startBtn').disabled = false; }

  function startGame() {
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    sentences = [...allSentences].sort(() => Math.random() - 0.5);
    showSentence();
  }

  function showSentence() {
    if (currentIndex >= sentences.length) return gameOver();
    sentenceEl.textContent = sentences[currentIndex].sentence.replace('___', '...');
    clearTimeout(sentenceEl.timeoutId);
    sentenceEl.timeoutId = setTimeout(loseLife, levelSpeed);
  }

  function submitAnswer(choice) {
    clearTimeout(sentenceEl.timeoutId);
    const correct = mode === 'short' ? sentences[currentIndex].correctShort : sentences[currentIndex].correctFull;
    const isCorrect = choice === correct;
    document.body.classList.add(isCorrect ? 'flash-correct' : 'flash-incorrect');
    setTimeout(() => document.body.classList.remove('flash-correct', 'flash-incorrect'), 300);
    if (isCorrect) score++; else lives--;
    updateUI();
    if (lives <= 0) gameOver(); else { currentIndex++; showSentence(); }
  }

  function loseLife() { lives--; updateUI(); if(lives <= 0) gameOver(); else { currentIndex++; showSentence(); } }
  function updateUI() { document.getElementById('score').textContent = `SCORE: ${score}`; document.getElementById('stars').textContent = '⭐ '.repeat(lives); }
  function gameOver() { document.getElementById('game').classList.add('hidden'); document.getElementById('game-over').classList.remove('hidden'); document.getElementById('final-score').textContent = `Eindscore: ${score}`; }

  document.getElementById('btn-am').onclick = () => submitAnswer(document.getElementById('btn-am').textContent);
  document.getElementById('btn-are').onclick = () => submitAnswer(document.getElementById('btn-are').textContent);
  document.getElementById('btn-is').onclick = () => submitAnswer(document.getElementById('btn-is').textContent);
</script>
</body>
</html>
