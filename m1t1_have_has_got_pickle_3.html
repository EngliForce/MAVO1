            --header-bg: #ff7043; --hero-red: #d32f2f;
            --hero-green: #2a9d8f;
        }

        html, body { height: 100vh; width: 100vw; margin: 0; overflow: hidden; background: radial-gradient(circle at center, #1a102a 0%, #05101a 100%); font-family: 'Lexend', sans-serif; color: white; display: flex; flex-direction: column; }
        header { background: var(--header-bg); padding: 1rem; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); border-bottom: 5px solid var(--hero-yellow); flex-shrink: 0; }
        h1 { font-family: 'Bangers', cursive; font-size: 2.2rem; margin: 0; text-shadow: 2px 2px 0px var(--hero-purple-dark); }
        main { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; overflow: hidden; }
        
        .game-panel { background: rgba(26, 16, 42, 0.9); border: 2px solid var(--hero-purple-main); border-radius: 20px; padding: 20px; width: 95%; max-width: 600px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        
        /* Input velden */
        input { background: rgba(255,255,255,0.1); border: 2px solid var(--hero-yellow); color: white; padding: 12px; border-radius: 10px; width: 45%; max-width: 150px; text-align: center; font-family: 'Lexend'; font-size: 1rem; margin: 5px; outline: none; box-sizing: border-box; }
        input::placeholder { color: rgba(255,255,255,0.5); }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 15px auto; max-width: 300px; }
        .cell { aspect-ratio: 1/1; background-color: #d4edda; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.2s; color: #333; font-weight: bold; }
        .cell.clicked { background-color: var(--hero-red); cursor: not-allowed; }
        
        .btn-action { background: var(--hero-purple-main); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-family: 'Bangers'; font-size: 1rem; cursor: pointer; margin: 10px; border-bottom: 4px solid var(--hero-purple-dark); }
        
        /* Knop Stijlen */
        #options-container { min-height: 150px; display: flex; flex-direction: column; justify-content: center; }
        .btn-option { width: 100%; margin: 8px 0; display: block; font-size: 1.3rem; padding: 15px; border-radius: 12px; background: #5a189a; border: 3px solid var(--hero-yellow); color: white; font-family: 'Lexend'; cursor: pointer; transition: 0.2s; }
        .btn-option:hover:not(:disabled) { background: var(--hero-cyan); color: #000; font-weight: bold; }
        
        .btn-option:disabled { cursor: default; }
        .btn-option.correct { background: var(--hero-green) !important; border-color: #fff !important; }
        .btn-option.wrong { background: var(--hero-red) !important; border-color: #fff !important; }
        
        footer { text-align: center; padding: 15px; background: rgba(0,0,0,0.3); font-family: 'Bangers'; font-size: 1rem; border-top: 2px solid rgba(0,0,0,0.2); flex-shrink: 0; }
        .footer-highlight { color: var(--hero-yellow); }
    </style>
</head>

    let state = { players: [], currentPlayer: 0, treasureIndex: -1, canChoose: false, currentCorrect: "" };

    function initGame(num) {
        document.getElementById('name-inputs').innerHTML = `
            <br>
            <input id="p1" placeholder="Name 1" maxlength="10"> 
            ${num > 1 ? '<input id="p2" placeholder="Name 2" maxlength="10">' : ''} 
            <br><br>
            <button class="btn-action" onclick="start(${num})">START GAME</button>`;
    }

    function start(num) {
        state.players = num === 1 ? [document.getElementById('p1').value || 'Player 1'] : [document.getElementById('p1').value || 'Player 1', document.getElementById('p2').value || 'Player 2'];
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        resetGame();
    }

    function resetGame() {
        state.treasureIndex = Math.floor(Math.random() * 25);
        state.currentPlayer = 0;
        state.canChoose = false;
        document.getElementById('winner-text').textContent = "";
        document.getElementById('play-again-btn').style.display = 'none';
        document.getElementById('grid').style.pointerEvents = 'auto';
        renderGrid();
        nextTurn();
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for(let i=0; i<25; i++) {
            const div = document.createElement('div');
            div.className = 'cell';
            div.onclick = () => {
                if(!state.canChoose || div.classList.contains('clicked')) return;
                if(i === state.treasureIndex) {
                    div.innerHTML = "💰";
                    document.getElementById('winner-text').textContent = state.players[state.currentPlayer] + " WINS!";
                    state.canChoose = false;
                    document.getElementById('play-again-btn').style.display = 'inline-block';
                    document.getElementById('grid').style.pointerEvents = 'none';
                    document.getElementById('options-container').innerHTML = '';
                } else {
                    div.classList.add('clicked');
                    state.currentPlayer = (state.currentPlayer + 1) % state.players.length;
                    nextTurn();
                }
            };
            grid.appendChild(div);
        }
    }

    function nextTurn() {
        state.canChoose = false;
        const q = questions[Math.floor(Math.random() * questions.length)];
        state.currentCorrect = q.correct;
        
        document.getElementById('turn-display').textContent = state.players[state.currentPlayer] + "'s turn";
        document.getElementById('task-box').textContent = q.task;
        document.getElementById('base-sentence').textContent = q.base;
        
        const cont = document.getElementById('options-container');
        cont.innerHTML = '';
        const options = [q.correct, q.distractor].sort(() => Math.random() - 0.5);
        
        options.forEach(opt => {
             const b = document.createElement('button');
             b.className = 'btn-option'; b.textContent = opt;
             b.onclick = () => {
                const allButtons = document.querySelectorAll('.btn-option');
                allButtons.forEach(btn => btn.disabled = true);
                
                if(opt === state.currentCorrect) {
                    b.classList.add('correct');
                    state.canChoose = true;
                    document.getElementById('turn-display').textContent = "Correct! Choose a square!";
                } else {
                    b.classList.add('wrong');
                    allButtons.forEach(btn => {
                        if(btn.textContent === state.currentCorrect) btn.classList.add('correct');
                    });
                    document.getElementById('turn-display').textContent = "Wrong! Next player.";
                    setTimeout(() => {
                        state.currentPlayer = (state.currentPlayer + 1) % state.players.length;
                        nextTurn();
                    }, 2000);
                }
             };
             cont.appendChild(b);
        });
