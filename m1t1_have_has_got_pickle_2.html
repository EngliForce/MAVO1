<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngliForce Academy: Pickle 2 - Have Got Reflex Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --hero-purple-main: #7b2cbf;
            --hero-purple-dark: #3c096c;
            --hero-yellow: #ffb703;
            --hero-cyan: #00f5d4;
            --hero-red: #d32f2f;
            --header-bg: #ff7043;
            --color-have: #00f5d4;
            --color-has: #ffb703;
        }
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background: radial-gradient(circle at center, #1a102a 0%, #05101a 100%); 
            color: white; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh; /* Zorgt ervoor dat de body de hele pagina vult */
        }
        
        header { 
            background: var(--header-bg); 
            padding: 1.5rem 1rem; 
            text-align: center; 
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); 
            border-bottom: 5px solid var(--hero-yellow); 
            width: 100%;
            box-sizing: border-box;
        }
        
        h1 { 
            font-family: 'Bangers', cursive; 
            font-size: 2.5rem; 
            margin: 0; 
            text-shadow: 3px 3px 0px var(--hero-purple-dark); 
            letter-spacing: 2px;
        }

        h2 {
            font-family: 'Bangers', cursive;
            font-size: 1.6rem;
            color: var(--hero-cyan);
            margin-top: 10px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px var(--hero-purple-dark);
            letter-spacing: 1px;
        }
        
        main { 
            max-width: 750px; 
            width: 95%; 
            margin: 10px auto; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1; /* Duwt de footer automatisch naar de absolute bodem */
        }

        .game-panel {
            background: rgba(26, 16, 42, 0.85);
            border: 2px solid var(--hero-purple-main);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .btn-action {
            background: var(--hero-purple-main);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Bangers';
            font-size: 1.1rem;
            cursor: pointer;
            margin: 6px;
            letter-spacing: 1px;
            border-bottom: 4px solid var(--hero-purple-dark);
            transition: 0.2s;
        }

        .btn-action:hover {
            background: var(--hero-cyan);
            color: var(--hero-purple-dark);
            transform: translateY(-2px);
        }

        .btn-action:active {
            transform: translateY(1px);
            border-bottom-width: 2px;
        }

        .btn-action.active {
            background: var(--hero-cyan) !important;
            color: var(--hero-purple-dark) !important;
            border-bottom-color: #00b39b !important;
            box-shadow: 0 0 12px rgba(0, 245, 212, 0.4);
        }

        .btn-action:disabled {
            background: #444 !important;
            border-bottom-color: #222 !important;
            color: #888 !important;
            cursor: not-allowed;
            transform: none !important;
        }

        .stars {
            font-size: 2rem;
            color: var(--hero-yellow);
            text-shadow: 0 0 10px rgba(255, 183, 3, 0.5);
            margin-bottom: 5px;
        }

        .score-board {
            font-family: 'Bangers', cursive;
            font-size: 1.4rem;
            color: var(--hero-cyan);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .sentence-wrapper {
            background: rgba(5, 16, 26, 0.8);
            border: 2px solid var(--hero-purple-main);
            border-radius: 15px;
            padding: 15px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }

        .sentence {
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.4;
        }

        .sentence .gap {
            color: var(--hero-yellow);
            text-decoration: underline;
        }

        #level-up-message {
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            color: var(--hero-yellow);
            text-shadow: 0 0 10px rgba(255, 183, 3, 0.8);
            margin-bottom: 5px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .hidden {
            display: none !important;
        }

        /* De footer staat nu weer netjes onderaan de pagina buiten de paarse box */
        footer { 
            text-align: center; 
            padding: 15px; 
            background: rgba(0,0,0,0.3); 
            font-family: 'Bangers'; 
            font-size: 1.1rem; 
            margin-top: auto; /* Zorgt ervoor dat de footer altijd onderaan aansluit */
            width: 100%;
            box-sizing: border-box;
            border-top: 2px solid rgba(255,255,255,0.05);
        }
        
        .footer-highlight { 
            color: var(--hero-yellow); 
        }
    </style>
</head>
<body>

<header>
    <h1>💥 PICKLE 2: HAVE GOT REFLEX</h1>
</header>

<main>
    <div class="game-panel">
        <div id="setup-screen">
            <h2>Kies modus:</h2>
            <button class="btn-action" id="btn-full" onclick="selectMode('full')">Volledige vormen</button>
            <button class="btn-action" id="btn-short" onclick="selectMode('short')">Afkortingen</button>

            <h2>Kies snelheid (level):</h2>
            <div id="level-buttons-container">
                <button class="btn-action btn-lvl" onclick="selectLevel(1, this)">1 (langzaam)</button>
                <button class="btn-action btn-lvl" onclick="selectLevel(2, this)">2</button>
                <button class="btn-action btn-lvl" onclick="selectLevel(3, this)">3</button>
                <button class="btn-action btn-lvl" onclick="selectLevel(4, this)">4</button>
                <button class="btn-action btn-lvl" onclick="selectLevel(5, this)">5 (snel)</button>
            </div>

            <div style="margin-top: 20px;">
                <button class="btn-action" id="startBtn" onclick="startGame()" style="background: #1b4332; border-bottom-color: #112a1f; padding: 12px 35px; font-size: 1.3rem;" disabled>▶ START GAME</button>
            </div>
        </div>

        <div id="game" class="hidden">
            <div class="stars" id="stars">⭐ ⭐ ⭐</div>
            <div class="score-board" id="score">Score: 0</div>
            <div id="level-up-message" class="hidden">⚡ LEVEL UP! SNELLER! ⚡</div>
            
            <div class="sentence-wrapper">
                <div class="sentence" id="sentence">...</div>
            </div>
            
            <div style="margin-top: 15px;">
                <button class="btn-action" id="btn-have-got" style="min-width: 130px; font-size: 1.2rem; padding: 12px 25px;"></button>
                <button class="btn-action" id="btn-has-got" style="min-width: 130px; font-size: 1.2rem; padding: 12px 25px;"></button>
            </div>
        </div>

        <div id="game-over" class="hidden">
            <h2 style="color: var(--hero-red);">😢 GAME OVER!</h2>
            <p id="final-score" style="font-size: 1.3rem; margin: 15px 0; font-weight: bold;"></p>
            <button class="btn-action" onclick="resetGameSetup()" style="background: var(--hero-purple-main); padding: 12px 30px; font-size: 1.2rem;">🔄 OPNIEUW SPELEN</button>
        </div>
    </div>
</main>

<footer>
    <div class="footer-text">&copy; 2026, EngliForce: <span class="footer-highlight">Make English Your Superpower!</span></div>
</footer>

<script>
    const sentenceEl = document.getElementById('sentence');
    const levelUpMessage = document.getElementById('level-up-message');

    let mode = '';
    let levelSpeed = 0;
    let score = 0;
    let lives = 3;
    let modeSelected = false;
    let levelSelected = false;

    const levelSpeeds = {
        1: 10000,
        2: 8000,
        3: 6000,
        4: 4000,
        5: 2500
    };

    const allSubjectsHave = [
        "I", "You", "We", "They", "My friends", "Your friends", "Our classmates", "The students",
        "The children", "Tom and Jerry", "Emma and Olivia", "Liam and Noah", "Max and Sam", "The twins",
        "Sophie and Lily", "Lucas and Mason", "Jack and Harry", "Ben and Tom", "Ava and Ella", "The boys",
        "The girls", "Sara and her friends", "The teachers", "The parents", "Some kids", "The team members",
        "Both teams", "You all", "We all", "The neighbours", "The dogs", "These cats", "Those birds",
        "All of us", "The players", "The robots", "My cousins", "The brothers", "The sisters", "Your classmates",
        "The musicians", "The artists", "My grandparents", "The builders", "The hikers", "The campers",
        "Our neighbours", "Your teammates", "These students", "These people", "The winners", "My uncles",
        "Your aunts", "Our leaders", "Some girls", "Some boys", "All of them", "The audience", "The judges",
        "The dancers", "The actors", "The engineers", "The fans", "The readers", "The writers", "My classmates",
        "Our teammates", "The competitors", "The kids at school", "The footballers", "Those kids", "All my friends",
        "The gardeners", "Our group", "The chefs", "The bakers", "These workers", "The swimmers", "The runners",
        "The climbers", "The organizers", "These helpers", "The volunteers", "The members", "The guests",
        "The customers", "The drivers", "The students in class", "My teammates", "The explorers", "The designers",
        "The group of kids", "The people outside", "The gamers", "The coders", "The presenters", "Those twins",
        "The baseball players", "The singers", "The puppets", "The travelers", "The tourists", "Our guests"
    ];

    const allSubjectsHas = [
        "He", "She", "It", "Tom", "Sara", "Emma", "Liam", "Olivia", "Mason", "Chloe",
        "Sophie", "Ella", "Lucas", "Noah", "Ava", "Jack", "Ben", "Harry", "Nora", "Leo",
        "My dad", "My mom", "My teacher", "My brother", "My sister", "My cousin", "My uncle",
        "My aunt", "My friend", "Our neighbour", "His dad", "Her mom", "His friend", "Her friend",
        "The baby", "The boy", "The girl", "The child", "The student", "The cat", "The dog", "The fish",
        "The bird", "The robot", "The player", "The teacher", "The coach", "The singer", "The actor",
        "The dancer", "The writer", "The painter", "The chef", "The baker", "The driver", "The visitor",
        "The guest", "The neighbour", "The doctor", "The nurse", "The farmer", "The swimmer", "The runner",
        "The gamer", "The climber", "The explorer", "The magician", "The waiter", "The leader", "The artist",
        "The student in class", "The astronaut", "The presenter", "The superhero", "The policeman",
        "The fireman", "The princess", "The prince", "The queen", "The king", "The president", "The mayor",
        "The librarian", "The janitor", "The pilot", "The mechanic", "The janitor", "The animal", "The monster",
        "The dragon", "The pirate", "The zombie", "The wizard", "The elf", "The alien", "The knight",
        "The unicorn", "The troll", "The villain", "The superhero dog", "My little sister", "The goldfish"
    ];

    const objects = [
        "a red car", "a new phone", "a green pencil", "a cool backpack", "a funny story", "a pen", "a book",
        "a blue bike", "a water bottle", "a secret", "a gift", "a pencil case", "a soccer ball", "a sandwich",
        "a question", "some money", "a new bag", "an old camera", "a broken laptop", "a smartphone", "a scarf",
        "a pair of socks", "a cool T-shirt", "a skateboard", "a violin", "a trumpet", "a coloring book",
        "a comic", "a smartwatch", "a cap", "a hoodie", "a toy car", "a lunchbox", "a bottle of juice",
        "a map", "a game console", "a torch", "a photo", "a pair of shoes", "a necklace", "a bracelet",
        "a box of crayons", "a blue folder", "a math book", "a science kit", "a dictionary", "a calendar",
        "a globe", "a computer", "a pet dog", "a cat", "a rabbit", "a goldfish", "a hamster", "a cage",
        "a chair", "a desk", "a sofa", "a plant", "a remote control", "a kite", "a robot", "a dinosaur toy",
        "a soccer jersey", "a trophy", "a medal", "a backpack", "a charger", "a light", "a snack",
        "a pair of glasses", "a mirror", "a picture frame", "a sleeping bag", "a tent", "a marshmallow stick",
        "a flashlight", "a winter coat", "a raincoat", "an umbrella", "a set of keys", "a clock", "a ruler",
        "a paper plane", "a robot arm", "a camera", "a drone", "a remote-control car", "a trampoline",
        "a diary", "a poster", "a sticker album", "a pencil sharpener", "a bottle of glue", "a pair of boots",
        "a hat", "a birthday card", "a puzzle", "a video game", "a USB stick", "a banana", "an apple"
    ];

    const allSentences = [];

    for (let i = 0; i < 100; i++) {
        const isHave = Math.random() < 0.5;
        const subject = isHave
            ? allSubjectsHave[Math.floor(Math.random() * allSubjectsHave.length)]
            : allSubjectsHas[Math.floor(Math.random() * allSubjectsHas.length)];
        const object = objects[Math.floor(Math.random() * objects.length)];
        const correctFull = isHave ? "have got" : "has got";
        const correctShort = isHave ? "’ve got" : "’s got";
        allSentences.push({
            sentence: `${subject} ___ ${object}.`,
            correctFull,
            correctShort
        });
    }

    function selectMode(selected) {
        mode = selected;
        modeSelected = true;
        document.getElementById('btn-full').classList.remove('active');
        document.getElementById('btn-short').classList.remove('active');
        document.getElementById(`btn-${selected}`).classList.add('active');
        updateAnswerButtons();
        checkStartReady();
    }

    function updateAnswerButtons() {
        document.getElementById('btn-have-got').textContent = mode === 'short' ? "’ve got" : "have got";
        document.getElementById('btn-has-got').textContent = mode === 'short' ? "’s got" : "has got";
    }

    function selectLevel(level, btnElement) {
        levelSelected = true;
        levelSpeed = levelSpeeds[level];
        
        document.querySelectorAll('.btn-lvl').forEach(btn => {
            btn.classList.remove('active');
        });
        btnElement.classList.add('active');
        checkStartReady();
    }

    function checkStartReady() {
        if (modeSelected && levelSelected) {
            document.getElementById('startBtn').disabled = false;
        }
    }

    function startGame() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');

        score = 0;
        lives = 3;
        updateUI();
        showSentence();

        document.getElementById('btn-have-got').onclick = () => {
            submitAnswer(document.getElementById('btn-have-got').textContent);
        };
        document.getElementById('btn-has-got').onclick = () => {
            submitAnswer(document.getElementById('btn-has-got').textContent);
        };
    }

    function showSentence() {
        const random = allSentences[Math.floor(Math.random() * allSentences.length)];
        sentenceEl.innerHTML = random.sentence.replace('___', '<span class="gap">_______</span>');
        sentenceEl.dataset.correctFull = random.correctFull;
        sentenceEl.dataset.correctShort = random.correctShort;

        clearTimeout(sentenceEl.timeoutId);
        sentenceEl.timeoutId = setTimeout(() => {
            loseLife();
        }, levelSpeed);
    }

    function submitAnswer(choice) {
        clearTimeout(sentenceEl.timeoutId);
        const correct = mode === 'short'
            ? sentenceEl.dataset.correctShort
            : sentenceEl.dataset.correctFull;

        if (choice === correct) {
            score++;
            checkLevelUp();
        } else {
            lives--;
            document.getElementById('game').style.boxShadow = "0 0 25px rgba(211, 47, 47, 0.8)";
            setTimeout(() => {
                document.getElementById('game').style.boxShadow = "none";
            }, 300);
        }

        updateUI();

        if (lives <= 0) {
            gameOver();
        } else {
            showSentence();
        }
    }

    function loseLife() {
        clearTimeout(sentenceEl.timeoutId);
        lives--;
        
        document.getElementById('game').style.boxShadow = "0 0 25px rgba(211, 47, 47, 0.8)";
        setTimeout(() => {
            document.getElementById('game').style.boxShadow = "none";
        }, 300);

        updateUI();

        if (lives <= 0) {
            gameOver();
        } else {
            showSentence();
        }
    }

    function checkLevelUp() {
        if (score % 10 === 0 && levelSpeed > 1500) {
            levelSpeed = Math.max(1500, levelSpeed * 0.85);
            showLevelUpMessage();
        }
    }

    function showLevelUpMessage() {
        levelUpMessage.classList.remove('hidden');
        setTimeout(() => {
            levelUpMessage.classList.add('hidden');
        }, 1500);
    }

    function updateUI() {
        document.getElementById('score').textContent = `Score: ${score}`;
        document.getElementById('stars').textContent = '⭐ '.repeat(lives).trim() || '💀';
    }

    function gameOver() {
        clearTimeout(sentenceEl.timeoutId);
        document.getElementById('game').classList.add('hidden');
        document.getElementById('game-over').classList.remove('hidden');
        document.getElementById('final-score').textContent = `Je hebt een score van ${score} bereikt!`;
    }

    function resetGameSetup() {
        modeSelected = false;
        levelSelected = false;
        document.getElementById('startBtn').disabled = true;
        
        document.getElementById('btn-full').classList.remove('active');
        document.getElementById('btn-short').classList.remove('active');
        document.querySelectorAll('.btn-lvl').forEach(btn => btn.classList.remove('active'));

        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
