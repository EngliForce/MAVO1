<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngliForce: Alphabet Bingo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-purple-main: #7b2cbf; --hero-purple-dark: #3c096c;
            --hero-yellow: #ffb703; --hero-red: #d32f2f;
            --hero-green: #2a9d8f; --dark: #1a102a; --header-bg: #ff7043;
        }

        html, body { height: 100vh; width: 100vw; margin: 0; overflow: hidden; background: radial-gradient(circle at center, #1a102a 0%, #05101a 100%); font-family: 'Lexend', sans-serif; color: white; display: flex; flex-direction: column; }
        
        header { background: var(--header-bg); padding: 1.5rem 1rem; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); border-bottom: 5px solid var(--hero-yellow); flex-shrink: 0; }
        h1 { font-family: 'Bangers', cursive; font-size: 2.2rem; margin: 0; text-shadow: 2px 2px 0px var(--hero-purple-dark); }
        
        main { flex: 1; display: flex; justify-content: center; align-items: center; overflow-y: auto; padding: 20px; }
        
        .game-panel { 
            background: rgba(26, 16, 42, 0.8); 
            backdrop-filter: blur(10px);
            border: 2px solid var(--hero-purple-main); 
            border-radius: 20px; 
            padding: 25px; 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
        }

        #current-letter { 
            font-family: 'Bangers', cursive; 
            font-size: 6rem; 
            color: var(--hero-yellow); 
            margin: 10px 0; 
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #status-msg { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; height: 20px; }

        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }

        .btn-action { background: var(--hero-purple-main); color: white; border: none; padding: 10px 25px; border-radius: 12px; font-family: 'Bangers'; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { transform: scale(1.05); background: #5a189a; }
        .btn-secondary { background: #3c096c; border: 2px solid var(--hero-yellow); color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; }

        .history-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 15px; }
        .letter-tile { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; font-weight: bold; opacity: 0.3; transition: 0.3s; }
        .letter-tile.called { opacity: 1; background: var(--hero-green); transform: scale(1.1); box-shadow: 0 0 10px var(--hero-green); }

        footer { text-align: center; padding: 10px; background: rgba(0,0,0,0.3); font-family: 'Lexend'; font-size: 0.9rem; border-top: 2px solid rgba(0,0,0,0.2); flex-shrink: 0; color: #888; }
    </style>
</head>
<body>

<header><h1>🔤 ALPHABET BINGO</h1></header>

<main>
    <div class="game-panel">
        <div id="status-msg"></div>
        <div id="current-letter">-</div>
        
        <div class="controls">
            <button class="btn-action" onclick="nextLetter()">VOLGENDE</button>
            <button class="btn-secondary" onclick="playCurrentSound()">HERHAAL</button>
            <button class="btn-secondary" onclick="resetGame()">RESET</button>
        </div>

        <div class="history-grid" id="history"></div>
    </div>
</main>

<footer>&copy; 2026, Engliforce: Make English your superpower!</footer>

<script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    let remainingLetters = [...alphabet];
    let currentLetter = null;
    let audio = new Audio();

    // Initialiseer het geschiedenisoverzicht
    const historyContainer = document.getElementById('history');
    alphabet.forEach(letter => {
        const div = document.createElement('div');
        div.className = 'letter-tile';
        div.id = `tile-${letter}`;
        div.innerText = letter;
        historyContainer.appendChild(div);
    });

    function playCurrentSound() {
        if (currentLetter) {
            audio.src = `${currentLetter.toLowerCase()}.mp3`;
            audio.play().catch(e => console.error("Audio bestand niet gevonden:", e));
        }
    }

    function nextLetter() {
        if (remainingLetters.length === 0) {
            document.getElementById('status-msg').innerText = "Alle letters zijn al geweest!";
            return;
        }

        document.getElementById('status-msg').innerText = ""; // Clear message
        const randomIndex = Math.floor(Math.random() * remainingLetters.length);
        currentLetter = remainingLetters.splice(randomIndex, 1)[0];
        
        document.getElementById('current-letter').innerText = currentLetter;
        document.getElementById(`tile-${currentLetter}`).classList.add('called');
        
        playCurrentSound();
    }

    function resetGame() {
        // Geen popups meer, direct actie
        remainingLetters = [...alphabet];
        currentLetter = null;
        document.getElementById('current-letter').innerText = "-";
        document.getElementById('status-msg').innerText = "";
        document.querySelectorAll('.letter-tile').forEach(t => t.classList.remove('called'));
    }
</script>

</body>
</html>
