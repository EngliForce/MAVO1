<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Some vs. Any Quest ⚔️</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .game-panel { background: #1e293b; padding: 30px; border-radius: 25px; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .sentence { font-size: 26px; margin: 40px 0; min-height: 70px; font-weight: bold; color: #38bdf8; }
        .btn { background: #3b82f6; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 18px; cursor: pointer; margin: 10px; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); background: #2563eb; }
        
        /* Spectaculaire Badge */
        #badge { font-size: 80px; display: none; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        .shine { animation: shine 1.5s infinite; color: gold; }
        @keyframes shine { 0% { text-shadow: 0 0 5px gold; } 50% { text-shadow: 0 0 20px gold; } 100% { text-shadow: 0 0 5px gold; } }
    </style>
</head>
<body>

<div class="game-panel">
    <div id="start">
        <h1>Some vs. Any Quest</h1>
        <p>Fill in: some or any</p>
        <button class="btn" onclick="start()">Start Game</button>
    </div>

    <div id="quiz" style="display:none;">
        <div id="status">Vraag 1/10</div>
        <div class="sentence" id="sentence">---</div>
        <button class="btn" onclick="check('some')">Some</button>
        <button class="btn" onclick="check('any')">Any</button>
    </div>

    <div id="end" style="display:none;">
        <div id="badge" class="shine">🧙‍♂️</div>
        <h2 id="msg"></h2>
        <button class="btn" onclick="location.reload()">Try again</button>
    </div>
</div>

<script>
// Database met enkel standaard vragen en ontkenningen
const db = [
    {s: "I have ___ friends in town.", a: "some"}, {s: "Do you have ___ brothers?", a: "any"},
    {s: "I don't have ___ money.", a: "any"}, {s: "There is ___ milk in the glass.", a: "some"},
    {s: "Are there ___ cars in the street?", a: "any"}, {s: "She wants ___ sugar in her tea.", a: "some"},
    {s: "I haven't got ___ time today.", a: "any"}, {s: "There are ___ apples in the bag.", a: "some"},
    {s: "There aren't ___ people here.", a: "any"}, {s: "We bought ___ new shoes.", a: "some"},
    {s: "Is there ___ water in the bottle?", a: "any"}, {s: "I need ___ help with this.", a: "some"},
    {s: "There isn't ___ bread left.", a: "any"}, {s: "Do you need ___ paper for the test?", a: "any"},
    {s: "I saw ___ birds in the tree.", a: "some"}, {s: "They don't want ___ food now.", a: "any"},
    {s: "There are ___ flowers in the garden.", a: "some"}, {s: "Did you buy ___ gifts for them?", a: "any"},
    {s: "I have ___ cool ideas for the project.", a: "some"}, {s: "There isn't ___ gas in the car.", a: "any"},
    {s: "Do you have ___ coins in your pocket?", a: "any"}, {s: "I have ___ cats at home.", a: "some"},
    {s: "She didn't find ___ keys.", a: "any"}, {s: "He has ___ books on his desk.", a: "some"},
    {s: "I don't see ___ cars on the road.", a: "any"}, {s: "Are there ___ cookies in the box?", a: "any"},
    {s: "We found ___ shells on the beach.", a: "some"}, {s: "There isn't ___ milk in the fridge.", a: "any"},
    {s: "He needs ___ rest after the long day.", a: "some"}, {s: "Do you have ___ spare parts?", a: "any"},
    {s: "I have ___ fruit in my lunchbox.", a: "some"}, {s: "I won't give ___ money to him.", a: "any"},
    {s: "There are ___ people waiting outside.", a: "some"}, {s: "Can you hear ___ noise?", a: "any"},
    {s: "I bought ___ pens at the shop.", a: "some"}, {s: "He hasn't got ___ pets.", a: "any"},
    {s: "Are there ___ errors in the text?", a: "any"}, {s: "There is ___ wine in the bottle.", a: "some"},
    {s: "They don't have ___ dogs.", a: "any"}, {s: "I need ___ minutes to finish.", a: "some"},
    {s: "Did he leave ___ messages for me?", a: "any"}, {s: "There's ___ sand in my shoes.", a: "some"},
    {s: "There isn't ___ hope left.", a: "any"}, {s: "Do you have ___ pencils?", a: "any"},
    {s: "I'll make ___ tea for us later.", a: "some"}, {s: "I don't have ___ homework today.", a: "any"},
    {s: "There are ___ trees in the park.", a: "some"}, {s: "Is there ___ chance to win?", a: "any"},
    {s: "I have ___ pictures of my family.", a: "some"}, {s: "He doesn't have ___ free time.", a: "any"}
];

let q = [], i = 0, score = 0;

function start() {
    q = db.sort(() => 0.5 - Math.random()).slice(0, 10);
    document.getElementById('start').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    show();
}

function show() {
    document.getElementById('status').innerText = `Vraag ${i + 1}/10`;
    document.getElementById('sentence').innerText = q[i].s;
}

function check(val) {
    if (val === q[i].a) score++;
    if (++i < 10) show();
    else endGame();
}

function endGame() {
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('end').style.display = 'block';
    if(score === 10) {
        document.getElementById('badge').style.display = 'block';
        document.getElementById('msg').innerHTML = "PERFECT! You are a <br>Grammar Wizard! 🧙‍♂️";
    } else {
        document.getElementById('msg').innerText = `Your score: ${score}/10. Try again for the badge`;
    }
}
</script>
</body>
</html>
