<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>EngliForce Academy: Kids in the Kitchen!</title>

    <style>
        :root {
            --hero-blue-main: #0288d1;
            --hero-blue-dark: #01579b;
            --hero-yellow: #ffb703;
            --hero-cyan: #81d4fa;
            --dark-bg: #0b1a2a;
            --hero-orange: #ff9800;
            --success: #4caf50;
            --error: #f44336;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: radial-gradient(circle at center, #102a43 0%, #05101a 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: var(--hero-blue-main);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 5px solid var(--hero-yellow);
            flex-shrink: 0;
            z-index: 10;
        }

        header p { margin: 5px 0 0 0; font-weight: bold; letter-spacing: 1px; color: var(--hero-yellow); }

        .level-selector {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .level-btn {
            padding: 10px 25px;
            border-radius: 25px;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .btn-a1 { border-color: var(--success); color: var(--success); }
        .btn-a1.active, .btn-a1:hover { background: var(--success); color: white; box-shadow: 0 0 15px var(--success); }

        .btn-a2 { border-color: var(--hero-orange); color: var(--hero-orange); }
        .btn-a2.active, .btn-a2:hover { background: var(--hero-orange); color: white; box-shadow: 0 0 15px var(--hero-orange); }

        .btn-b1 { border-color: var(--error); color: var(--error); }
        .btn-b1.active, .btn-b1:hover { background: var(--error); color: white; box-shadow: 0 0 15px var(--error); }

        .app-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Left Side: Full Text */
        .text-panel {
            flex: 1.2;
            overflow-y: auto;
            padding: 40px;
            border-right: 3px solid var(--hero-blue-main);
            background: rgba(16, 42, 67, 0.4);
            line-height: 1.8;
        }

        .intro-text {
            font-size: 1.25rem;
            color: var(--hero-cyan);
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.6;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .question-panel {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: rgba(11, 26, 42, 0.9);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--hero-yellow);
            transition: 0.3s;
        }

        .question-card h3 { font-family: 'Bangers', cursive; color: var(--hero-yellow); margin: 0 0 10px 0; letter-spacing: 1px; }
        
        textarea {
            width: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            border: 1px solid var(--hero-cyan);
            padding: 15px;
            border-radius: 10px;
            font-family: 'Lexend', sans-serif;
            resize: vertical;
            margin-top: 10px;
            box-sizing: border-box;
            min-height: 80px;
        }

        .check-btn {
            background: #0288d1;
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.4rem;
            font-family: 'Bangers', cursive;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 40px;
            transition: 0.3s;
            letter-spacing: 2px;
            border: 2px solid var(--hero-cyan);
        }

        .check-btn:hover { background: var(--hero-cyan); color: var(--dark-bg); transform: scale(1.02); }

        .feedback-box {
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border: 1px solid #444;
        }

        .model-ans { color: var(--hero-cyan); font-weight: bold; display: block; margin-bottom: 15px; }
        
        .self-correct-btns { display: flex; gap: 10px; }
        .btn-correct { background: var(--success); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; flex: 1; font-weight: bold; }
        .btn-wrong { background: var(--error); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; flex: 1; font-weight: bold; }
        .btn-correct.selected { outline: 3px solid white; box-shadow: 0 0 15px var(--success); }
        .btn-wrong.selected { outline: 3px solid white; box-shadow: 0 0 15px var(--error); }

        .score-banner {
            position: sticky;
            top: 0;
            background: var(--hero-yellow);
            color: var(--dark-bg);
            padding: 15px;
            text-align: center;
            font-family: 'Bangers', cursive;
            font-size: 2rem;
            border-radius: 10px;
            margin-bottom: 20px;
            z-index: 5;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .vocab { color: var(--hero-yellow); font-weight: 700; border-bottom: 2px dashed #ff5722; cursor: help; position: relative; }
        .vocab:hover::after {
            content: attr(data-nl);
            position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
            background: #ff5722; color: white; padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; white-space: nowrap; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .highlight-quote { background: rgba(255, 183, 3, 0.1); border-left: 5px solid var(--hero-yellow); padding: 20px; margin: 30px 0; border-radius: 0 15px 15px 0; font-style: italic; }
        footer { text-align: center; padding: 40px 0 20px 0; opacity: 0.5; font-size: 0.9rem;}

        @media (max-width: 1000px) {
            .app-container { flex-direction: column; overflow-y: auto; }
            .text-panel { border-right: none; border-bottom: 5px solid var(--hero-blue-main); overflow: visible; }
            .question-panel { overflow: visible; }
            body { overflow: auto; height: auto; }
        }
    </style>
</head>

                    <p>After that, I wait for the cake to cool. Then I add chocolate cream on top. I like to <span class="vocab" data-nl="delen">share</span> my cake with my family. They say it is delicious!</p>

                    <h2>Noah (12) – “Rice gives me energy!”</h2>
                    <p>Hello! My name is Noah. I am 12 years old. I like cooking dinner. My favorite dish is rice with vegetables.</p>
                    <p>First, I wash the rice. Then I cook it in water. It takes about 15 minutes. While the rice cooks, I prepare the vegetables. I use carrots, peas, and corn. I cut the carrots into small pieces.</p>
                    <p>Then I cook the vegetables in a pan. I add oil and salt. When everything is ready, I mix the rice and vegetables. It is simple but very tasty. I eat it after school. It gives me <span class="vocab" data-nl="energie">energy</span>!</p>

                { q: "Explain why flipping pancakes might be both enjoyable and challenging for Lucas.", a: "Flipping is thrilling and fun to do, but it requires technique, making it difficult sometimes." },
                { q: "How does Aisha prepare her ingredients before assembling the salad?", a: "She washes the lettuce, tomatoes, and cucumbers thoroughly, then dices (cuts) them into small pieces." },
                { q: "What are the two different ways Tom enjoys his sandwiches?", a: "He eats them cold with fresh vegetables, or he puts them in a toaster to make the bread warm and crispy." },
                { q: "Why is teamwork mentioned when Sofia bakes her chocolate cake?", a: "Because operating the oven requires adult supervision, so her father assists her with baking." },
                { q: "Detail the multi-tasking Noah does while cooking his dinner.", a: "While the rice boils, he simultaneously preps and sautés the carrots, peas, and sweet corn in a pan." },
                { q: "What specific technique does Mia use to make her scrambled eggs?", a: "She beats eggs with a fork, then cooks them gently over low heat in a buttered pan while stirring constantly." },
                { q: "Compare the reasons why Aisha and Noah choose their favorite meals.", a: "Aisha likes salad because it is nutritious for her body, while Noah likes rice because it replenishes his energy after school." },
                { q: "What role does sharing play in the cooking experiences of Emma, Lucas, and Sofia?", a: "Emma's family loves her pasta, Lucas enjoys a family tradition on Sundays, and Sofia shares her cake with her family." },
                { q: "Based on the conclusion, what is the main message the magazine wants to share with its readers?", a: "That cooking is an accessible, creative skill, and everyone should try experimenting in the kitchen." }
            ]
        }
    };

    let currentLevel = 'A1';
    let userScores = Array(10).fill(null);

    function setLevel(level, btn) {
        currentLevel = level;
        userScores = Array(10).fill(null);
        
        // Update Buttons
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Update Text Panel
        document.getElementById('textPanel').innerHTML = levelData[level].text;

        // Update Questions Panel
        renderQuestions();
    }

    function renderQuestions() {
        const container = document.getElementById('questionPanel');
        let html = `<div id="scoreBanner" class="score-banner">Score: 0 / 10</div>`;
        html += `<h2>Assignment: Level ${currentLevel} (10 Questions)</h2>`;
        
        levelData[currentLevel].questions.forEach((item, index) => {
            html += `
                <div class="question-card">
                    <h3>Question ${index + 1}</h3>
                    <p>${item.q}</p>
                    <textarea id="ans-${index}" placeholder="Type your answer here..."></textarea>
                    <div id="fb-box-${index}" class="feedback-box" style="display:none;">
                        <span class="model-ans">Model Answer: <br><span style="color: white; font-weight: normal;">${item.a}</span></span>
                        <div class="self-correct-btns">
                            <button id="btn-c-${index}" class="btn-correct" onclick="markAnswer(${index}, true)">Correct ✅</button>
                            <button id="btn-w-${index}" class="btn-wrong" onclick="markAnswer(${index}, false)">Wrong ❌</button>
                        </div>
                    </div>
                </div>
            `;
        });

        html += `<button class="check-btn" onclick="revealFeedback()">CHECK ALL ANSWERS</button>`;
        container.innerHTML = html;
        container.scrollTop = 0;
    }

    function revealFeedback() {
        levelData[currentLevel].questions.forEach((_, index) => {
            document.getElementById(`fb-box-${index}`).style.display = 'block';
        });
        document.getElementById('scoreBanner').style.display = 'block';
        document.getElementById('scoreBanner').scrollIntoView({ behavior: 'smooth' });
    }

    function markAnswer(index, isCorrect) {
        userScores[index] = isCorrect;
        
        document.getElementById(`btn-c-${index}`).classList.toggle('selected', isCorrect);
        document.getElementById(`btn-w-${index}`).classList.toggle('selected', !isCorrect);

        const score = userScores.filter(x => x === true).length;
        document.getElementById('scoreBanner').innerText = `Score: ${score} / 10`;
    }

    // Initialize the app with A1 on page load
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('textPanel').innerHTML = levelData['A1'].text;
        renderQuestions();
    });
</script>
