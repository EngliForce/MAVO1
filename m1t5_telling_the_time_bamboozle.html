<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock Battle - The Gift Edition</title>
    <style>
        :root {
            --bg: #1b4332; --card-bg: #ffbc42;
            --color-1: #ff477e; --color-2: #00b4d8; --color-3: #70e000; --color-4: #ff9f1c; --color-5: #9b5de5;
        }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; font-family: 'Arial Black', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .active { display: flex; }

        .setup-container { background: white; color: #333; padding: 30px; border-radius: 20px; width: 95%; max-width: 750px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        .bonus-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 15px; 
            margin: 15px 0;
            border: 2px solid #eee;
        }
        .bonus-item { 
            display: flex; 
            align-items: center; 
            background: white; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #ddd;
            font-family: sans-serif;
            font-size: 14px;
            cursor: pointer;
        }
        .bonus-item input { width: auto; margin-right: 10px; }
        .bonus-item span { font-weight: bold; color: #1b4332; }

        .preview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 95%; }
        .preview-card { padding: 20px; border-radius: 15px; text-align: center; color: white; }
        .preview-card b { font-size: 34px; display: block; border-bottom: 2px solid rgba(255,255,255,0.3); margin-bottom: 10px; }
        .preview-card div { font-size: 28px; font-weight: bold; line-height: 1.3; }

        .game-header { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; width: 100%; margin-bottom: 10px; }
        .score-box { padding: 15px; border-radius: 12px; text-align: center; border: 6px solid transparent; position: relative; }
        .score-box.is-active { border-color: white; box-shadow: 0 0 20px white; transform: scale(1.03); }
        .points-label { font-size: 48px; font-weight: 900; display: block; }

        .grid { display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); gap: 10px; flex-grow: 1; width: 100%; max-width: 1200px; }
        .card { background: var(--card-bg); color: #333; display: flex; align-items: center; justify-content: center; font-size: 36px; border-radius: 12px; cursor: pointer; box-shadow: 0 8px 0 #b37a00; font-weight: bold; }
        .card.used { visibility: hidden; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; color: #333; padding: 25px; border-radius: 20px; text-align: center; width: 90%; max-width: 650px; }
        .target-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .target-btn { padding: 15px; border-radius: 12px; color: white; cursor: pointer; font-size: 22px; font-weight: bold; border-bottom: 5px solid rgba(0,0,0,0.2); }
        
        button { padding: 18px 30px; font-size: 20px; border-radius: 60px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-main { background: #70e000; color: white; border-bottom: 6px solid #4fa300; }
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <div class="setup-container">
            <h2 style="margin-top:0; color:#1b4332;">🏫 Klas Setup</h2>
            <select id="class-select" onchange="loadSavedClass()"><option value="">-- Kies een opgeslagen klas --</option></select>
            <input type="text" id="class-name-input" placeholder="Naam van de klas">
            <textarea id="names-input" placeholder="Namen van leerlingen..."></textarea>
            
            <div style="display:flex; gap:15px; margin-top:10px;">
                <div style="flex:1">Teams: <select id="team-count"><option value="2">2 Teams</option><option value="3">3 Teams</option><option value="4">4 Teams</option><option value="5">5 Teams</option></select></div>
                <div style="flex:1">Aantal Bonussen: <input type="number" id="bonus-qty" value="10" min="1" max="25"></div>
            </div>

            <p style="margin: 20px 0 5px 5px; font-weight: bold; color:#1b4332;">Bonus Instellingen:</p>
            <div class="bonus-grid" id="bonus-toggles">
                <label class="bonus-item"><input type="checkbox" checked value="gift"> 🎁 <span>The Gift (Geef 10p weg)</span></label>
                <label class="bonus-item"><input type="checkbox" checked value="swap"> 🔄 <span>Team Swap (Jij ↔ Target)</span></label>
                <label class="bonus-item"><input type="checkbox" checked value="puppet"> 🎭 <span>Puppet Master (Wissel 2 anderen)</span></label>
                <label class="bonus-item"><input type="checkbox" checked value="steal"> 🕵️ <span>Steal (Steel 15p)</span></label>
                <label class="bonus-item"><input type="checkbox" checked value="sniper"> 🎯 <span>Sniper (Target -10p)</span></label>
                <label class="bonus-item"><input type="checkbox" checked value="taxman"> 💰 <span>Taxman (Steel 5p van allen)</span></label>
                <label class="bonus-item"><input type="checkbox" checked value="robin"> 🏹 <span>Robin Hood (Geef allen 10p)</span></label>
                <label class="bonus-item"><input type="checkbox" checked value="shield"> 🛡️ <span>Shield (Bescherming)</span></label>
                <label class="bonus-item"><input type="checkbox" checked value="double"> ⚡ <span>Double Trouble (x2)</span></label>
                <label class="bonus-item"><input type="checkbox" checked value="badluck"> 💥 <span>Bad Luck (-10p eigen team)</span></label>
            </div>
            <button class="btn-main" style="width:100%; margin-top:10px;" onclick="saveAndPreview()">Opslaan & Preview</button>
        </div>
    </div>

    <div id="preview-screen" class="screen">
        <h1 style="color:gold; font-size: 55px;">TEAMINDELING</h1>
        <div id="preview-container" class="preview-grid"></div>
        <button class="btn-main" style="margin-top:30px; font-size: 34px; padding: 25px 80px;" onclick="startGame()">START! 🚀</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="score-header" class="game-header"></div>
        <div style="font-size: 40px; margin: 15px;">👤 Beurt: <span id="current-player-name" style="color: #70e000;">---</span></div>
        <div class="grid" id="main-grid"></div>
    </div>

    <div id="winner-screen" class="screen">
        <h1 id="winner-msg" style="font-size: 80px; color: gold;"></h1>
        <div id="winner-members" style="font-size: 38px; background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px;"></div>
        <button class="btn-main" onclick="location.reload()">Nieuw Spel</button>
    </div>

    <div id="q-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:center; margin-bottom:20px;"><canvas id="clock-canvas" width="340" height="340"></canvas></div>
            <div id="digital-clock" style="font-size: 80px; font-weight: bold; font-family: monospace;"></div>
            <button id="btn-reveal" class="btn-main" onclick="revealAnswer()">Show Answer</button>
            <div id="ans-box" style="display:none;">
                <div id="full-answer" style="font-size:32px; padding:25px; border:5px dashed #1b4332; margin:20px 0; font-weight:bold;"></div>
                <div style="display:flex; gap:20px;"><button style="background:#2d6a4f; color:white; flex:1; font-size:26px;" onclick="submitResult(true)">✓ CORRECT</button><button style="background:#c1121f; color:white; font-size:26px;" onclick="submitResult(false)">✗ WRONG</button></div>
            </div>
        </div>
    </div>

    <div id="bonus-modal" class="modal">
        <div class="modal-content">
            <div id="bonus-icon" style="font-size: 110px;">🎁</div>
            <h2 id="bonus-title" style="font-size: 45px; margin: 10px;"></h2>
            <p id="bonus-desc" style="font-size: 26px;"></p>
            <div id="target-picker" style="display:none;">
                <p id="picker-instr" style="font-size: 22px;"><b>Kies een team:</b></p>
                <div id="target-btns" class="target-grid"></div>
            </div>
            <button id="bonus-cont-btn" class="btn-main" onclick="closeBonus()" style="margin-top:20px;">Doorgaan</button>
        </div>
    </div>

    <script>
        const COLORS = ['#ff477e', '#00b4d8', '#70e000', '#ff9f1c', '#9b5de5'];
        let state = { 
            teams: [], players: [], currentPlayerIdx: 0, cards: [], 
            enabledBonuses: [], puppetTargets: [],
            savedClasses: JSON.parse(localStorage.getItem('clockBattleFinal') || '{}')
        };
        const NUMS = ["twelve", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten", "eleven", "twelve", "thirteen", "fourteen", "fifteen", "sixteen", "seventeen", "eighteen", "nineteen", "twenty", "twenty-one", "twenty-two", "twenty-three", "twenty-four", "twenty-five", "twenty-six", "twenty-seven", "twenty-eight", "twenty-nine"];

        window.onload = () => {
            const sel = document.getElementById('class-select');
            Object.keys(state.savedClasses).forEach(c => sel.add(new Option(c, c)));
        };

        function loadSavedClass() {
            const name = document.getElementById('class-select').value;
            if(name) {
                document.getElementById('class-name-input').value = name;
                document.getElementById('names-input').value = state.savedClasses[name].join(', ');
            }
        }

        function saveAndPreview() {
            const className = document.getElementById('class-name-input').value.trim();
            const names = document.getElementById('names-input').value.split(/[,\n]/).map(n => n.trim()).filter(n => n);
            const tc = parseInt(document.getElementById('team-count').value);
            if(!className || names.length < tc) return alert("Setup niet compleet!");
            state.savedClasses[className] = names;
            localStorage.setItem('clockBattleFinal', JSON.stringify(state.savedClasses));
            state.enabledBonuses = Array.from(document.querySelectorAll('#bonus-toggles input:checked')).map(i => i.value);
            state.players = names.sort(() => Math.random() - 0.5);
            state.teams = Array.from({length: tc}, (_, i) => ({ id: i, score: 0, members: [], shield: false, double: false }));
            state.players.forEach((p, i) => state.teams[i % tc].members.push(p));
            const cont = document.getElementById('preview-container'); cont.innerHTML = '';
            state.teams.forEach((t, i) => cont.innerHTML += `<div class="preview-card" style="background:${COLORS[i]};"><b>TEAM ${i+1}</b><div>${t.members.join('<br>')}</div></div>`);
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('preview-screen').classList.add('active');
        }

        function startGame() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = ''; state.cards = []; state.currentPlayerIdx = 0;
            let types = new Array(30 - parseInt(document.getElementById('bonus-qty').value)).fill('q').concat(new Array(parseInt(document.getElementById('bonus-qty').value)).fill('b')).sort(() => Math.random() - 0.5);
            types.forEach((type, i) => {
                let card = { id: i, type: type, used: false };
                if(type === 'q') { card.h = Math.floor(Math.random()*12)+1; card.m = Math.floor(Math.random()*60); card.ana = Math.random()>0.5; }
                state.cards.push(card);
                const d = document.createElement('div'); d.className = 'card'; d.innerText = i+1;
                d.onclick = () => openCard(i, d); grid.appendChild(d);
            });
            renderGame();
            document.getElementById('preview-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
        }

        function openCard(idx, el) {
            const card = state.cards[idx]; card.used = true; el.classList.add('used');
            if(card.type === 'b') handleBonus(); else showQuestion(card);
        }

        function handleBonus() {
            const bPool = [
                { id: 'gift', t: "THE GIFT!", d: "Geef 10 gratis punten aan een ander team!", i: "🎁" },
                { id: 'swap', t: "TEAM SWAP!", d: "Wissel jouw score met een ander team!", i: "🔄" },
                { id: 'puppet', t: "PUPPET MASTER!", d: "Wissel de scores van TWEE andere teams!", i: "🎭" },
                { id: 'steal', t: "STEAL!", d: "Steel 15 punten van een team naar keuze!", i: "🕵️" },
                { id: 'sniper', t: "SNIPER!", d: "Target team verliest 10 punten!", i: "🎯" },
                { id: 'taxman', t: "TAXMAN!", d: "Steel 5 punten van álle andere teams!", i: "💰" },
                { id: 'robin', t: "ROBIN HOOD!", d: "Alle ándere teams krijgen 10 punten!", i: "🏹" },
                { id: 'shield', t: "SHIELD!", d: "Beschermd tegen de volgende aanval!", i: "🛡️" },
                { id: 'double', t: "DOUBLE!", d: "Volgende goede beurt levert 20 punten op!", i: "⚡" },
                { id: 'badluck', t: "BAD LUCK!", d: "Jullie team verliest 10 punten.", i: "💥" }
            ].filter(b => state.enabledBonuses.includes(b.id));

            const b = bPool[Math.floor(Math.random() * bPool.length)] || {id:'robin', t:'Pech!', d:'Geen actieve bonussen.', i:'❌'};
            state.pendingBonus = b; state.puppetTargets = [];
            const activeId = state.currentPlayerIdx % state.teams.length;
            document.getElementById('bonus-icon').innerText = b.i;
            document.getElementById('bonus-title').innerText = b.t;
            document.getElementById('bonus-desc').innerText = b.d;
            
            if(['gift', 'swap', 'puppet', 'steal', 'sniper'].includes(b.id)) {
                document.getElementById('target-picker').style.display = 'block';
                document.getElementById('bonus-cont-btn').style.display = 'none';
                updateTargetButtons();
            } else {
                document.getElementById('target-picker').style.display = 'none';
                document.getElementById('bonus-cont-btn').style.display = 'inline-block';
                if(b.id === 'shield') state.teams[activeId].shield = true;
                if(b.id === 'double') state.teams[activeId].double = true;
                if(b.id === 'badluck') state.teams[activeId].score = Math.max(0, state.teams[activeId].score - 10);
                if(b.id === 'robin') state.teams.forEach((t, i) => { if(i !== activeId) t.score += 10; });
                if(b.id === 'taxman') state.teams.forEach((t, i) => { if(i !== activeId) { let s = Math.min(5, t.score); t.score -= s; state.teams[activeId].score += s; } });
            }
            document.getElementById('bonus-modal').style.display = 'flex';
        }

        function updateTargetButtons() {
            const btns = document.getElementById('target-btns');
            const activeId = state.currentPlayerIdx % state.teams.length;
            btns.innerHTML = '';
            state.teams.forEach((t, i) => {
                if(i === activeId || state.puppetTargets.includes(i)) return;
                let d = document.createElement('div'); d.className = 'target-btn'; d.style.backgroundColor = COLORS[i];
                d.innerHTML = `TEAM ${i+1}<br><span>${t.score} PTS</span>`;
                d.onclick = () => applyBonus(i); btns.appendChild(d);
            });
        }

        function applyBonus(idx) {
            const activeId = state.currentPlayerIdx % state.teams.length;
            const b = state.pendingBonus;
            const target = state.teams[idx];
            
            if(b.id === 'puppet') {
                state.puppetTargets.push(idx);
                if(state.puppetTargets.length < 2) { updateTargetButtons(); return; }
                let t1 = state.teams[state.puppetTargets[0]], t2 = state.teams[state.puppetTargets[1]];
                let tmp = t1.score; t1.score = t2.score; t2.score = tmp;
            } else if(target.shield && (b.id === 'steal' || b.id === 'swap')) {
                alert("Shield Blocked! Team " + (idx+1) + " is veilig."); target.shield = false;
            } else {
                if(b.id === 'gift') { target.score += 10; }
                if(b.id === 'swap') { let tmp = state.teams[activeId].score; state.teams[activeId].score = target.score; target.score = tmp; }
                if(b.id === 'steal') { let s = Math.min(15, target.score); target.score -= s; state.teams[activeId].score += s; }
                if(b.id === 'sniper') target.score = Math.max(0, target.score - 10);
            }
            document.getElementById('bonus-modal').style.display = 'none'; nextTurn();
        }

        function submitResult(correct) {
            const tid = state.currentPlayerIdx % state.teams.length;
            if(correct) { state.teams[tid].score += (state.teams[tid].double ? 20 : 10); }
            state.teams[tid].double = false;
            document.getElementById('q-modal').style.display = 'none'; nextTurn();
        }

        function renderGame() {
            const header = document.getElementById('score-header'); const activeId = state.currentPlayerIdx % state.teams.length;
            header.innerHTML = '';
            state.teams.forEach((t, i) => {
                header.innerHTML += `<div class="score-box ${i === activeId ? 'is-active' : ''}" style="background:${COLORS[i]}">
                    <span style="font-size:20px; font-weight:bold;">TEAM ${i+1}</span><span class="points-label">${t.score}</span>
                    <div style="font-size: 24px;">${t.shield ? '🛡️' : ''} ${t.double ? '⚡' : ''}</div>
                </div>`;
            });
            document.getElementById('current-player-name').innerText = state.players[state.currentPlayerIdx % state.players.length];
            document.getElementById('current-player-name').style.color = COLORS[activeId];
        }

        function drawClock(h, m) {
            const ctx = document.getElementById('clock-canvas').getContext('2d'); ctx.clearRect(0,0,340,340);
            ctx.lineWidth = 10; ctx.strokeStyle = '#333'; ctx.beginPath(); ctx.arc(170, 170, 155, 0, 2*Math.PI); ctx.stroke();
            ctx.font = "bold 28px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
            for(let i=1; i<=12; i++) { let a = i * Math.PI / 6; ctx.fillText(i, 170 + Math.sin(a)*125, 170 - Math.cos(a)*125); }
            drawHand(ctx, (m * Math.PI / 30), 135, 6, '#c1121f'); drawHand(ctx, (h * Math.PI / 6) + (m * Math.PI / 360), 95, 12, '#333');
        }
        function drawHand(ctx, pos, len, wid, col) { ctx.beginPath(); ctx.lineWidth = wid; ctx.lineCap = "round"; ctx.strokeStyle = col; ctx.moveTo(170,170); ctx.lineTo(170+Math.sin(pos)*len, 170-Math.cos(pos)*len); ctx.stroke(); }
        
        function calcTime(h, m) {
            let nH = h === 12 ? 1 : h + 1;
            let timeStr = "";
            if (m === 0) timeStr = `it's ${NUMS[h]} o'clock`;
            else if (m === 15) timeStr = `it's quarter past ${NUMS[h]}`;
            else if (m === 30) timeStr = `it's half past ${NUMS[h]}`;
            else if (m === 45) timeStr = `it's quarter to ${NUMS[nH]}`;
            else {
                let p = m < 30; let dm = p ? m : 60-m; let r = p ? "past" : "to";
                let ml = (dm === 1) ? " minute" : (dm % 5 === 0 ? "" : " minutes");
                timeStr = `it's ${NUMS[dm]}${ml} ${r} ${NUMS[p ? h : nH]}`;
            }
            return timeStr.charAt(0).toUpperCase() + timeStr.slice(1) + ".";
        }

        function showQuestion(card) {
            document.getElementById('ans-box').style.display='none'; document.getElementById('btn-reveal').style.display='inline-block';
            const can = document.getElementById('clock-canvas'); const dig = document.getElementById('digital-clock');
            if(card.ana) { can.style.display='block'; dig.style.display='none'; drawClock(card.h, card.m); }
            else { can.style.display='none'; dig.style.display='block'; dig.innerText = `${card.h.toString().padStart(2,'0')}:${card.m.toString().padStart(2,'0')}`; }
            document.getElementById('full-answer').innerText = calcTime(card.h, card.m);
            document.getElementById('q-modal').style.display='flex';
        }

        function nextTurn() { 
            state.currentPlayerIdx++; 
            if(state.currentPlayerIdx >= state.players.length) endGame(); 
            else renderGame(); 
        }
        function endGame() { 
            document.getElementById('game-screen').classList.remove('active'); document.getElementById('winner-screen').classList.add('active');
            const w = [...state.teams].sort((a,b) => b.score - a.score)[0];
            document.getElementById('winner-msg').innerText = `TEAM ${w.id+1} WINT!`;
            document.getElementById('winner-members').innerText = w.members.join(', ');
        }
        function revealAnswer() { document.getElementById('btn-reveal').style.display = 'none'; document.getElementById('ans-box').style.display = 'block'; }
        function closeBonus() { document.getElementById('bonus-modal').style.display = 'none'; nextTurn(); }
    </script>
</body>
</html>
