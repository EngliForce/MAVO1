<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Word Order Warrior: SVOPT Strict</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-blue: #0288d1;
            --hero-dark: #01579b;
            --hero-yellow: #ffb703;
            --hero-orange: #ff5722;
            --success: #4CAF50;
            --danger: #F44336;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            font-family: 'Lexend', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            color: white; margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        header {
            background: var(--hero-blue); padding: 1rem; text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            border-bottom: 4px solid var(--hero-yellow); flex-shrink: 0;
        }
        h1 { font-family: 'Bangers', cursive; font-size: 2rem; margin: 0; text-shadow: 2px 2px 0 var(--hero-dark); }
        
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 15px; max-width: 900px; margin: 0 auto; width: 100%; position: relative; overflow: hidden; }
        
        .menu-card {
            background: rgba(16, 42, 67, 0.95); border: 2px solid var(--hero-blue);
            border-radius: 20px; padding: 25px; text-align: center; width: 100%;
        }

        #game-area {
            flex-grow: 1; width: 100%; position: relative;
            background: rgba(255,255,255,0.02); border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1); overflow-y: auto;
            display: flex; flex-direction: column; align-items: center; padding: 15px;
        }

        .word-blocks-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 10px; width: 100%;
        }

        .word-block {
            background: var(--hero-dark); border: 2px solid var(--hero-blue);
            padding: 10px 16px; border-radius: 8px; cursor: pointer;
            font-weight: 700; font-size: 1rem; transition: 0.2s;
            box-shadow: 0 4px 0 var(--hero-blue); color: white;
        }
        .word-block:hover { transform: translateY(-2px); background: var(--hero-blue); }
        .word-block.selected { opacity: 0.2; pointer-events: none; transform: scale(0.9); }

        .result-zone {
            width: 100%; min-height: 110px; border: 2px dashed var(--hero-yellow);
            border-radius: 15px; margin-top: 15px; display: flex;
            flex-wrap: wrap; align-items: center; justify-content: center; gap: 6px; padding: 15px;
            background: rgba(0,0,0,0.3);
        }

        .placed-word {
            background: var(--hero-orange); color: white; padding: 6px 12px; border-radius: 6px;
            font-weight: 700; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        .btn-action {
            background: var(--hero-yellow); color: #000; border: none;
            padding: 15px 25px; border-radius: 10px; font-family: 'Bangers';
            font-size: 1.5rem; cursor: pointer; border-bottom: 4px solid #cc9200; width: 100%;
        }

        .hud {
            width: 100%; display: flex; justify-content: space-between;
            font-family: 'Bangers'; font-size: 1.2rem; margin-bottom: 8px; color: var(--hero-yellow);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <h1>WORD ORDER WARRIOR</h1>
</header>

<main>
    <div id="start-screen" class="menu-card">
        <h2>MISSION BRIEFING</h2>
        <p>Rule: Subject + Verb + Object + Place + Time</p>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
            <button class="btn-action" onclick="startGame('short')" style="background: #4db6ac; border-color: #00897b;">LEVEL 1: SHORT</button>
            <button class="btn-action" onclick="startGame('medium')" style="background: #7986cb; border-color: #3f51b5;">LEVEL 2: MEDIUM</button>
            <button class="btn-action" onclick="startGame('long')" style="background: #9575cd; border-color: #5e35b1;">LEVEL 3: LONG</button>
        </div>
    </div>

    <div id="game-screen" class="hidden" style="width: 100%; height: 100%; display: flex; flex-direction: column;">
        <div class="hud">
            <div>MISSION: <span id="round-display">1</span>/10</div>
            <div>SCORE: <span id="score-display">0</span></div>
        </div>
        
        <div id="game-area">
            <div id="word-pool" class="word-blocks-container"></div>
            <div id="answer-zone" class="result-zone"></div>
            <div id="feedback-text" style="margin-top: 10px; font-family: 'Bangers'; font-size: 1.4rem;"></div>
        </div>

        <div style="display: flex; gap: 10px; width: 100%;">
            <button class="btn-action" style="background: #e57373; border-color: #c62828; flex: 1;" onclick="resetSentence()">CLEAR</button>
            <button class="btn-action" style="background: var(--success); border-color: #2e7d32; flex: 2;" onclick="checkOrder()">CHECK ORDER</button>
        </div>
    </div>

    <div id="end-screen" class="menu-card hidden">
        <h2>TRAINING COMPLETE</h2>
        <div style="font-family: 'Bangers'; font-size: 4rem; color: var(--hero-yellow);" id="final-score">0</div>
        <button class="btn-action" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</main>

        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('score-display').innerText = "0";
        loadSentence();
    }

    function tokenize(arr) {
        let tokens = [];
        arr.forEach(segment => {
            let words = segment.split(" ");
            for (let i = 0; i < words.length; i++) {
                let current = words[i];
                let lower = current.toLowerCase();
                if ((lower === "the" || lower === "a" || lower === "an") && i + 1 < words.length) {
                    tokens.push(current + " " + words[i+1]);
                    i++;
                } else {
                    tokens.push(current);
                }
            }
        });
        return tokens;
    }

    function loadSentence() {
        const rawSentence = sessionSentences[currentRound];
        correctOrder = tokenize(rawSentence);
        let scrambled = [...correctOrder].sort(() => Math.random() - 0.5);
        
        const poolEl = document.getElementById('word-pool');
        poolEl.innerHTML = '';
        scrambled.forEach((word) => {
            const btn = document.createElement('div');
            btn.className = 'word-block';
            btn.innerText = word;
            btn.onclick = () => selectWord(word, btn);
            poolEl.appendChild(btn);
        });

        resetSentence();
        document.getElementById('round-display').innerText = currentRound + 1;
    }

    function selectWord(word, el) {
        userOrder.push(word);
        el.classList.add('selected');
        const zone = document.getElementById('answer-zone');
        const wordEl = document.createElement('div');
        wordEl.className = 'placed-word';
        wordEl.innerText = word;
        zone.appendChild(wordEl);
    }

    function resetSentence() {
        userOrder = [];
        document.getElementById('answer-zone').innerHTML = '';
        document.getElementById('feedback-text').innerText = '';
        document.querySelectorAll('.word-block').forEach(b => b.classList.remove('selected'));
    }

    function checkOrder() {
        if (userOrder.length < correctOrder.length) return;
        const isCorrect = JSON.stringify(userOrder) === JSON.stringify(correctOrder);
        if (isCorrect) {
            score += 10;
            document.getElementById('score-display').innerText = score;
            showFeedback("PERFECT!", true);
            confetti({ particleCount: 30, spread: 40, origin: { y: 0.8 } });
            setTimeout(() => {
                currentRound++;
                if (currentRound < 10) loadSentence();
                else endGame();
            }, 1000);
        } else {
            showFeedback("TRY AGAIN!", false);
            setTimeout(resetSentence, 800);
        }
    }

    function showFeedback(msg, success) {
        const f = document.getElementById('feedback-text');
        f.innerText = msg;
        f.style.color = success ? "var(--success)" : "var(--danger)";
    }

    function endGame() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }
</script>
</body>
</html>
