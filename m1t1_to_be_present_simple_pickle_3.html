<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To Be Reflex Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
        --hero-purple-main: #7b2cbf;
        --hero-purple-dark: #3c096c;
        --hero-yellow: #ffb703;
        --hero-cyan: #00f5d4;
        --hero-red: #d32f2f;
        --header-bg: #ff7043;
    }
    body { font-family: 'Lexend', sans-serif; background: radial-gradient(circle at center, #1a102a 0%, #05101a 100%); color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    header { background: var(--header-bg); padding: 1.5rem; text-align: center; border-bottom: 5px solid var(--hero-yellow); }
    header h1 { font-family: 'Bangers', cursive; font-size: 3.5rem; margin: 0; }

    .main-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; padding: 20px; }
    
    .sentence-wrapper { font-size: 4rem; font-family: 'Bangers'; margin: 2rem 0; color: var(--hero-yellow); }
    input[type="text"] { padding: 1.5rem; font-size: 2.5rem; border: 4px solid var(--hero-cyan); border-radius: 20px; width: 350px; text-align: center; background: rgba(255,255,255,0.1); color: white; }
    
    .btn { background: var(--hero-purple-main); color: white; border: none; padding: 20px 40px; margin: 10px; border-radius: 50px; font-family: 'Bangers', cursive; font-size: 1.8rem; cursor: pointer; border-bottom: 6px solid var(--hero-purple-dark); transition: 0.2s; }
    .btn:hover { background: var(--hero-cyan); color: var(--hero-purple-dark); }
    
    /* Deze klasse wordt toegevoegd als een knop is geselecteerd */
    .btn.active { 
        background: var(--hero-cyan) !important; 
        color: var(--hero-purple-dark) !important; 
        transform: translateY(4px); 
        border-bottom: none;
    }

    .stars { font-size: 3rem; margin-bottom: 1rem; }
    .feedback { font-size: 2rem; font-family: 'Bangers'; height: 3rem; margin-top: 1rem; }
    
    footer { background: #000; padding: 1rem; text-align: center; font-size: 1rem; color: #fff; border-top: 2px solid #333; }
    .hidden { display: none; }
  </style>
</head>
<body>

<header><h1>✍️ REFLEX – TYP "TO BE"</h1></header>

<div class="main-wrapper">
  <div id="setup">
    <h2 style="font-family: 'Bangers'; font-size: 2.5rem;">KIES MODUS & SNELHEID:</h2>
    <!-- IDs toegevoegd om ze makkelijker aan te sturen -->
    <button class="btn" id="mode-full" onclick="selectMode('full', this)">VOLLEDIG</button>
    <button class="btn" id="mode-short" onclick="selectMode('short', this)">AFKORTING</button>
    <div style="margin: 20px 0;">
        <button class="btn level-btn" onclick="selectLevel(1, this)">1</button>
        <button class="btn level-btn" onclick="selectLevel(2, this)">2</button>
        <button class="btn level-btn" onclick="selectLevel(3, this)">3</button>
        <button class="btn level-btn" onclick="selectLevel(4, this)">4</button>
        <button class="btn level-btn" onclick="selectLevel(5, this)">5</button>
    </div>
    <button class="btn" id="startBtn" onclick="startGame()" disabled>▶ START</button>
  </div>

  <div id="game" class="hidden">
    <div class="stars" id="stars">⭐⭐⭐</div>
    <div class="sentence-wrapper" id="sentence">...</div>
    <input type="text" id="answerInput" placeholder="Typ..." autocomplete="off" />
    <br><button class="btn" onclick="submitAnswer()" style="margin-top:20px;">CONTROLEER</button>
    <div id="feedback" class="feedback"></div>
  </div>

  <div id="game-over" class="hidden">
    <h2 style="font-family: 'Bangers'; font-size: 4rem; color: var(--hero-red);">GAME OVER!</h2>
    <p id="final-score" style="font-size: 2rem;"></p>
    <button class="btn" onclick="window.location.reload()">🔄 OPNIEUW</button>
  </div>
</div>

<footer>&copy; 2026, Engliforce: Make English Your Superpower!</footer>

<script>
  const data = [
    {s: "I ___ ready.", f: "am", sh: "'m"}, {s: "You ___ happy.", f: "are", sh: "'re"}, {s: "He ___ smart.", f: "is", sh: "'s"},
    {s: "She ___ kind.", f: "is", sh: "'s"}, {s: "It ___ cold.", f: "is", sh: "'s"}, {s: "We ___ late.", f: "are", sh: "'re"},
    {s: "They ___ here.", f: "are", sh: "'re"}, {s: "John ___ tall.", f: "is", sh: "'s"}, {s: "The dog ___ loud.", f: "is", sh: "'s"},
    {s: "My friends ___ fun.", f: "are", sh: "'re"}, {s: "Sarah ___ hungry.", f: "is", sh: "'s"}, {s: "The car ___ red.", f: "is", sh: "'s"}
    // ... (rest van de 100 vragen)
  ];

  let mode="", speed=0, idx=0, score=0, lives=3, timer=null;

  function selectMode(m, el) { 
    mode=m; 
    document.querySelectorAll('#mode-full, #mode-short').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    check(); 
  }

  function selectLevel(l, el) { 
    speed={1:10000, 2:8000, 3:6000, 4:4000, 5:2500}[l]; 
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    check(); 
  }

  function check() { if(mode && speed) document.getElementById('startBtn').disabled=false; }
  function startGame() { document.getElementById('setup').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); show(); }
  function show() { document.getElementById('sentence').textContent=data[idx].s; document.getElementById('answerInput').value=""; document.getElementById('answerInput').focus(); clearTimeout(timer); timer=setTimeout(loseLife, speed); }
  function loseLife() { lives--; document.getElementById('stars').textContent = "⭐".repeat(lives); if(lives<=0) endGame(); else show(); }
  function submitAnswer() { clearTimeout(timer); const val=document.getElementById('answerInput').value.trim().toLowerCase(); if(val === (mode==='short'?data[idx].sh:data[idx].f)) { score++; document.getElementById('feedback').textContent="✔ CORRECT!"; } else { loseLife(); return; } idx++; if(idx<data.length) show(); else endGame(); }
  function endGame() { document.getElementById('game').classList.add('hidden'); document.getElementById('game-over').classList.remove('hidden'); document.getElementById('final-score').textContent="Eindscore: " + score + " / 100"; }
  document.getElementById('answerInput').addEventListener("keypress", (e) => { if(e.key==='Enter') submitAnswer(); });
</script>
</body>
</html>
