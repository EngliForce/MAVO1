<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Should or Shouldn't? - Spin the Wheel</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #13111c 0%, #07050e 100%);
            --glass-bg: rgba(25, 25, 35, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.8);
            --text-color: #f1f1f7;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --correct-color: #39ff14;
            --wrong-color: #ff3131;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden;
            padding: 15px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 750px;
            height: 90vh;
            max-height: 620px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--glass-shadow);
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 5px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 95%;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.05);
            font-weight: bold;
            font-size: 0.95rem;
        }
        
        .score-counter { display: flex; gap: 15px; }
        #timer { color: #fff; }
        #correct-counter { color: var(--correct-color); }
        #wrong-counter { color: var(--wrong-color); }
        #questions-left { color: var(--neon-blue); }

        .btn {
            background: linear-gradient(135deg, #2b2b36 0%, #17171f 100%);
            border: 2px solid var(--neon-blue);
            color: white;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            transition: all 0.2s ease;
        }

        .btn:active { transform: scale(0.95); }

        /* HET RAD: 15 Segmenten van 24 graden per stuk */
        .wheel-container {
            position: relative;
            width: 290px;
            height: 290px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wheel-pointer {
            position: absolute;
            top: -12px;
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 25px solid var(--neon-pink);
            z-index: 10;
            filter: drop-shadow(0 0 10px var(--neon-pink));
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #252330;
            /* 15 vakken: 5 kleuren die zich 3 keer herhalen (5 x 3 = 15) */
            background: conic-gradient(
                from 0deg,
                #00f0ff 0deg 24deg,     /* 1 Cyaan */
                #ff007f 24deg 48deg,    /* 2 Magenta */
                #39ff14 48deg 72deg,    /* 3 Lime */
                #ffaa00 72deg 96deg,    /* 4 Oranje */
                #9d00ff 96deg 120deg,   /* 5 Paars */
                #00f0ff 120deg 144deg,  /* 6 Cyaan */
                #ff007f 144deg 168deg,  /* 7 Magenta */
                #39ff14 168deg 192deg,  /* 8 Lime */
                #ffaa00 192deg 216deg,  /* 9 Oranje */
                #9d00ff 216deg 240deg,  /* 10 Paars */
                #00f0ff 240deg 264deg,  /* 11 Cyaan */
                #ff007f 264deg 288deg,  /* 12 Magenta */
                #39ff14 288deg 312deg,  /* 13 Lime */
                #ffaa00 312deg 336deg,  /* 14 Oranje */
                #9d00ff 336deg 360deg   /* 15 Paars */
            );
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
            transition: transform 3.5s cubic-bezier(0.1, 0.8, 0.2, 1);
            position: relative;
        }

        /* Lijnen precies op 24 graden interval */
        .wheel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: repeating-conic-gradient(rgba(0,0,0,0) 0deg 23.5deg, rgba(0,0,0,0.4) 23.5deg 24deg);
            pointer-events: none;
        }

        .wheel::after {
            content: '';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 44px; height: 44px;
            background: #15131c;
            border: 4px solid #fff;
            border-radius: 50%;
            z-index: 2;
        }

        /* Schermen */
        .screen { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-around; height: 80%; }
        .hidden { display: none !important; }

        /* Vraag Styling */
        .question-box { background: rgba(0, 0, 0, 0.35); padding: 20px; border-radius: 16px; width: 100%; text-align: center; }
        .question-text { font-size: 1.3rem; line-height: 1.4; font-weight: 600; }
        .options-container { display: flex; width: 100%; gap: 15px; margin-top: 20px; }
        .option-btn { flex: 1; background: rgba(255,255,255,0.05); border: 2px solid var(--glass-border); color: #fff; padding: 20px; font-size: 1.4rem; font-weight: bold; border-radius: 16px; cursor: pointer; }
        
        .option-btn.correct { border-color: var(--correct-color); color: var(--correct-color); background: rgba(57, 255, 20, 0.1); }
        .option-btn.wrong { border-color: var(--wrong-color); color: var(--wrong-color); background: rgba(255, 49, 49, 0.1); }

        /* Review List */
        .review-list { text-align: left; width: 100%; height: 160px; overflow-y: auto; margin-top: 10px; }
        .review-item { background: rgba(0, 0, 0, 0.3); padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid var(--wrong-color); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="setup-screen" class="screen">
            <h1>Should / Shouldn't</h1>
            <p>Spin the Wheel</p>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="padding:10px 20px; font-size:1rem;" onclick="startGame(180)">3 MIN</button>
                <button class="btn" style="padding:10px 20px; font-size:1rem;" onclick="startGame(300)">5 MIN</button>
                <button class="btn" style="padding:10px 20px; font-size:1rem;" onclick="startGame(420)">7 MIN</button>
            </div>
        </div>

        <div id="status-bar" class="status-bar hidden">
            <span id="timer">0:00</span>
            <div class="score-counter">
                <span id="correct-counter">✓ 0</span>
                <span id="wrong-counter">✗ 0</span>
            </div>
            <span id="questions-left">50 LEFT</span>
        </div>

        <div id="wheel-screen" class="screen hidden">
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <div class="wheel" id="wheel"></div>
            </div>
            <button class="btn" id="spin-btn" onclick="spinWheel()">SPIN</button>
        </div>

        <div id="question-screen" class="screen hidden">
            <div class="question-box">
                <p class="question-text" id="question-text">...</p>
            </div>
            <div class="options-container" id="options-container"></div>
            <div id="feedback" style="font-weight:bold; height:20px;"></div>
        </div>

        <div id="end-screen" class="screen hidden">
            <h1 style="color:var(--neon-pink)">TIME UP!</h1>
            <p id="final-score" style="font-weight:bold;"></p>
            <div class="review-list" id="review-list"></div>
            <button class="btn" onclick="location.reload()">RESTART</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "It's raining outside. You ______ take an umbrella.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ eat sweets in bed. It's bad for your teeth.", a: "should", b: "shouldn't", correct: "b" },
            { q: "He has a very high fever. He ______ see a doctor.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ scream in the library. People are trying to study.", a: "should", b: "shouldn't", correct: "b" },
            { q: "To get high grades, students ______ pay attention in class.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ share your passwords with strangers online.", a: "should", b: "shouldn't", correct: "b" },
            { q: "Your phone battery is at 1%. You ______ charge it.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ cross the street when the light is red.", a: "should", b: "shouldn't", correct: "b" },
            { q: "The soup is boiling hot! You ______ eat it immediately.", a: "should", b: "shouldn't", correct: "b" },
            { q: "If you are tired, you ______ go to sleep earlier.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ copy your friend's homework. That is cheating.", a: "should", b: "shouldn't", correct: "b" },
            { q: "We ______ protect nature and recycle our plastic trash.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ play games all night when you have an exam.", a: "should", b: "shouldn't", correct: "b" },
            { q: "Your dog is hungry. You ______ give him some food.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ leave rubbish on the beach. Put it in the bin.", a: "should", b: "shouldn't", correct: "b" },
            { q: "If you don't know the words, you ______ use a dictionary.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ run near the pool. It is very slippery.", a: "should", b: "shouldn't", correct: "b" },
            { q: "You ______ drink plenty of water when it is hot.", a: "should", b: "shouldn't", correct: "a" },
            { q: "People ______ forget to say 'thanks' for a present.", a: "should", b: "shouldn't", correct: "b" },
            { q: "Your room is a total mess. You ______ clean it up.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ text while you are riding your bicycle.", a: "should", b: "shouldn't", correct: "b" },
            { q: "The test is tomorrow. You ______ start studying today.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ laugh at classmates when they fail.", a: "should", b: "shouldn't", correct: "b" },
            { q: "If you find a wallet, you ______ give it back.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ play football inside the living room.", a: "should", b: "shouldn't", correct: "b" },
            { q: "Children ______ eat vegetables to stay healthy.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ touch broken glass. You will cut yourself.", a: "should", b: "shouldn't", correct: "b" },
            { q: "Before you eat dinner, you ______ wash your hands.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ speak when the teacher is explaining.", a: "should", b: "shouldn't", correct: "b" },
            { q: "If you have a toothache, you ______ see a dentist.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ leave the water running while brushing.", a: "should", b: "shouldn't", correct: "b" },
            { q: "Drivers ______ stop for people on zebra crossings.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ believe everything you see on TikTok.", a: "should", b: "shouldn't", correct: "b" },
            { q: "If your eyes hurt, you ______ take a break.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ walk alone in a dark forest at night.", a: "should", b: "shouldn't", correct: "b" },
            { q: "Students ______ be late for their school lessons.", a: "should", b: "shouldn't", correct: "b" },
            { q: "When you ride a scooter, you ______ wear a helmet.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ buy expensive things if you have no money.", a: "should", b: "shouldn't", correct: "b" },
            { q: "When someone helps you, you ______ say 'thanks'.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ put muddy shoes on the white sofa.", a: "should", b: "shouldn't", correct: "b" },
            { q: "If you feel sick, you ______ stay home from school.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ forget your mother's birthday.", a: "should", b: "shouldn't", correct: "b" },
            { q: "We ______ be kind to animals.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ drink energy drinks before bed.", a: "should", b: "shouldn't", correct: "b" },
            { q: "If you break a toy, you ______ say sorry.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ open doors for people with heavy bags.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ post videos of others without asking.", a: "should", b: "shouldn't", correct: "b" },
            { q: "In the winter, you ______ wear a warm coat.", a: "should", b: "shouldn't", correct: "a" },
            { q: "You ______ talk with your mouth full of food.", a: "should", b: "shouldn't", correct: "b" },
            { q: "If you see bullying, you ______ tell a teacher.", a: "should", b: "shouldn't", correct: "a" }
        ];

        let pool = [...questions];
        let timeLeft, timerIdx, currentIdx;
        let correct = 0, wrong = 0, wrongList = [], rotation = 0;

        function startGame(s) {
            timeLeft = s;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('status-bar').classList.remove('hidden');
            document.getElementById('wheel-screen').classList.remove('hidden');
            updateUI();
            timerIdx = setInterval(() => {
                timeLeft--;
                updateUI();
                if(timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateUI() {
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            document.getElementById('correct-counter').innerText = `✓ ${correct}`;
            document.getElementById('wrong-counter').innerText = `✗ ${wrong}`;
            document.getElementById('questions-left').innerText = `${pool.length} LEFT`;
        }

        function spinWheel() {
            if(pool.length === 0) return endGame();
            document.getElementById('spin-btn').disabled = true;
            rotation += 1440 + Math.floor(Math.random() * 360);
            document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;
            currentIdx = Math.floor(Math.random() * pool.length);
            setTimeout(() => {
                showQuestion();
                document.getElementById('spin-btn').disabled = false;
            }, 3500);
        }

        function showQuestion() {
            document.getElementById('wheel-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            const q = pool[currentIdx];
            document.getElementById('question-text').innerText = q.q.replace("______", ".......");
            document.getElementById('options-container').innerHTML = `
                <button class="option-btn" onclick="check('a')">${q.a}</button>
                <button class="option-btn" onclick="check('b')">${q.b}</button>
            `;
            document.getElementById('feedback').innerText = "";
        }

        function check(ans) {
            const q = pool[currentIdx];
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.style.pointerEvents = 'none');
            if(ans === q.correct) {
                correct++;
                document.getElementById('feedback').innerText = "CORRECT!";
                document.getElementById('feedback').style.color = "var(--correct-color)";
                btns[ans==='a'?0:1].classList.add('correct');
            } else {
                wrong++;
                wrongList.push(q);
                document.getElementById('feedback').innerText = "WRONG!";
                document.getElementById('feedback').style.color = "var(--wrong-color)";
                btns[ans==='a'?0:1].classList.add('wrong');
                btns[q.correct==='a'?0:1].classList.add('correct');
            }
            pool.splice(currentIdx, 1);
            updateUI();
            setTimeout(() => {
                if(pool.length === 0 || timeLeft <= 0) endGame();
                else {
                    document.getElementById('question-screen').classList.add('hidden');
                    document.getElementById('wheel-screen').classList.remove('hidden');
                }
            }, 2000);
        }

        function endGame() {
            clearInterval(timerIdx);
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('status-bar').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `SCORE: ${correct} Correct | ${wrong} Wrong`;
            const list = document.getElementById('review-list');
            list.innerHTML = wrongList.length ? "" : "<p>Perfect job! No mistakes.</p>";
            wrongList.forEach(item => {
                const correctWord = item.correct === 'a' ? item.a : item.b;
                const sentence = item.q.replace("______", `<b style="color:var(--correct-color)">${correctWord}</b>`);
                list.innerHTML += `<div class="review-item">➔ ${sentence}</div>`;
            });
        }
    </script>
</body>
</html>
