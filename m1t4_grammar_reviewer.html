<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Wide-Screen Quiz</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-yellow: #fbbf24;
            --accent-pink: #ec4899;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b, #050505);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
        }

        /* Screens */
        .screen { display: none; width: 95%; max-width: 1600px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Setup Grid */
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }

        /* Toggles */
        .topic-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 8px; border-radius: 10px; background: rgba(255,255,255,0.02); }
        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Quiz Layout (Wide) */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .questions-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 20px; 
            width: 100%;
            padding-bottom: 180px; 
        }

        .q-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .q-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
        
        /* INSTRUCTIE */
        .q-instruction { 
            font-size: 1.2rem; 
            font-weight: 800; 
            color: var(--accent-yellow); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 15px;
            background: rgba(251, 191, 36, 0.15);
            padding: 8px 16px;
            border-radius: 12px;
            display: inline-block;
            align-self: center;
        }
        
        /* Highlight voor het specifieke woord */
        .hl {
            color: var(--accent-pink);
            font-weight: 900;
        }

        .q-text { font-size: 2rem; font-weight: 600; margin-bottom: 15px; line-height: 1.4; }
        .a-text { font-size: 2.2rem; font-weight: 800; color: var(--accent-green); display: none; border-top: 1px solid var(--border); padding-top: 15px; line-height: 1.5; }

        /* Controls */
        .btn { border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-secondary { background: var(--accent-purple); color: white; }
        
        /* CLASS MANAGEMENT */
        .class-btn { background: #222; color: white; border: 1px solid var(--border); padding: 10px 18px; border-radius: 8px; margin: 5px 5px 5px 0; cursor: pointer; font-size: 1.1rem;}
        .class-btn.selected { border-color: var(--accent-blue); background: var(--accent-blue); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .add-class-container { display: flex; gap: 10px; margin-bottom: 15px; margin-top: 10px;}
        .add-class-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 10px 15px; border-radius: 8px; flex-grow: 1; font-size: 1.1rem; }
        .add-class-btn { background: var(--accent-green); color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        textarea { width: 100%; height: 120px; background: #111; color: white; border: 1px solid var(--border); border-radius: 10px; padding: 15px; font-size: 1.1rem; box-sizing: border-box; resize: vertical; }
        
        /* ZWEVENDE NAMENKIEZER - SUBTIEL */
        .floating-picker {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 900;
            min-width: 220px;
            transition: transform 0.2s;
        }

        #name-display { 
            font-size: 2rem; 
            font-weight: 800; 
            color: #fff; 
            margin-bottom: 12px;
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        .btn-magic {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-magic:hover { background: var(--accent-purple); border-color: var(--accent-purple); }
        .btn-magic:active { transform: scale(0.95); }

        /* FULLSCREEN WINNER OVERLAY */
        .fullscreen-winner {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .fullscreen-winner.show {
            opacity: 1;
            pointer-events: all;
            cursor: pointer;
        }
        
        #huge-winner-text {
            font-size: 8rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            background: -webkit-linear-gradient(45deg, #fbbf24, #ec4899, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: scale(0.5);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .fullscreen-winner.show #huge-winner-text {
            transform: scale(1);
        }
    </style>
</head>
<body>

<div id="fullscreen-overlay" class="fullscreen-winner" onclick="closeOverlay()">
    <div id="huge-winner-text">NAME</div>
</div>

<div id="setup-screen" class="screen active glass">
    <h1 style="text-align: center; font-size: 3rem; margin-top: 0;">Quiz Configurator</h1>
    <div class="setup-grid">
        <div>
            <h2>1. Classes & Names</h2>
            
            <div class="add-class-container">
                <input type="text" id="new-class-input" class="add-class-input" placeholder="E.g., Class 1A" onkeypress="if(event.key === 'Enter') addClass()">
                <button class="add-class-btn" onclick="addClass()">+ Add Class</button>
            </div>
            
            <div id="class-btns" style="margin-bottom: 15px; min-height: 40px;"></div>
            
            <textarea id="names-input" placeholder="Select a class and paste student names here (separated by comma or enter)..." disabled onchange="saveCurrentClass()"></textarea>
            
            <h2 style="margin-top: 30px;">2. Settings</h2>
            <button class="btn btn-primary" style="width: 100%; font-size: 1.5rem;" onclick="startQuiz()">START QUIZ</button>
        </div>
        <div>
            <h2>3. Topics</h2>
            <div id="topic-toggles"></div>
        </div>
    </div>
</div>

<div id="quiz-screen" class="screen">
    <div class="quiz-header glass">
        <div>
            <span id="active-class-title" style="font-size: 1.5rem; font-weight: bold; color: var(--accent-blue);">CLASS: -</span>
        </div>
        <div style="display: flex; gap: 15px;">
            <button class="btn btn-primary" onclick="generateQuestions()">NEW QUESTIONS</button>
            <button class="btn" style="background: #333; color: white;" onclick="showSetup()">EXIT</button>
        </div>
    </div>

    <div id="questions-area" class="questions-container"></div>

    <div class="floating-picker">
        <div id="name-display">Ready</div>
        <button class="btn-magic" onclick="pickStudent()">🎲 PICK STUDENT</button>
    </div>
</div>

    let classes = {};
    let currentClass = null;
    let overlayTimeout = null;

    function init() {
        const savedClasses = localStorage.getItem('englishQuizClasses');
        if (savedClasses) {
            try {
                classes = JSON.parse(savedClasses);
            } catch (e) {
                classes = {};
            }
        }

        renderClasses();
        
        const toggles = document.getElementById('topic-toggles');
        Object.keys(data).forEach(t => {
            const row = document.createElement('div');
            row.className = 'topic-row';
            row.innerHTML = `<span>${t}</span><label class="switch"><input type="checkbox" checked data-topic="${t}"><span class="slider"></span></label>`;
            toggles.appendChild(row);
        });
    }

    function saveToMemory() {
        localStorage.setItem('englishQuizClasses', JSON.stringify(classes));
    }

    function saveCurrentClass() {
        if (currentClass) {
            classes[currentClass] = document.getElementById('names-input').value.split(/[\n,]+/).map(s => s.trim()).filter(s => s);
            saveToMemory();
        }
    }

    function addClass() {
        const input = document.getElementById('new-class-input');
        const val = input.value.trim();
        
        if (val && !classes[val]) {
            classes[val] = []; 
            input.value = '';
            saveToMemory();
            selectClass(val);
        } else if (classes[val]) {
            alert("This class already exists!");
        }
    }

    function renderClasses() {
        const btns = document.getElementById('class-btns');
        const textArea = document.getElementById('names-input');
        
        btns.innerHTML = '';
        const classNames = Object.keys(classes);
        
        if (classNames.length === 0) {
            btns.innerHTML = '<span style="color: #888; font-style: italic;">No classes yet. Add one above.</span>';
            textArea.value = '';
            textArea.disabled = true;
            return;
        }
        
        textArea.disabled = false;
        
        classNames.forEach(c => {
            const b = document.createElement('button');
            b.className = 'class-btn ' + (c === currentClass ? 'selected' : '');
            b.innerText = c;
            b.onclick = () => selectClass(c);
            btns.appendChild(b);
        });
    }

    function selectClass(c) {
        saveCurrentClass();
        currentClass = c;
        renderClasses();
        document.getElementById('names-input').value = classes[c] ? classes[c].join(', ') : '';
    }

    function startQuiz() {
        if (!currentClass) return alert("Please add a class first!");
        
        saveCurrentClass(); 
        
        if (classes[currentClass].length === 0) {
            return alert("Please enter at least one name for this class!");
        }

        document.getElementById('active-class-title').innerText = "CLASS: " + currentClass;
        document.getElementById('name-display').innerText = "Ready";
        
        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        generateQuestions();
    }

    function showSetup() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('setup-screen').classList.add('active');
    }

    function generateQuestions() {
        const activeTopics = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(i => i.dataset.topic);
        if(activeTopics.length === 0) return alert("Please select at least one topic!");
        
        let topicsMap = {};
        activeTopics.forEach(t => {
            let shuffledQuestions = [...data[t]].sort(() => 0.5 - Math.random());
            topicsMap[t] = shuffledQuestions.map(q => ({...q, topic: t}));
        });
        
        let chosen = [];
        let topicKeys = [...activeTopics].sort(() => 0.5 - Math.random()); 
        
        let keepGoing = true;
        while (chosen.length < 5 && keepGoing) {
            keepGoing = false; 
            
            for (let i = 0; i < topicKeys.length; i++) {
                let t = topicKeys[i];
                if (topicsMap[t].length > 0) {
                    chosen.push(topicsMap[t].pop());
                    keepGoing = true; 
                }
                if (chosen.length === 5) break; 
            }
        }
        
        chosen = chosen.sort(() => 0.5 - Math.random());
        
        const area = document.getElementById('questions-area');
        area.innerHTML = '';
        chosen.forEach(item => {
            const card = document.createElement('div');
            card.className = 'q-card glass';
            card.onclick = function() { this.querySelector('.a-text').style.display = 'block'; };
            card.innerHTML = `
                <div class="q-instruction">${item.i}</div>
                <div class="q-text">${item.q}</div>
                <div class="a-text">${item.a}</div>
            `;
            area.appendChild(card);
        });
    }

    function pickStudent() {
        const students = classes[currentClass];
        if(students.length === 0) return;
        
        const display = document.getElementById('name-display');
        const overlay = document.getElementById('fullscreen-overlay');
        const hugeText = document.getElementById('huge-winner-text');
        
        closeOverlay();
        
        let i = 0;
        const interval = setInterval(() => {
            display.style.color = 'rgba(255,255,255,0.7)';
            display.innerText = students[Math.floor(Math.random() * students.length)];
            i++;
            if(i > 15) {
                clearInterval(interval);
                const winner = students[Math.floor(Math.random() * students.length)];
                
                display.innerText = winner;
                display.style.color = 'var(--accent-purple)'; 
                
                hugeText.innerText = winner;
                overlay.classList.add('show');
                
                overlayTimeout = setTimeout(() => {
                    closeOverlay();
                }, 5000);
            }
        }, 80);
    }
    
    function closeOverlay() {
        clearTimeout(overlayTimeout);
        document.getElementById('fullscreen-overlay').classList.remove('show');
    }

    init();
</script>
