            background: rgba(26, 16, 42, 0.9);
            border: 2px solid var(--hero-cyan);
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            min-height: 550px;
            position: relative;

            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.4;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bubble-in { background: var(--wa-bubble-in); align-self: flex-start; border-bottom-left-radius: 2px; color: #e9edef; }
        .bubble-out { background: var(--wa-bubble-out); align-self: flex-end; border-bottom-right-radius: 2px; color: #fff; }

            display: flex;
            gap: 10px;
            background: #202c33;
            padding: 10px;
            border-radius: 30px;
            align-items: center;

        .wa-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            outline: none;
            padding: 5px 10px;
        }

            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: 0.2s;

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: none;
        }

            border: none;

        { q: "What are the kids going to do?", h: "shout", a: ["The kids are going to shout", "They are going to shout"] },
        { q: "What is the friend going to do?", h: "help", a: ["The friend is going to help", "He is going to help", "She is going to help"] },
        { q: "What is the sister going to do?", h: "read", a: ["The sister is going to read", "She is going to read"] },
        { q: "What is the brother going to do?", h: "run", a: ["The brother is going to run", "He is going to run"] },
        { q: "What is the mother going to do?", h: "cook", a: ["The mother is going to cook", "She is going to cook"] },
        { q: "What is the father going to do?", h: "work", a: ["The father is going to work", "He is going to work"] },
        { q: "What is the girl going to do?", h: "jump", a: ["The girl is going to jump", "She is going to jump"] },
        { q: "What is the boy going to do?", h: "kick the ball", a: ["The boy is going to kick the ball", "He is going to kick the ball"] },
        { q: "What is the man going to do?", h: "sit down", a: ["The man is going to sit down", "He is going to sit down"] },
        { q: "What is the woman going to do?", h: "stand up", a: ["The woman is going to stand up", "She is going to stand up"] },
        { q: "What is the agent going to do?", h: "follow us", a: ["The agent is going to follow us", "He is going to follow us", "She is going to follow us"] },
        { q: "What is the villain going to do?", h: "hide the key", a: ["The villain is going to hide the key", "He is going to hide the key", "They are going to hide the key"] },
        { q: "What is the hacker going to do?", h: "steal the file", a: ["The hacker is going to steal the file", "He is going to steal the file", "She is going to steal the file"] },
        { q: "What is the spy going to do?", h: "wear a wig", a: ["The spy is going to wear a wig", "He is going to wear a wig", "She is going to wear a wig"] }
    ];

    let currentQuestions = [];
    let qIndex = 0;
    let score = 0;

    function startGame() {
        document.getElementById('screen-intro').style.display = 'none';
        document.getElementById('screen-game').style.display = 'flex';
        currentQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, 10);
        showQuestion();
    }

    function addBubble(text, type, sender = "", hint = "") {
        const chatWindow = document.getElementById('chat-window');
        const bubble = document.createElement('div');
        bubble.className = `bubble ${type === 'in' ? 'bubble-in' : 'bubble-out'}`;
        
        let html = "";
        if (sender) html += `<span class="sender">${sender}</span>`;
        html += `<span>${text}</span>`;
        if (hint) html += `<span class="hint">Use: (${hint})</span>`;
        
        bubble.innerHTML = html;
        chatWindow.appendChild(bubble);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function showQuestion() {
        const q = currentQuestions[qIndex];
        document.getElementById('ui-q').innerText = `SIGNAL: ${qIndex + 1} / 10`;
        document.getElementById('next-container').style.display = 'none';
        document.getElementById('input-area').style.opacity = '1';
        document.getElementById('user-input').disabled = false;
        document.getElementById('send-btn').style.display = 'flex';
        
        // --- HIER WORDT HET VELD LEEGGEGOOID ---
        document.getElementById('chat-window').innerHTML = '';
        
        addBubble(q.q, 'in', 'COMMANDER', q.h);
        document.getElementById('user-input').value = "";
        document.getElementById('user-input').focus();
    }

    function checkAnswer() {
        const input = document.getElementById('user-input');
        let val = input.value.trim();
        if (!val) return;

        if (val[0] !== val[0].toUpperCase()) {
            addBubble("❌ SYSTEM ERROR: Please start your sentence with a CAPITAL LETTER!", "in", "SYSTEM");
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 200);
            return;
        }

        addBubble(val, 'out');
        input.disabled = true;
        document.getElementById('send-btn').style.display = 'none';
        document.getElementById('input-area').style.opacity = '0.5';

        const processedInput = val.toLowerCase().replace(/[.!?]$/, "").trim();
        const correctAnswers = currentQuestions[qIndex].a;
        const isCorrect = correctAnswers.some(ans => processedInput === ans.toLowerCase().trim());

        setTimeout(() => {
            if (isCorrect) {
                score++;
                addBubble("✅ ACCESS GRANTED! Signal decoded.", "in", "COMMANDER");
                document.getElementById('flash').style.opacity = '0.2';
                setTimeout(() => document.getElementById('flash').style.opacity = '0', 150);
            } else {
                addBubble(`❌ ACCESS DENIED! Correct signal: "${correctAnswers[0]}."`, "in", "COMMANDER");
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 200);
            }
            document.getElementById('ui-score').innerText = `DECODED: ${score}`;
            document.getElementById('next-container').style.display = 'block';
        }, 700);
    }

    function nextQuestion() {
        qIndex++;
        if (qIndex < 10) {
            showQuestion();
        } else {
            document.getElementById('screen-game').style.display = 'none';
            document.getElementById('screen-end').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }
    }

    document.getElementById('user-input').addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !document.getElementById('user-input').disabled) checkAnswer();
    });
</script>
</body>
