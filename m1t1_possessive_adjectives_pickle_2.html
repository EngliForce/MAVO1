<html lang="en">

            --header-border: #ffb703;
            --hero-yellow: #ffb703;

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
             font-family: 'Inter', sans-serif; background: radial-gradient(circle at center, #1a1c2c 0%, #05070a 100%); 
             color: #f0f0f0; display: flex; flex-direction: column; 
             min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden;
        }
        header { 
             background: var(--header-bg); 
             padding: 1rem 1rem 1.8rem 1rem; 
             text-align: center; 
             clip-path: polygon(0 0, 100% 0, 100% 82%, 0 100%); 
             border-bottom: 6px solid var(--header-border); 
             z-index: 60;
        }
        header h1 { 
             font-family: 'Bangers', cursive; 
             font-size: 2.8rem; 
             letter-spacing: 3px; 
             margin: 0; 
             text-shadow: 3px 3px 0px #3c096c; 
             color: white;
            line-height: 1;
        }
        header p {
            font-family: 'Bangers', cursive;
            font-size: 1.1rem;
            color: white;
            margin: 4px 0 0 0;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #3c096c;
        }
        .main-wrapper {
             flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px;
        }
        .game-container { 
             width: 100%; max-width: 600px; background: var(--glass-bg); padding: 25px; 
             border-radius: 25px; border: 4px solid var(--curr-color); display: flex; flex-direction: column; 
             text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.9); transition: border-color 0.8s; z-index: 10;
        }
        .header-section { min-height: 50px; }
        .element-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .orb { width: 16px; height: 16px; border-radius: 50%; opacity: 0.1; border: 2px solid #fff; transition: 0.8s; }
        .orb.filled { opacity: 1; background: currentColor; box-shadow: 0 0 15px currentColor; }
        .hp-bar { font-size: 1.4rem; margin-bottom: 5px; color: #e74c3c; min-height: 25px; }
        .shard-section { height: 90px; display: flex; justify-content: center; align-items: center; }
        .shard-circle { position: relative; width: 80px; height: 80px; }
        .shard { 
             position: absolute; width: 16px; height: 28px; background: rgba(255,255,255,0.05); 
             clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); transition: all 0.4s ease; 
             left: 50%; top: 50%; margin-left: -8px; margin-top: -14px; 
        }
        .shard.active { background: var(--curr-color); box-shadow: 0 0 20px var(--curr-color); opacity: 1; }
        .instruction-banner { 
             font-family: 'Oswald'; font-size: 0.95rem; color: var(--curr-color); 
             text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; 
             border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; 
         }
        .q-text { font-size: 1.3rem; font-weight: bold; margin: 10px 0; color: #fff; min-height: 40px; }
        .btn-action { 
             background: var(--curr-color); color: #fff; padding: 16px; border-radius: 14px; 
             font-size: 1.2rem; font-family: 'Oswald'; letter-spacing: 1px; border: none; cursor: pointer; 
             width: 100%; transition: 0.2s; touch-action: manipulation; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-action:hover { filter: brightness(1.1); transform: translateY(-2px); }
        input[type="text"] { 
             width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 2px solid var(--curr-color); 
             color: white; border-radius: 12px; text-align: center; font-size: 1.2rem; outline: none; margin-bottom: 10px;
        }
        .feedback-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px 0; }
        .word-tag { padding: 8px 14px; border-radius: 10px; border: 2px solid transparent; font-size: 1.1rem; font-weight: bold; }
        .word-tag.correct { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border-color: #2ecc71; }
        .word-tag.wrong { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border-color: #e74c3c; }
        .correction { display: block; font-size: 0.75rem; color: #fff; margin-top: 4px; font-weight: normal; background: rgba(0,0,0,0.4); padding: 2px 4px; border-radius: 4px; }
        
        /* Verbeterde opmaak voor de introductietekst */
        .story-box {
            background: linear-gradient(145deg, rgba(20, 25, 40, 0.8), rgba(10, 12, 20, 0.9));
            border: 2px solid rgba(255, 183, 3, 0.3);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);

            color: #f3f4f6;
            margin: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }
        .story-highlight {
            color: var(--hero-yellow);

        }

        .giant-element { font-size: 6rem; margin-top: 10px; display: block; filter: drop-shadow(0 0 20px var(--curr-color)); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        footer {

</head>

    let lvl = 0; 
    let shards = 0;    
    let hp = 5;    
    let currentTask = null;
    
    const titles = {1:"Wood Realm 🌳", 2:"Fire Realm 🔥", 3:"Earth Realm 🌍", 4:"Metal Realm ⚔️", 5:"Water Realm 🌊"};    
    const symbols = {1:"🌳", 2:"🔥", 3:"🌍", 4:"⚔️", 5:"🌊"};    
    const colors = {1:"var(--wood)", 2:"var(--fire)", 3:"var(--earth)", 4:"var(--metal)", 5:"var(--water)"};
    
    function save() { localStorage.setItem('wu_lvl', lvl); localStorage.setItem('wu_shards', shards); }
    
    function init() {        
        document.getElementById('feedback-area').innerHTML = "";        
        document.getElementById('hp-display').style.display = (lvl === 5) ? 'block' : 'none';        
        if (lvl === 0) {            
            document.getElementById('shard-viz').style.display = 'none';            
            document.getElementById('element-bar').style.display = 'none';            
            document.getElementById('lvl-title').innerText = "Have (got) Quest";            
            document.getElementById('game-content').innerHTML = `
                <div class="story-box">
                    <p class="story-text">
                        The world is in danger! The <span class="story-highlight">elements</span> are in chaos.<br><br>
                        You must collect all the elements and grammar shards to <span class="story-highlight">save the world</span>.<br><br>
                        Travel through five realms, answer the English questions correctly, and restore peace!
                    </p>
                </div>
                <button class="btn-action" onclick="lvl=1; save(); init();">Start Quest</button>`;        
        } else if (lvl > 5) { 
            showFinalWin(); 
        } else {            
            document.getElementById('shard-viz').style.display = 'flex';            
            document.getElementById('element-bar').style.display = 'flex';            
            document.documentElement.style.setProperty('--curr-color', colors[lvl]);            
            document.getElementById('lvl-title').innerText = titles[lvl];            
            for(let i=1; i<=5; i++) document.getElementById(`st-${i}`).classList.toggle('filled', i < lvl);            
            renderTask();        }    
    }
    
    function renderTask() {        
        updateShards();        
        if(lvl === 5) document.getElementById('hp-display').innerText = "❤️".repeat(hp);        
        document.getElementById('feedback-area').innerHTML = "";        
        let pool = (lvl === 5) ? [...DB[1], ...DB[2], ...DB[3], ...DB[4]] : DB[lvl];        
        currentTask = pool[Math.floor(Math.random() * pool.length)];        
        let html = `<div class="instruction-banner">${currentTask.instr}</div><div class="q-text">${currentTask.q}</div>`;        
        if(currentTask.type === "mc") {            
            html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">` + currentTask.o.map(opt => `<button class="btn-action" onclick="handleCheck('${opt}')">${opt}</button>`).join('') + `</div>`;        } else {            
            html += `<input type="text" id="ans" placeholder="..." autocomplete="off" spellcheck="false"><button class="btn-action" onclick="handleCheck(document.getElementById('ans').value)">Check Answer</button>`;        
        }        
        document.getElementById('game-content').innerHTML = html;        
        if(document.getElementById('ans')) { 
            document.getElementById('ans').focus(); 
            document.getElementById('ans').onkeyup = (e) => { if(e.key === 'Enter') handleCheck(document.getElementById('ans').value); }; 
        }    
    }
    
    function isFlexibleMatch(input, target) {        
        const clean = (s) => s.replace("n't", " not").replace(/\s+/g, ' ').replace(/[.?]/g, '').trim();        
        return clean(input) === clean(target);    
    }
    
    function handleCheck(val) {        
        if(!val) return;        
        let v = val.trim(), target = currentTask.a;                
        let isCorrect = (currentTask.type === "mc") ? (v.toLowerCase() === target.toLowerCase()) : (isFlexibleMatch(v.toLowerCase(), target.toLowerCase()) && v.charAt(0).toLowerCase() === target.charAt(0).toLowerCase());
        
        if(isCorrect) {            
            shards++; save();            
            let goal = (lvl === 5) ? 10 : 5;            
            if(shards >= goal) showLevelWin();            
            else {                 
                document.getElementById('feedback-area').innerHTML = `<span style="color:var(--curr-color); font-size:1.1rem;">✨ SHARD COLLECTED (${shards}/${goal})</span>`;                 
                setTimeout(renderTask, 800);             
            }        
        } else {            
            if (lvl === 5) { hp--; if (hp <= 0) { gameOver(); return; } } else { shards = 0; }            
            showFailFeedback(v);        
        }    
    }
    
    function showFailFeedback(input) {        
        const targetWords = currentTask.a.split(" "), inputWords = input.split(" ");        
        let fb = `<div class="feedback-box">` + targetWords.map((t, i) => {            
            const isW = t.toLowerCase() === (inputWords[i] || "").toLowerCase();            
            return `<div class="word-tag ${isW?'correct':'wrong'}">${inputWords[i]||"___"}${isW?'':`<span class="correction">${t}</span>`}</div>`;        }).join('') + `</div><button class="btn-action" onclick="renderTask()">Try Again</button>`;        
        document.getElementById('game-content').innerHTML = `<div class="q-text" style="color:var(--fire); font-size:1.4rem;">Check Grammar, Punctuation or Caps!</div>`;        
        document.getElementById('feedback-area').innerHTML = fb;    }
    
    function showLevelWin() {        
        if(lvl === 5) { document.getElementById(`st-5`).classList.add('filled'); showFinalWin(); return; }        
        document.getElementById('shard-viz').style.display = 'none';        
        document.getElementById('game-content').innerHTML = `<div class="big-win">REALM RESTORED!</div><button class="btn-action" onclick="shards=0; lvl++; save(); init();">Next Stage</button><div class="giant-element">${symbols[lvl]}</div>`;    }
    
    function gameOver() {        
        lvl = 1; shards = 0; hp = 5; save();        
        document.getElementById('game-content').innerHTML = `<h2 style="color:var(--fire)">QUEST FAILED</h2><button class="btn-action" onclick="init()">Restart From Beginning</button>`;    }
    
    function showFinalWin() {        
        document.getElementById('lvl-title').innerText = "QUEST COMPLETE";        
        document.getElementById('shard-viz').style.display = 'none';        
        document.getElementById('game-content').innerHTML = `<div class="big-win">🌟 LIBRARY RESTORED! 🌟</div><img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1000&q=80" class="final-img" alt="Library"><p style="margin: 5px 0 15px 0;">You have mastered Have and Have Got.</p><button class="btn-action" onclick="localStorage.clear(); location.reload();">Reset Progress</button>`;        
        confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });    }
    
    function updateShards() {        
        const container = document.getElementById('shard-circle'), goal = (lvl === 5) ? 10 : 5;        
        if(container) container.innerHTML = Array.from({length: goal}, (_, i) => `<div class="shard ${i < shards ? 'active' : ''}" style="transform: rotate(${i*(360/goal)}deg) translateY(-32px);"></div>`).join('');    }    
    
    init();
</script>
