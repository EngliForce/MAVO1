<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MISSION: FLITSQUIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --hero-purple-main: #7b2cbf; --hero-yellow: #ffb703; --hero-cyan: #00f5d4; --header-bg: #ff7043; }
        html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'Lexend', sans-serif; background: radial-gradient(circle at center, #1a102a 0%, #05101a 100%); color: white; display: flex; flex-direction: column; }
        header { background: var(--header-bg); padding: 1rem; text-align: center; border-bottom: 3px solid var(--hero-yellow); }
        h1 { font-family: 'Bangers', cursive; margin: 0; }
        main { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .game-container { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 2px solid var(--hero-purple-main); width: 100%; max-width: 500px; text-align: center; }
        .question { font-size: 1.5rem; font-family: 'Bangers'; color: var(--hero-yellow); margin-bottom: 10px; }
        .hint-box { font-size: 0.9rem; color: var(--hero-cyan); margin-bottom: 20px; font-weight: bold; font-style: italic; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-action { background: var(--hero-purple-main); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { border: 2px solid var(--hero-cyan); }
        .feedback { font-family: 'Bangers'; font-size: 1.4rem; margin: 15px 0; height: 1.5em; }
    </style>
</head>
<body>
    <header><h1>⚡ FLITSQUIZ</h1></header>
    <main>
        <div class="game-container">
            <div id="question" class="question">Loading...</div>
            <div id="hint" class="hint-box"></div>
            <div class="options" id="options"></div>
            <div id="feedback" class="feedback"></div>
            <div id="score" class="score">Score: 0 / 0</div>
        </div>
    </main>

    <script>
        const allQuestions = [
            { sentence: "___ am a student.", hint: "Subject: Me", correct: "I" },
            { sentence: "___ is my best friend.", hint: "Subject: A boy", correct: "He" },
            { sentence: "___ are funny.", hint: "Subject: You and your brother", correct: "We" },
            { sentence: "___ is running fast.", hint: "Subject: The dog", correct: "It" },
            { sentence: "___ like ice cream.", hint: "Subject: Me and my friends", correct: "We" },
            { sentence: "___ are playing outside.", hint: "Subject: The students", correct: "They" },
            { sentence: "___ is a nice girl.", hint: "Subject: A girl", correct: "She" },
            { sentence: "___ have a cool car.", hint: "Subject: You are talking to your parents", correct: "You" },
            { sentence: "___ is my teacher.", hint: "Subject: Mr. Smith", correct: "He" },
            { sentence: "___ is a doctor.", hint: "Subject: Dr. Jones (female)", correct: "She" },
            { sentence: "___ is broken.", hint: "Subject: The computer", correct: "It" },
            { sentence: "___ love to sing.", hint: "Subject: You are talking to your friends", correct: "You" },
            { sentence: "___ am doing my homework.", hint: "Subject: Me", correct: "I" },
            { sentence: "___ are smart kids.", hint: "Subject: Those children", correct: "They" },
            { sentence: "___ is a tall man.", hint: "Subject: My father", correct: "He" },
            { sentence: "___ is my sister.", hint: "Subject: Anna", correct: "She" },
            { sentence: "___ like to swim.", hint: "Subject: Me and my family", correct: "We" },
            { sentence: "___ is raining today.", hint: "Subject: The weather", correct: "It" },
            { sentence: "___ are great at football.", hint: "Subject: My friends", correct: "They" },
            { sentence: "___ play in the park.", hint: "Subject: Tom and Jerry", correct: "They" },
            { sentence: "___ am reading a comic.", hint: "Subject: Me", correct: "I" },
            { sentence: "___ is a surgeon.", hint: "Subject: Dr. Miller (male)", correct: "He" },
            { sentence: "___ is baking a cake.", hint: "Subject: A mother", correct: "She" },
            { sentence: "___ is under the table.", hint: "Subject: The cat", correct: "It" },
            { sentence: "___ are going to the cinema.", hint: "Subject: Me and my friend", correct: "We" },
            { sentence: "___ work at the hospital.", hint: "Subject: The nurses", correct: "They" },
            { sentence: "___ look tired.", hint: "Subject: You are talking to your nieghbours", correct: "You" },
            { sentence: "___ is green.", hint: "Subject: The apple", correct: "It" },
            { sentence: "___ are very helpful.", hint: "Subject: You and your sister", correct: "We" },
            { sentence: "___ is a good singer.", hint: "Subject: A man", correct: "He" },
            { sentence: "___ likes to paint.", hint: "Subject: A woman", correct: "She" },
            { sentence: "___ have a big house.", hint: "Subject: You are talking to another person", correct: "You" },
            { sentence: "___ am going home.", hint: "Subject: Me", correct: "I" },
            { sentence: "___ are our neighbors.", hint: "Subject: The people next door", correct: "They" },
            { sentence: "___ is very cold.", hint: "Subject: The ice cream", correct: "It" },
            { sentence: "___ love our dog.", hint: "Subject: Me and my brother", correct: "We" },
            { sentence: "___ is handsome.", hint: "Subject: My brother", correct: "He" },
            { sentence: "___ is beautiful.", hint: "Subject: My mother", correct: "She" },
            { sentence: "___ are late for school.", hint: "Subject: You are talking to another person", correct: "You" },
            { sentence: "___ am happy today.", hint: "Subject: Me", correct: "I" },
            { sentence: "___ is sleeping now.", hint: "Subject: The baby", correct: "It" },
            { sentence: "___ live in London.", hint: "Subject: My friends", correct: "They" },
            { sentence: "___ speak good English.", hint: "Subject: You are talking to another person", correct: "You" },
            { sentence: "___ want to watch a movie.", hint: "Subject: Me and my parents", correct: "We" },
            { sentence: "___ is a bus driver.", hint: "Subject: A man", correct: "He" },
            { sentence: "___ is wearing a dress.", hint: "Subject: A woman", correct: "She" },
            { sentence: "___ are my favorite shoes.", hint: "Subject: Those shoes", correct: "They" },
            { sentence: "___ am not hungry.", hint: "Subject: Me", correct: "I" },
            { sentence: "___ is a nice book.", hint: "Subject: The book", correct: "It" },
            { sentence: "___ are very fast.", hint: "Subject: You are talking to someone", correct: "You" },
            { sentence: "___ like chocolate.", hint: "Subject: We", correct: "We" },
            { sentence: "___ is waiting for the bus.", hint: "Subject: A man", correct: "He" },
            { sentence: "___ is my aunt.", hint: "Subject: A woman", correct: "She" },
            { sentence: "___ are in the garden.", hint: "Subject: They", correct: "They" },
            { sentence: "___ are a good friend.", hint: "Subject: You", correct: "You" },
            { sentence: "___ is my phone.", hint: "Subject: The device", correct: "It" },
            { sentence: "___ am doing a test.", hint: "Subject: Me", correct: "I" },
            { sentence: "___ are always late.", hint: "Subject: My classmates", correct: "They" },
            { sentence: "___ is a good teacher.", hint: "Subject: A man", correct: "He" },
            { sentence: "___ is very sweet.", hint: "Subject: A woman", correct: "She" },
            { sentence: "___ like soccer.", hint: "Subject: We", correct: "We" },
            { sentence: "___ are heavy.", hint: "Subject: The suitcases", correct: "They" },
            { sentence: "___ is a long movie.", hint: "Subject: The movie", correct: "It" },
            { sentence: "___ have a big smile.", hint: "Subject: You are talking to your teacher", correct: "You" },
            { sentence: "___ am tired.", hint: "Subject: Me", correct: "I" },
            { sentence: "___ are my parents.", hint: "Subject: Mom and Dad", correct: "They" },
            { sentence: "___ is very hot outside.", hint: "Subject: The weather", correct: "It" },
            { sentence: "___ are a great team.", hint: "Subject: You and your teammate", correct: "We" },
            { sentence: "___ plays the guitar.", hint: "Subject: A man", correct: "He" },
            { sentence: "___ loves animals.", hint: "Subject: A woman", correct: "She" },
            { sentence: "___ go to the beach.", hint: "Subject: We", correct: "We" },
            { sentence: "___ are expensive.", hint: "Subject: The cars", correct: "They" },
            { sentence: "___ is a cute pet.", hint: "Subject: The hamster", correct: "It" },
            { sentence: "___ can speak French.", hint: "Subject: You are talking to a friend", correct: "You" },
            { sentence: "___ am ready.", hint: "Subject: Me", correct: "I" }
        ];

        let selectedQuestions = [];
        let current, score = 0, total = 0, index = 0;

        function initQuiz() {
            let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
            selectedQuestions = shuffled.slice(0, 10);
            score = 0; total = 0; index = 0;
            nextQuestion();
        }

        function nextQuestion() {
            if (index >= 10) return showFinal();
            current = selectedQuestions[index];
            document.getElementById("question").textContent = current.sentence;
            document.getElementById("hint").textContent = current.hint;
            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";
            ["I", "You", "He", "She", "It", "We", "They"].forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "btn-action";
                btn.textContent = opt;
                btn.onclick = () => check(opt);
                optionsDiv.appendChild(btn);
            });
        }

        function check(ans) {
            total++;
            const fb = document.getElementById("feedback");
            if (ans === current.correct) {
                score++;
                fb.textContent = "✅ Correct!";
                fb.style.color = "var(--hero-cyan)";
            } else {
                fb.textContent = "❌ It was: " + current.correct;
                fb.style.color = "#ff7043";
            }
            document.getElementById("score").textContent = `Score: ${score} / ${total}`;
            index++;
            setTimeout(nextQuestion, 1200);
        }

        function showFinal() {
            document.querySelector(".game-container").innerHTML = `<h2>Mission Complete!</h2><p>Your final score: ${score} / ${total}</p><button class="btn-action" onclick="location.reload()">RESTART</button>`;
        }

        initQuiz();
    </script>
</body>
</html>
