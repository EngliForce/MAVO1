<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngliForce: Capital Correction Mission</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-purple-main: #7b2cbf;
            --hero-purple-dark: #3c096c;
            --hero-yellow: #ffb703;
            --hero-cyan: #00f5d4;
            --hero-red: #d32f2f;
            --header-bg: #ff7043;
            --header-border: var(--hero-yellow);
        }
        body { font-family: 'Lexend', sans-serif; background: #05101a; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        header { 
            background: var(--header-bg); 
            width: 100%; 
            padding: 3rem 1rem; 
            text-align: center; 
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%); 
            border-bottom: 5px solid var(--header-border); 
        }
        h1 { font-family: 'Bangers', cursive; font-size: 3.5rem; color: white; margin: 0; text-shadow: 4px 4px 0px var(--hero-purple-dark); }
        
        .quiz-container { background: rgba(26, 16, 42, 0.95); border: 3px solid var(--hero-cyan); border-radius: 25px; padding: 40px; margin: 20px; max-width: 800px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; }
        
        .sentence-display { font-size: 1.5rem; margin: 2rem 0; color: var(--hero-yellow); font-weight: bold; }
        input[type="text"] { width: 90%; padding: 15px; font-size: 1.2rem; border-radius: 50px; border: 2px solid var(--hero-cyan); background: #05101a; color: white; text-align: center; margin-bottom: 1.5rem; }
        
        .btn { background: var(--hero-purple-main); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-family: 'Bangers'; font-size: 1.2rem; cursor: pointer; border-bottom: 5px solid var(--hero-purple-dark); transition: 0.2s; margin: 5px; }
        .btn:hover { background: var(--hero-cyan); color: var(--hero-purple-dark); transform: translateY(-3px); }
        
        .progress-container { width: 100%; background: #000; height: 15px; border-radius: 10px; margin: 20px 0; overflow: hidden; border: 1px solid var(--hero-cyan); }
        .progress-bar { height: 100%; width: 0%; background: var(--hero-cyan); transition: 0.5s ease-in-out; }
        
        footer { margin-top: auto; padding: 40px; text-align: center; color: rgba(255,255,255,0.7); border-top: 2px solid var(--hero-purple-dark); width: 100%; }
        .footer-highlight { color: var(--hero-yellow); font-weight: bold; }
        #feedback { margin: 20px 0; font-size: 1.2rem; min-height: 50px; }
    </style>
</head>
<body>
<header>    <h1>CORRECT THE MISTAKES</h1></header>
<div class="quiz-container">    
    <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>    
    <div id="progressText" style="margin-bottom: 10px;"></div>        
    <div id="quizArea">        
        <div class="sentence-display" id="sentenceDisplay"></div>        
        <input type="text" id="userInput" placeholder="Type the corrected sentence..." autocomplete="off">        
        <div>            
            <button class="btn" id="checkBtn" onclick="checkAnswer()">✔️ CHECK</button>            
            <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">➡️ NEXT</button>        
        </div>        
        <div id="feedback"></div>    
    </div>
    <div id="finalScore" style="display:none; font-size: 2rem; color: var(--hero-yellow); font-family: 'Bangers';"></div>    
    <button class="btn" onclick="startQuiz()" id="restartBtn" style="display:none; background: var(--hero-red);">🔄 TRY AGAIN</button>
</div>
<footer>    
    <p>&copy; 2026, EngliForce: <span class="footer-highlight">Make English Your Superpower!</span></p>
</footer>
<script>   
    const sentenceBank = [    { text: "i went to london last summer.", correct: "I went to London last summer." },    { text: "my birthday is in october.", correct: "My birthday is in October." },    { text: "we celebrate christmas day together.", correct: "We celebrate Christmas Day together." },    { text: "he moved to france in april.", correct: "He moved to France in April." },    { text: "they visited the eiffel tower.", correct: "They visited the Eiffel Tower." },    { text: "we went skiing in the alps.", correct: "We went skiing in the Alps." },    { text: "my sister works in oxford.", correct: "My sister works in Oxford." },    { text: "i love watching movies on netflix.", correct: "I love watching movies on Netflix." },    { text: "we read harry potter in class.", correct: "We read Harry Potter in class." },    { text: "our teacher is mr. sebel.", correct: "Our teacher is Mr. Sebel." },    { text: "july is often the hottest month.", correct: "July is often the hottest month." },    { text: "she is from spain.", correct: "She is from Spain." },    { text: "we had fun on easter monday.", correct: "We had fun on Easter Monday." },    { text: "they saw the queen at buckingham palace.", correct: "They saw the Queen at Buckingham Palace." },    { text: "i enjoy reading books by roald dahl.", correct: "I enjoy reading books by Roald Dahl." },    { text: "he lives on baker street.", correct: "He lives on Baker Street." },    { text: "they traveled through africa.", correct: "They traveled through Africa." },    { text: "we had pancakes on shrove tuesday.", correct: "We had pancakes on Shrove Tuesday." },    { text: "our class visited the british museum.", correct: "Our class visited the British Museum." },    { text: "she danced in the chinese new year parade.", correct: "She danced in the Chinese New Year parade." },    { text: "i wrote a letter to santa claus.", correct: "I wrote a letter to Santa Claus." },    { text: "they drove to scotland in september.", correct: "They drove to Scotland in September." },    { text: "i saw the loch ness monster!", correct: "I saw the Loch Ness Monster!" },    { text: "we saw fireworks on bonfire night.", correct: "We saw fireworks on Bonfire Night." },    { text: "my cousin lives in belfast.", correct: "My cousin lives in Belfast." },    { text: "we celebrate st george's day in april.", correct: "We celebrate St George's Day in April." },    { text: "i bought a ticket to see shakespeare’s play.", correct: "I bought a ticket to see Shakespeare’s play." },    { text: "we ate turkey on thanksgiving day.", correct: "We ate turkey on Thanksgiving Day." },    { text: "my dad was born on new year's day.", correct: "My dad was born on New Year's Day." },    { text: "they study english every friday.", correct: "They study English every Friday." },    { text: "yesterday i went shopping.", correct: "Yesterday I went shopping." },    { text: "she gave it to michael.", correct: "She gave it to Michael." },    { text: "next year we go to france.", correct: "Next year we go to France." },    { text: "he said that i was right.", correct: "He said that I was right." },    { text: "emma and i are friends.", correct: "Emma and I are friends." },    { text: "i always eat cereal for breakfast.", correct: "I always eat cereal for breakfast." },    { text: "after dinner i watched tv.", correct: "After dinner I watched TV." },    { text: "can i come with you?", correct: "Can I come with you?" },    { text: "do you know if i can help?", correct: "Do you know if I can help?" },    { text: "we travelled to rome.", correct: "We travelled to Rome." },    { text: "marco and i play chess.", correct: "Marco and I play chess." },    { text: "i have a friend from canada.", correct: "I have a friend from Canada." },    { text: "at night i read a book.", correct: "At night I read a book." },    { text: "do you like english?", correct: "Do you like English?" },    { text: "this is my friend tom.", correct: "This is my friend Tom." },    { text: "i saw santa claus.", correct: "I saw Santa Claus." },    { text: "we play football on monday.", correct: "We play football on Monday." },    { text: "my cousin lives in dublin.", correct: "My cousin lives in Dublin." },    { text: "on christmas day we eat turkey.", correct: "On Christmas Day we eat turkey." },    { text: "i go to onc parkdreef.", correct: "I go to ONC Parkdreef." },    { text: "have you been to the united states?", correct: "Have you been to the United States?" },    { text: "my cat is called luna.", correct: "My cat is called Luna." },    { text: "we go to the beach in august.", correct: "We go to the beach in August." },    { text: "she loves coca-cola.", correct: "She loves Coca-Cola." },    { text: "is march your favorite month?", correct: "Is March your favorite month?" },    { text: "i bought a new iphone.", correct: "I bought a new iPhone." },    { text: "he lives in amsterdam.", correct: "He lives in Amsterdam." },    { text: "do you want to play playstation?", correct: "Do you want to play PlayStation?" },    { text: "we visited the white house.", correct: "We visited the White House." },    { text: "i saw an ad for toyota.", correct: "I saw an ad for Toyota." },    { text: "is your brother named william?", correct: "Is your brother named William?" },    { text: "we saw jupiter in the sky.", correct: "We saw Jupiter in the sky." },    { text: "i study at a university in italy.", correct: "I study at a university in Italy." },    { text: "is this a book by albert einstein?", correct: "Is this a book by Albert Einstein?" },    { text: "i drink tea every morning.", correct: "I drink tea every morning." },    { text: "she learned to speak french.", correct: "She learned to speak French." },    { text: "is he from germany?", correct: "Is he from Germany?" },    { text: "we travel by train on sunday.", correct: "We travel by train on Sunday." },    { text: "i have a meeting in february.", correct: "I have a meeting in February." },    { text: "do you like disney movies?", correct: "Do you like Disney movies?" },    { text: "he eats a burger at mcdonalds.", correct: "He eats a burger at McDonalds." },    { text: "my dad drives a bmw.", correct: "My dad drives a BMW." },    { text: "is saturday your day off?", correct: "Is Saturday your day off?" },    { text: "we will go to tokyo in june.", correct: "We will go to Tokyo in June." },    { text: "i have an xbox at home.", correct: "I have an Xbox at home." },    { text: "they are reading the bible.", correct: "They are reading the Bible." },    { text: "it is cold in january.", correct: "It is cold in January." },    { text: "is the atlantic ocean very big?", correct: "Is the Atlantic Ocean very big?" },    { text: "we love wearing costumes at halloween.", correct: "We love wearing costumes at Halloween." },    { text: "is friday the last school day?", correct: "Is Friday the last school day?" },    { text: "i watched star wars last night.", correct: "I watched Star Wars last night." },    { text: "is the titanic a famous ship?", correct: "Is the Titanic a famous ship?" },    { text: "my sister was born in march.", correct: "My sister was born in March." },    { text: "is he traveling to the netherlands?", correct: "Is he traveling to the Netherlands?" },    { text: "i am studying german.", correct: "I am studying German." },    { text: "they play soccer on tuesday.", correct: "They play soccer on Tuesday." },    { text: "is she going to the party on wednesday?", correct: "Is she going to the party on Wednesday?" },    { text: "i visited the british museum in may.", correct: "I visited the British Museum in May." },    { text: "do you like to read the quran?", correct: "Do you like to read the Quran?" },    { text: "is mars red?", correct: "Is Mars red?" },    { text: "we bought a new nike shirt.", correct: "We bought a new Nike shirt." },    { text: "is november a rainy month?", correct: "Is November a rainy month?" },    { text: "i met michael in december.", correct: "I met Michael in December." },    { text: "do you like adidas shoes?", correct: "Do you like Adidas shoes?" },    { text: "i am reading a book about japan.", correct: "I am reading a book about Japan." },    { text: "we will be in london on thursday.", correct: "We will be in London on Thursday." },    { text: "she lives near oxford street.", correct: "She lives near Oxford Street." },    { text: "is the earth a planet?", correct: "Is the Earth a planet?" },    { text: "i love visiting big ben.", correct: "I love visiting Big Ben." },    { text: "the united nations meets in september.", correct: "The United Nations meets in September." }];
    let quizData = [], currentIndex = 0, score = 0;
    function startQuiz() {        quizData = [...sentenceBank].sort(() => 0.5 - Math.random());        currentIndex = 0; score = 0;        document.getElementById('finalScore').style.display = 'none';        document.getElementById('restartBtn').style.display = 'none';        document.getElementById('quizArea').style.display = 'block';        showSentence();    }
    function showSentence() {        document.getElementById('progressBar').style.width = `${(currentIndex / quizData.length) * 100}%`;        document.getElementById('progressText').textContent = `Sentence ${currentIndex + 1} of ${quizData.length}`;        document.getElementById('sentenceDisplay').textContent = `Fix: "${quizData[currentIndex].text}"`;        document.getElementById('userInput').value = '';        document.getElementById('feedback').textContent = '';        document.getElementById('checkBtn').style.display = 'inline-block';        document.getElementById('nextBtn').style.display = 'none';    }
    function checkAnswer() {        const input = document.getElementById('userInput').value.trim();        const correct = quizData[currentIndex].correct.trim();        const feedback = document.getElementById('feedback');                if (input === correct) {            feedback.textContent = "✅ Correct!";            feedback.style.color = "var(--hero-cyan)";            score++;        } else {            feedback.textContent = `❌ Correct is: "${correct}"`;            feedback.style.color = "var(--hero-red)";        }        document.getElementById('checkBtn').style.display = 'none';        document.getElementById('nextBtn').style.display = 'inline-block';    }
    function nextQuestion() {        currentIndex++;        if (currentIndex < quizData.length) showSentence();        else {            document.getElementById('quizArea').style.display = 'none';            const final = document.getElementById('finalScore');            final.style.display = 'block';            final.textContent = `MISSION COMPLETE: ${score} / ${quizData.length}`;            document.getElementById('restartBtn').style.display = 'inline-block';            document.getElementById('progressBar').style.width = '100%';        }    }
    window.onload = startQuiz;
</script>
</body>
</html>
