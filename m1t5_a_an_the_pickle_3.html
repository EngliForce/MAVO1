    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Alchemy | EngliForce</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --alchemy-purple: #bc13fe; --alchemy-glow: #e0aaff;
            --toxic-green: #39ff14; --gold: #ffb703;
        }

        body {
            background: #050008; color: #fff; font-family: 'Lexend', sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a0533, #050008);
        }

        header {
            background: linear-gradient(135deg, #4a148c, #1a012a);
            padding: 0.8rem; text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            border-bottom: 3px solid var(--gold); flex-shrink: 0;
        }
        header h1 { font-family: 'Bangers'; font-size: 2rem; margin: 0; color: #fff; text-shadow: 0 0 10px var(--alchemy-purple); }
        header p { margin: 0; font-size: 0.8rem; letter-spacing: 1px; color: var(--gold); }

        #game-container {
            flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px 20px; width: 100%; box-sizing: border-box;
        }

        #alchemy-board {
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 30px;
            border: 1px solid rgba(188, 19, 254, 0.3); backdrop-filter: blur(10px);
            max-width: 600px; width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        .flask-wrapper { position: relative; margin-bottom: 15px; }
        .flask-container {
            width: 80px; height: 110px; position: relative;
            border: 4px solid #fff; border-radius: 15% 15% 45% 45%;
            overflow: hidden; background: rgba(255,255,255,0.03);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }
        #elixir-fill {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            background: linear-gradient(0deg, var(--alchemy-purple), var(--alchemy-glow));
            transition: height 0.6s ease;
        }

        #sentence-box {
            font-size: 1.2rem; font-weight: bold; min-height: 60px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; text-align: center; padding: 0 10px;
        }

        .cauldron-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .cauldron {
            background: radial-gradient(circle at 50% 30%, #34495e, #1a1a1a);
            border: 3px solid var(--alchemy-purple); border-radius: 40% 40% 25% 25%;
            padding: 20px 5px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .cauldron:hover { transform: scale(1.05); border-color: var(--gold); }
        .cauldron span { 
            font-family: 'Bangers'; font-size: 2.2rem; color: var(--gold); 
            line-height: 1; margin-top: 5px;
        }
        .cauldron small { font-size: 0.6rem; color: #fff; opacity: 0.7; letter-spacing: 1px; }

        .feedback { height: 25px; margin-top: 15px; font-weight: bold; font-size: 1rem; }

        footer {
            padding: 0.8rem; font-size: 0.75rem; text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
        }

        #win-screen h2 { font-family: 'Bangers'; font-size: 2rem; color: var(--gold); }
        #win-screen button {
            background: var(--alchemy-purple); border: none; color: white;
            padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

</header>

<div id="game-container">
    <div id="alchemy-board">

            <div class="flask-container"><div id="elixir-fill"></div></div>
        </div>

        <div id="sentence-box">Laden...</div>

        <div class="cauldron-grid">
            <div class="cauldron" onclick="mix('a')">
                <small>ESSENCE</small>
                <span>A</span>
            </div>
            <div class="cauldron" onclick="mix('an')">

            </div>
            <div class="cauldron" onclick="mix('the')">
                <small>ESSENCE</small>
                <span>THE</span>

        </div>

        <div class="feedback" id="feedback"></div>
    </div>

    <div id="win-screen" class="hidden">
        <h2>ELIXIR READY! 🏆</h2>
        <button onclick="location.reload()">BREW AGAIN</button>

</div>

    let activeQuestions = db.sort(() => 0.5 - Math.random()).slice(0, 10);

    function loadQ() {
        if (currentIdx >= activeQuestions.length) { showWin(); return; }
        document.getElementById('sentence-box').innerText = activeQuestions[currentIdx].q;
        document.getElementById('feedback').innerText = "";
        document.getElementById('elixir-fill').style.background = "linear-gradient(0deg, var(--alchemy-purple), var(--alchemy-glow))";
    }

    function mix(ans) {
        const correct = activeQuestions[currentIdx].c;
        const fb = document.getElementById('feedback');
        const fill = document.getElementById('elixir-fill');

        if (ans === correct) {
            fb.innerText = "SUCCESS! +10%"; fb.style.color = "var(--toxic-green)";

            fb.innerText = `IMPURE! It was ${correct.toUpperCase()}`;

    function showWin() {
        document.getElementById('alchemy-board').classList.add('hidden');
