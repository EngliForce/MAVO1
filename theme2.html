<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngliForce Academy: Theme 2 - Leisure</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Groene accenten voor Theme 2 */
            --hero-green-main: #43a047;
            --hero-green-dark: #388e3c;
            --hero-green-glow: rgba(67, 160, 71, 0.4);
            --hero-yellow: #ffb703;
            
            /* Donkere achtergrondkleuren uit Theme 4 */
            --dark-bg: #0b1a2a;
            --card-bg: #102a43;
            --card-border: #243b53;
            --card-bg-done: #05101a;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: radial-gradient(circle at center, #102a43 0%, #05101a 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        header {
            background: var(--hero-green-main);
            padding: 2.5rem 1rem;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            border-bottom: 5px solid var(--hero-yellow); /* Het gele accentje */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: white;
        }

        h1 { 
            font-family: 'Bangers', cursive; 
            font-size: 3.5rem; 
            letter-spacing: 3px; 
            margin: 0; 
            text-shadow: 4px 4px 0px var(--hero-green-dark); 
        }

        header p { 
            font-size: 1.2rem; 
            font-weight: bold; 
            margin-top: 5px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        main { max-width: 1000px; margin: 20px auto; padding: 20px; }        
        
        .learning-goals {
            background: var(--card-bg);
            border: 3px solid var(--hero-green-main);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px var(--hero-green-glow);
        }

        .learning-goals h2 { 
            font-family: 'Bangers', cursive; 
            font-size: 2.2rem; 
            color: var(--hero-green-main); 
            margin-top: 0; 
            letter-spacing: 1px; 
        }

        .learning-goals p {
            color: #e2e8f0;
            font-size: 1.1rem;
        }

        .divider {
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--hero-green-main), transparent);
            margin: 60px 0 20px 0;
            border-radius: 2px;
            box-shadow: 0 0 15px var(--hero-green-main);
        }

        .section-title { 
            font-family: 'Bangers', cursive; 
            font-size: 2.8rem; 
            color: var(--hero-green-main); 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-align: center;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 25px; margin-top: 30px; }

        .card {
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            position: relative;
            cursor: pointer;
        }

        .card:hover { 
            border-color: var(--hero-green-main); 
            transform: translateY(-8px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
        }

        .card-header { display: flex; justify-content: center; margin-bottom: 15px; }
        
        .power-icon { 
            font-size: 2.5rem; 
            background: rgba(255,255,255,0.05); 
            width: 65px; height: 65px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .name { font-weight: bold; font-size: 1.3rem; margin-bottom: 8px; color: #f8fafc; text-align: center; }        
        .desc { font-size: 0.9rem; color: #94a3b8; flex-grow: 1; text-align: center; margin-bottom: 15px; }

        .btn {
            background: var(--card-border);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            letter-spacing: 1px;
            transition: 0.3s;
            z-index: 5;
        }

        .card.done { 
            border-color: var(--hero-green-main); 
            background: var(--card-bg-done); 
            box-shadow: 0 0 20px var(--hero-green-glow); 
        }        
        .card.done .btn { 
            background: var(--hero-green-main); 
            color: white; 
        }

        .star { position: fixed; pointer-events: none; font-size: 3rem; z-index: 1000; animation: starFly 0.8s forwards; }        
        @keyframes starFly { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2) translateY(-150px); opacity: 0; } }    
    </style>
</head>
<body>

<header>    
    <h1>ENGLIFORCE ACADEMY</h1>    
    <p>THEME 2: LEISURE</p>
</header>

<main>    

    <h2 class="section-title">📡 VOCAB TRAINING</h2>    
    <div class="grid" id="vocab-grid"></div>

    <div class="divider"></div> 
    
    <h2 class="section-title">⚔️ GRAMMAR BRIEFING</h2>    
    <div class="grid" id="grammar-grid"></div>
</main>

<footer>    
    <p style="text-align: center; opacity: 0.5; padding: 60px 0;">
        &copy; 2026 EngliForce – Make English Your Superpower!
    </p>
</footer>

<script>    
    const vocabData = [        
        { id: 't2v1', name: 'Sport', desc: 'Talk about different sports.', icon: '⚽', url: 'm1t2_vocabulary_2_1.html' },        
        { id: 't2v2', name: 'Entertainment', desc: 'Movies, music & games.', icon: '🎬', url: 'm1t2_vocabulary_2_2.html' },        
        { id: 't2v3', name: 'Going Out', desc: 'Where do you go?', icon: '🎟️', url: 'm1t2_vocabulary_2_3.html' },        
        { id: 't2v4', name: 'Holidays', desc: 'Travel & vacation.', icon: '✈️', url: 'm1t2_vocabulary_2_4.html' }    
    ];

    const grammarData = [        
        { id: 't2g1', name: 'To Be', desc: 'Present Simple basics.', icon: '✨', url: 'm1t2_to_be_present_simple.html' },        
        { id: 't2g2', name: 'Have / Has got', desc: 'Present Simple ownership.', icon: '🤲', url: 'm1t2_have_got.html' },        
        { id: 't2g3', name: 'Ordinals', desc: 'Rangtelwoorden (1st, 2nd...).', icon: '🥇', url: 'm1t2_ordinals.html' },        
        { id: 't2g4', name: 'Plurals', desc: 'Meervoud rules.', icon: '👯', url: 'm1t2_plurals_basics.html' },        
        { id: 't2g5', name: 'Countable Nouns', desc: 'Countable & Uncountable.', icon: '🧮', url: 'm1t2_countable_uncountable_nouns.html' },        
        { id: 't2g6', name: 'Present Simple', desc: 'Vragen & Ontkennen.', icon: '❓', url: 'm1t2_present_simple_vragen_en_ontkennen.html' },        
        { id: 't2g7', name: 'Question Words 2', desc: 'More WH-questions.', icon: '🕵️', url: 'm1t2_wh_questions_2.html' },        
        { id: 't2g8', name: 'Possessives', desc: 'Possessive Adjectives.', icon: '🔑', url: 'm1t2_possessive_adjectives.html' }
    ];

    function createCard(item, gridId) {        
        const grid = document.getElementById(gridId);                
        const card = document.createElement('a');        
        card.className = 'card';        
        card.id = item.id;        
        card.href = item.url;                
        
        card.innerHTML = `            
            <div class="card-header"><div class="power-icon">${item.icon}</div></div>            
            <div class="name">${item.name}</div>            
            <div class="desc">${item.desc}</div>            
            <button class="btn" onclick="completeTask(event, '${item.id}')">MISSION COMPLETED</button>        
        `;        
        grid.appendChild(card);    
    }

    vocabData.forEach(i => createCard(i, 'vocab-grid'));    
    grammarData.forEach(i => createCard(i, 'grammar-grid'));

    function completeTask(event, id) {        
        event.preventDefault();         
        event.stopPropagation();                
        
        const card = document.getElementById(id);        
        const isDone = card.classList.toggle('done');        
        // Let op: t2 ipv t1
        const saved = JSON.parse(localStorage.getItem('hero_progress_t2') || '{}');        
        saved[id] = isDone;        
        localStorage.setItem('hero_progress_t2', JSON.stringify(saved));                
        
        if(isDone) {            
            // Confetti met de Theme 2 kleuren
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#43a047', '#ffb703', '#ffffff'] });            
            const s = document.createElement('div'); s.className = 'star'; s.innerHTML = '⚡';            
            s.style.left = event.clientX + 'px'; s.style.top = event.clientY + 'px';            
            document.body.appendChild(s); setTimeout(() => s.remove(), 800);        
        }    
    }

    document.addEventListener('DOMContentLoaded', () => {        
        const saved = JSON.parse(localStorage.getItem('hero_progress_t2') || '{}');        
        Object.keys(saved).forEach(id => {             
            const el = document.getElementById(id);            
            if(el && saved[id]) el.classList.add('done');         
        });    
    });
</script>
</body>
</html>
