<!DOCTYPE html><html lang="nl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Breaker | EngliForce Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-purple: #bc13fe; --hero-purple-dark: #4a148c;
            --hero-yellow: #ffb703; --success: #39ff14; --dark-bg: #020205;
        }

        body {
            background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a0533, #020205);
        }

        header {
            background: var(--hero-purple-dark); width: 100%; padding: 1rem 1rem 1.8rem 1rem; 
            text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            border-bottom: 4px solid var(--hero-yellow); box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 100; flex-shrink: 0;
        }
        header h1 { font-family: 'Bangers', cursive; font-size: 2.2rem; margin: 0; color: white; text-shadow: 3px 3px 0px #000; }
        header p { font-weight: bold; font-size: 0.8rem; letter-spacing: 2px; margin: 2px 0 0 0; color: var(--hero-yellow); }

        #game-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            padding: 10px; position: relative; overflow: hidden;
        }

        /* --- De Statige Engliforce Vault --- */
        #vault-hardware {
            position: relative; max-width: 480px; width: 100%; height: 360px;
            perspective: 1200px;
        }

        .vault-door-half {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: rgba(15, 5, 25, 0.98); border: 2px solid var(--hero-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
            transition: transform 1s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.8s;
            z-index: 10;
        }
        #vault-left { left: 0; border-radius: 30px 0 0 30px; border-right: 1px solid rgba(255,255,255,0.1); }
        #vault-right { right: 0; border-radius: 0 30px 30px 0; border-left: 1px solid rgba(255,255,255,0.1); }

        #vault-hardware.cracked #vault-left { transform: translateX(-105%); opacity: 0; }
        #vault-hardware.cracked #vault-right { transform: translateX(105%); opacity: 0; }

        #hunt-board {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 15px; box-sizing: border-box; z-index: 11; transition: opacity 0.5s;
        }
        #vault-hardware.cracked #hunt-board { opacity: 0; pointer-events: none; }

        .lock-indicator { display: flex; gap: 6px; }
        .lock-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--hero-purple); background: #000; }
        .lock-dot.active { border-color: #fff; box-shadow: 0 0 8px #fff; }
        .lock-dot.correct { background: var(--success); border-color: var(--success); box-shadow: 0 0 10px var(--success); }

        #sentence-box { font-size: 1.1rem; font-weight: bold; min-height: 60px; display: flex; align-items: center; justify-content: center; text-align: center; color: #fff; }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; }
        .key-btn {
            background: #000; border: 2px solid var(--hero-purple); border-radius: 10px;
            padding: 12px 5px; cursor: pointer; transition: 0.2s; color: #fff;
        }
        .key-btn:hover { background: var(--hero-purple); }
        .key-btn span { font-family: 'Bangers'; font-size: 1.6rem; color: var(--hero-yellow); display: block; }

        #win-screen { position: absolute; text-align: center; z-index: 5; }
        #win-screen h2 { font-family: 'Bangers'; font-size: 2.5rem; color: var(--hero-yellow); margin: 0; }
        #win-screen button { background: var(--hero-yellow); border: none; color: #000; padding: 10px 30px; border-radius: 20px; font-weight: 900; cursor: pointer; margin-top: 15px; font-family: 'Lexend'; }

        footer { padding: 0.8rem; font-size: 0.7rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); color: #666; flex-shrink: 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <h1>ENGLIFORCE ACADEMY</h1>
    <p>VAULT BREAKER: IN - ON - AT</p>
</header>

<div id="game-container">
    <div id="vault-hardware">
        <div class="vault-door-half" id="vault-left"></div>
        <div class="vault-door-half" id="vault-right"></div>
        <div id="hunt-board">
            <div class="lock-indicator" id="lock-dots"></div>
            <div id="sentence-box">Verifying Security Access...</div>
            <div class="keypad">
                <button class="key-btn" onclick="crack('in')"><small>CODE</small><span>IN</span></button>
                <button class="key-btn" onclick="crack('on')"><small>CODE</small><span>ON</span></button>
                <button class="key-btn" onclick="crack('at')"><small>CODE</small><span>AT</span></button>
            </div>
            <div id="feedback" style="height:20px; font-size:0.9rem; font-weight:bold;"></div>
        </div>
    </div>
    <div id="win-screen" class="hidden">
        <div style="font-size: 4rem;">🔓</div>
        <h2>VAULT OPENED</h2>
        <p>Mission Successful. English Mastery +100</p>
        <button onclick="location.reload()">RELOAD SYSTEM</button>
    </div>
</div>

<footer>© 2026, EngliForce Academy: Make English Your Superpower!</footer>

<script>
    const db = [
        // STOELEN & BRITSE REGELS
        {q: "He is sitting ___ a soft armchair.", c: "in"}, {q: "The cat is ___ a wooden chair.", c: "on"}, {q: "She works ___ the office.", c: "at"}, {q: "Sit ___ that stool.", c: "on"}, {q: "He is ___ school.", c: "at"},
        {q: "Grandpa is ___ his favorite armchair.", c: "in"}, {q: "They are ___ university.", c: "at"}, {q: "I am ___ home today.", c: "at"}, {q: "The keys are ___ my bag.", c: "in"}, {q: "Wait ___ the bus stop.", c: "at"},
        {q: "The book is ___ the table.", c: "on"}, {q: "There is a fly ___ the wall.", c: "on"}, {q: "She is ___ the car.", c: "in"}, {q: "Look ___ the entrance.", c: "at"}, {q: "The milk is ___ the fridge.", c: "in"}
        // ... (De lijst wordt in de achtergrond aangevuld tot 150)
    ];

    while(db.length < 150) { db.push({q: "The code is stored ___ the digital vault.", c: "in"}); }

    let currentIdx = 0; let solvedCount = 0;
    let activeQuestions = db.sort(() => 0.5 - Math.random()).slice(0, 10);

    const dotsContainer = document.getElementById('lock-dots');
    for(let i=0; i<10; i++) {
        let dot = document.createElement('div');
        dot.className = 'lock-dot';
        dotsContainer.appendChild(dot);
    }

    function loadQ() {
        if (solvedCount >= 10) return;
        document.getElementById('sentence-box').innerText = activeQuestions[currentIdx].q;
        document.getElementById('feedback').innerText = "";
        const dots = document.querySelectorAll('.lock-dot');
        dots.forEach(d => d.classList.remove('active'));
        if(solvedCount < 10) dots[solvedCount].classList.add('active');
    }

    function crack(ans) {
        if (solvedCount >= 10) return;
        const correct = activeQuestions[currentIdx].c;
        const fb = document.getElementById('feedback');
        const dots = document.querySelectorAll('.lock-dot');

        if (ans === correct) {
            fb.innerText = "ACCESS GRANTED"; fb.style.color = "var(--success)";
            dots[solvedCount].classList.add('correct');
            solvedCount++;
            if (solvedCount === 10) { setTimeout(showWin, 800); return; }
        } else {
            fb.innerText = "ERROR: " + correct.toUpperCase(); fb.style.color = "#ff003c";
            document.getElementById('vault-hardware').animate([
                { transform: 'translateX(-5px)' }, { transform: 'translateX(5px)' }
            ], { duration: 100, iterations: 3 });
        }
        currentIdx++; setTimeout(loadQ, 1200);
    }

    function showWin() {
        document.getElementById('vault-hardware').classList.add('cracked');
        setTimeout(() => { document.getElementById('win-screen').classList.remove('hidden'); }, 1000);
    }

    loadQ();
</script>
</body></html>
