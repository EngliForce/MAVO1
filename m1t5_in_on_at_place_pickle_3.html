<!DOCTYPE html><html lang="nl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Breaker | EngliForce</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vault-purple: #bc13fe; --vault-glow: #e0aaff;
            --gold: #ffb703; --dark-bg: #050008; --success: #39ff14;
        }

        body {
            background: var(--dark-bg); color: #fff; font-family: 'Lexend', sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a0533, #050008);
        }

        header {
            background: linear-gradient(135deg, #4a148c, #1a012a);
            padding: 0.8rem; text-align: center; border-bottom: 3px solid var(--gold); flex-shrink: 0;
        }
        header h1 { font-family: 'Bangers'; font-size: 1.8rem; margin: 0; color: #fff; text-shadow: 0 0 10px var(--vault-purple); }
        header p { margin: 0; font-size: 0.8rem; letter-spacing: 1px; color: var(--gold); }

        #game-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            padding: 10px 20px; position: relative; overflow: hidden;
        }

        #vault-hardware {
            position: relative; max-width: 500px; width: 100%; height: 380px;
            perspective: 1000px;
        }

        .vault-door-half {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: rgba(20, 5, 35, 0.95);
            border: 3px solid var(--vault-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
            transition: transform 1s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.8s;
            z-index: 10;
        }

        #vault-left { left: 0; border-radius: 40px 0 0 40px; border-right: none; }
        #vault-right { right: 0; border-radius: 0 40px 40px 0; border-left: 1px solid rgba(255,255,255,0.1); }

        #vault-hardware.cracked #vault-left { transform: translateX(-100%); opacity: 0; }
        #vault-hardware.cracked #vault-right { transform: translateX(100%); opacity: 0; }

        #hunt-board {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 20px; box-sizing: border-box; z-index: 11;
            transition: opacity 0.5s;
        }
        #vault-hardware.cracked #hunt-board { opacity: 0; pointer-events: none; }

        .lock-indicator { display: flex; justify-content: center; gap: 6px; margin-top: -5px; }
        .lock-dot {
            width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--vault-purple);
            background: #111; transition: 0.3s;
        }
        .lock-dot.active { border-color: #fff; box-shadow: 0 0 8px #fff; }
        .lock-dot.correct { background: var(--success); border-color: var(--success); box-shadow: 0 0 12px var(--success); }

        #sentence-box { font-size: 1.1rem; font-weight: bold; min-height: 70px; display: flex; align-items: center; justify-content: center; color: var(--vault-glow); text-align: center; }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .key-btn {
            background: #111; border: 2px solid var(--vault-purple); border-radius: 10px;
            padding: 12px 5px; cursor: pointer; transition: 0.2s; color: #fff;
        }
        .key-btn:hover { background: var(--vault-purple); }
        .key-btn span { font-family: 'Bangers'; font-size: 1.6rem; color: var(--gold); display: block; }
        .key-btn small { font-size: 0.6rem; letter-spacing: 1px; color: #fff; opacity: 0.7; }

        .feedback { height: 20px; font-weight: bold; font-size: 0.9rem; }

        #win-screen { position: absolute; text-align: center; z-index: 5; transition: opacity 1s; padding: 20px; box-sizing: border-box;}
        #win-screen h2 { font-family: 'Bangers'; font-size: 2.5rem; color: var(--gold); text-shadow: 0 0 20px var(--gold); margin: 0; }
        #win-screen button {
            background: var(--gold); border: none; color: #000; padding: 10px 30px;
            border-radius: 20px; font-weight: 900; cursor: pointer; margin-top: 15px; font-family: 'Lexend';
        }

        .hidden { display: none !important; }

        footer { padding: 0.8rem; font-size: 0.75rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); color: #aaa; flex-shrink: 0; }
    </style>
</head>
<body>

<header>

<div id="game-container">

        <div id="hunt-board">
            <div class="lock-indicator" id="lock-dots"></div>
            <div id="sentence-box">Initializing Decryption...</div>
            <div class="keypad">
                <button class="key-btn" onclick="crack('in')"><small>CODE</small><span>IN</span></button>
                <button class="key-btn" onclick="crack('on')"><small>CODE</small><span>ON</span></button>
                <button class="key-btn" onclick="crack('at')"><small>CODE</small><span>AT</span></button>
            </div>
            <div class="feedback" id="feedback"></div>
        </div>
    </div>

    <div id="win-screen" class="hidden">
        <div style="font-size: 5rem; margin-bottom: 10px;">🔓</div>
        <h2>VAULT OPENED!</h2>
        <p>Security cleared. Access granted.</p>
        <button onclick="location.reload()">REBOOT SYSTEM</button>

</div>

        {q: "Grandpa is sitting ___ a soft armchair.", c: "in"}, {q: "The keys are ___ my bag.", c: "in"}, {q: "He lives ___ London.", c: "in"}, {q: "The milk is ___ the fridge.", c: "in"}, {q: "She is ___ the car.", c: "in"},

    let currentIdx = 0;
    let solvedCount = 0;
    let activeQuestions = db.sort(() => 0.5 - Math.random()).slice(0, 10);

    const dotsContainer = document.getElementById('lock-dots');
    for(let i=0; i<10; i++) {
        let dot = document.createElement('div');
        dot.className = 'lock-dot';
        dotsContainer.appendChild(dot);
    }

    function loadQ() {
        if (solvedCount >= 10) return;
        document.getElementById('sentence-box').innerText = activeQuestions[currentIdx].q;
        document.getElementById('feedback').innerText = "";
        
        const dots = document.querySelectorAll('.lock-dot');
        dots.forEach(d => d.classList.remove('active'));
        if(solvedCount < 10) dots[solvedCount].classList.add('active');
    }

    function crack(ans) {
        if (solvedCount >= 10) return;
        const correct = activeQuestions[currentIdx].c;
        const fb = document.getElementById('feedback');
        const dots = document.querySelectorAll('.lock-dot');

        if (ans === correct) {
            fb.innerText = "ACCESS GRANTED!"; fb.style.color = "var(--success)";
            dots[solvedCount].classList.add('correct');
            solvedCount++;
            if (solvedCount === 10) { setTimeout(showWin, 800); return; }
        } else {
            fb.innerText = "ALARM! CORRECT WAS: " + correct.toUpperCase();
            fb.style.color = "#ff003c";
            document.getElementById('vault-hardware').animate([
                { transform: 'translateX(-5px)' }, { transform: 'translateX(5px)' }
            ], { duration: 100, iterations: 3 });
        }
        currentIdx++;
        setTimeout(loadQ, 1200);
    }

    function showWin() {
        document.getElementById('vault-hardware').classList.add('cracked');
        setTimeout(() => { document.getElementById('win-screen').classList.remove('hidden'); }, 1000);
    }

    loadQ();
</script>
</body></html>
