        .toggle-wrapper { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; padding: 10px 0; border-bottom: 1px solid #334155; }
        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #38bdf8; }
        input:checked + .slider:before { transform: translateX(24px); }
        .sentence { font-size: 20px; margin: 30px 0; color: #e2e8f0; font-weight: 600; min-height: 50px; }
        input[type="text"] { padding: 15px; font-size: 18px; border-radius: 15px; border: 2px solid #334155; width: 80%; background: #0f172a; color: white; text-align: center; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px 40px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #7dd3fc; }
        .hidden { display: none; }
        #badge { font-size: 80px; display: none; animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>

        <h1>Past Simple Hero</h1>
<h2>What do you want to practise?</h2>
        <div class="toggle-wrapper"><span>Bevestigen</span> <label class="switch"><input type="checkbox" class="cat" value="pos" checked><span class="slider"></span></label></div>
        <div class="toggle-wrapper"><span>Ontkennen</span> <label class="switch"><input type="checkbox" class="cat" value="neg"><span class="slider"></span></label></div>
        <div class="toggle-wrapper"><span>Vragen</span> <label class="switch"><input type="checkbox" class="cat" value="que"><span class="slider"></span></label></div>
        <button class="btn" onclick="start()">START QUEST</button>
    </div>

    <div id="quiz" class="hidden">
        <div id="status">Vraag 1/10</div>
        <div class="sentence" id="sentence">---</div>
        <input type="text" id="answer" placeholder="Typ je antwoord...">
        <br><button class="btn" onclick="check()">CHECK</button>
    </div>

    <div id="end" class="hidden">
        <div id="badge">⏳</div>
        <h2 id="msg"></h2>
        <button class="btn" onclick="location.reload()">OPNIEUW</button>
    </div>
</div>

let q = [], i = 0, score = 0;

function start() {
    let active = Array.from(document.querySelectorAll('.cat')).filter(c => c.checked).map(c => c.value);
    if(!active.length) return alert("Kies minimaal 1 categorie!");
    
    active.forEach(c => q.push(...db[c]));
    q = q.sort(() => 0.5 - Math.random()).slice(0, 10);
    
    document.getElementById('start').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    show();
}

function show() {
    document.getElementById('status').innerText = `Vraag ${i + 1}/10`;
    document.getElementById('sentence').innerText = q[i].s;
    document.getElementById('answer').value = "";
    document.getElementById('answer').focus();
}

function check() {
    let val = document.getElementById('answer').value.toLowerCase().trim();
    if (val === q[i].a) score++;
    if (++i < 10) show();
    else {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('end').classList.remove('hidden');
        if(score === 10) {
            document.getElementById('badge').style.display = 'block';
            document.getElementById('msg').innerHTML = "LEGENDARY! <br>Time Traveler Badge behaald!";
        } else {
            document.getElementById('msg').innerText = `Score: ${score}/10. Haal 10/10 voor de badge!`;
        }
    }
}
