<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngliForce Academy: The Date Spinner</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-blue-main: #0288d1;
            --hero-blue-dark: #01579b;
            --hero-yellow: #ffb703;
            --hero-cyan: #81d4fa;
            --dark-bg: #0b1a2a;
            --hero-orange: #ff5722;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: radial-gradient(circle at center, #102a43 0%, #05101a 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--hero-blue-main);
            padding: 2.5rem 1rem;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            border-bottom: 5px solid var(--hero-yellow);
        }

        h1 { font-family: 'Bangers', cursive; font-size: 3.5rem; letter-spacing: 3px; margin: 0; text-shadow: 4px 4px 0px var(--hero-blue-dark); }
        h2 { font-family: 'Bangers', cursive; color: var(--hero-yellow); font-size: 2.2rem; margin-top: 10px; margin-bottom: 20px; }
        h3 { color: var(--hero-cyan); font-family: 'Bangers'; font-size: 1.8rem; margin: 0;}

        main { max-width: 900px; margin: 20px auto; padding: 20px; flex-grow: 1; width: 100%; box-sizing: border-box; }

        .game-container {
            background: rgba(16, 42, 67, 0.9);
            border: 3px solid var(--hero-cyan);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .hud {
            display: flex; justify-content: space-between; font-family: 'Bangers'; font-size: 1.5rem;
            color: var(--hero-yellow); border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px;
        }

        .wheels-wrapper {
            display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap;
        }

        .wheel {
            background: var(--hero-blue-dark);
            border: 4px solid var(--hero-cyan);
            border-radius: 15px;
            width: 180px;
            height: 100px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
            text-transform: lowercase;
            position: relative;
            overflow: hidden;
        }

        .wheel.num-wheel { width: 100px; font-family: 'Bangers'; font-size: 3rem; color: var(--hero-yellow); }

        .spin-anim { animation: slotMachine 0.1s linear infinite; }
        @keyframes slotMachine { 0% { transform: translateY(-10px); opacity: 0.5; } 50% { transform: translateY(10px); opacity: 1; } 100% { transform: translateY(-10px); opacity: 0.5; } }

        .btn-action {
            background: var(--hero-orange); color: white; border: none;
            padding: 15px 40px; border-radius: 50px; font-family: 'Bangers', cursive;
            font-size: 1.8rem; cursor: pointer; transition: 0.2s;
            border-bottom: 6px solid #bf360c; margin-top: 10px;
        }
        .btn-action:hover { transform: translateY(-3px); background: #ff7043; border-bottom-color: #d84315; }
        .btn-action:disabled { background: #555; border-bottom-color: #333; cursor: not-allowed; transform: none; }

        .question-area { margin-top: 30px; display: none; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .prompt-text { font-size: 1.5rem; margin-bottom: 15px; }
        .prompt-choice { color: var(--hero-yellow); font-weight: bold; font-family: 'Bangers'; font-size: 2rem; letter-spacing: 2px;}

        input[type="text"] {
            width: 100%; max-width: 600px; padding: 15px; font-size: 1.2rem;
            border: 3px solid var(--hero-cyan); border-radius: 10px;
            background: #0b1a2a; color: white; font-family: 'Lexend', sans-serif;
            text-align: center; margin-bottom: 20px; outline: none;
        }
        input[type="text"]:focus { border-color: var(--hero-yellow); box-shadow: 0 0 15px rgba(255, 183, 3, 0.5); }

        .feedback-box {
            margin-top: 20px; padding: 20px; border-radius: 10px; font-size: 1.2rem; display: none; font-weight: bold;
        }
        .feedback-correct { background: rgba(76, 175, 80, 0.2); border: 2px solid #4CAF50; color: #81c784; }
        .feedback-wrong { background: rgba(244, 67, 54, 0.2); border: 2px solid #F44336; color: #e57373; }
        .feedback-rule { color: var(--hero-yellow); margin-top: 10px; display: block; font-size: 1.1rem; }

        .flash-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 1999; }
        .boom-text {
            position: fixed; pointer-events: none; font-family: 'Bangers', cursive;
            color: var(--hero-yellow); font-size: 5rem; z-index: 2001;
            text-shadow: 5px 5px 0px #000; animation: boomAnim 0.6s ease-out forwards;
        }
        @keyframes boomAnim { 0% { transform: scale(0) rotate(-20deg); opacity: 1; } 100% { transform: scale(2) rotate(10deg); opacity: 0; } }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }

        .end-screen { display: none; text-align: center; animation: fadeIn 0.5s; }
        .final-score { font-family: 'Bangers'; font-size: 4rem; color: var(--hero-yellow); margin: 20px 0; }
    </style>
</head>
<body>

<div class="flash-effect" id="flash"></div>

<header>
    <h1>ENGLIFORCE ACADEMY</h1>
    <p>PICKLE MISSION: THE DATE SLOTMACHINE</p>
</header>

<main>
    <div class="game-container" id="game-panel">
        <div class="hud">
            <div>VRAAG: <span id="q-counter">1</span> / 10</div>
            <div>SCORE: <span id="score-counter">0</span></div>
        </div>

        <div class="wheels-wrapper">
            <div class="wheel" id="w-day">...</div>
            <div class="wheel num-wheel" id="w-num">?</div>
            <div class="wheel" id="w-month">...</div>
        </div>

        <button class="btn-action" id="btn-spin" onclick="startSpin(event)">SPIN THE WHEELS!</button>

        <div class="question-area" id="q-area">
            <div class="prompt-text">Schrijf deze datum voluit in het Engels:<br><span class="prompt-choice">🇬🇧 BRITS OF 🇺🇸 AMERIKAANS? KIES ZELF!</span></div>
            <input type="text" id="answer-input" placeholder="Typ hier de volledige Engelse zin..." autocomplete="off" onkeypress="handleEnter(event)">
            <br>
            <button class="btn-action" id="btn-check" style="background: var(--hero-blue-main); border-color: var(--hero-blue-dark);" onclick="checkAnswer(event)">CHECK MIJN ANTWOORD</button>
        </div>

        <div id="feedback" class="feedback-box"></div>
        <button class="btn-action" id="btn-next" style="display: none; margin-top: 20px;" onclick="nextQuestion()">VOLGENDE VRAAG ➔</button>
    </div>

    <div class="game-container end-screen" id="end-panel">
        <h2>MISSION ACCOMPLISHED!</h2>
        <p>Je hebt de Date Spinner overleefd. Hier is je score:</p>
        <div class="final-score" id="final-score-text">0 / 10</div>
        <button class="btn-action" onclick="location.reload()">PLAY AGAIN!</button>
        <button class="btn-action" style="background: var(--hero-blue-main); border-color: var(--hero-blue-dark); margin-left: 10px;" onclick="location.href='index.html'">TERUG NAAR DE BASIS</button>
    </div>
</main>

<script>
    // Data
    const nlDays = ['maandag', 'dinsdag', 'woensdag', 'donderdag', 'vrijdag', 'zaterdag', 'zondag'];
    const enDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    
    const nlMonths = ['januari', 'februari', 'maart', 'april', 'mei', 'juni', 'juli', 'augustus', 'september', 'oktober', 'november', 'december'];
    const enMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const maxDays = [31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]; // Max days per month
    
    const ordinals = ['', 'first', 'second', 'third', 'fourth', 'fifth', 'sixth', 'seventh', 'eighth', 'ninth', 'tenth', 'eleventh', 'twelfth', 'thirteenth', 'fourteenth', 'fifteenth', 'sixteenth', 'seventeenth', 'eighteenth', 'nineteenth', 'twentieth', 'twenty-first', 'twenty-second', 'twenty-third', 'twenty-fourth', 'twenty-fifth', 'twenty-sixth', 'twenty-seventh', 'twenty-eighth', 'twenty-ninth', 'thirtieth', 'thirty-first'];

    // State
    let currentQ = 1;
    let score = 0;
    let spinInterval;
    
    // Beide correcte opties
    let targetUK = "";
    let targetUS = "";

    // Elements
    const wDay = document.getElementById('w-day');
    const wNum = document.getElementById('w-num');
    const wMonth = document.getElementById('w-month');
    const btnSpin = document.getElementById('btn-spin');
    const qArea = document.getElementById('q-area');
    const inputAns = document.getElementById('answer-input');
    const feedback = document.getElementById('feedback');
    const btnCheck = document.getElementById('btn-check');
    const btnNext = document.getElementById('btn-next');

    function startSpin(e) {
        createExplosion(e, 'SPIN!');
        btnSpin.style.display = 'none';
        qArea.style.display = 'none';
        feedback.style.display = 'none';
        inputAns.value = "";
        inputAns.classList.remove('shake');
        
        wDay.classList.add('spin-anim');
        wNum.classList.add('spin-anim');
        wMonth.classList.add('spin-anim');

        // Fake slot machine effect
        spinInterval = setInterval(() => {
            wDay.innerText = nlDays[Math.floor(Math.random() * nlDays.length)];
            wNum.innerText = Math.floor(Math.random() * 31) + 1;
            wMonth.innerText = nlMonths[Math.floor(Math.random() * nlMonths.length)];
        }, 50);

        setTimeout(stopSpin, 1200);
    }

    function stopSpin() {
        clearInterval(spinInterval);
        wDay.classList.remove('spin-anim');
        wNum.classList.remove('spin-anim');
        wMonth.classList.remove('spin-anim');

        // Generate actual valid logic
        const dayIdx = Math.floor(Math.random() * nlDays.length);
        const monthIdx = Math.floor(Math.random() * nlMonths.length);
        const dayNum = Math.floor(Math.random() * maxDays[monthIdx]) + 1;

        // Set visual text (Dutch, lowercase)
        wDay.innerText = nlDays[dayIdx];
        wNum.innerText = dayNum;
        wMonth.innerText = nlMonths[monthIdx];

        // Construct both correct answers
        const enDayWord = enDays[dayIdx];
        const enMonthWord = enMonths[monthIdx];
        const ordWord = ordinals[dayNum];

        targetUK = `${enDayWord} the ${ordWord} of ${enMonthWord}`;
        targetUS = `${enDayWord}, ${enMonthWord} ${ordWord}`;

        qArea.style.display = 'block';
        btnCheck.style.display = 'inline-block';
        inputAns.focus();
    }

    function handleEnter(e) {
        if (e.key === 'Enter') {
            checkAnswer(e);
        }
    }

    function checkAnswer(e) {
        let userAns = inputAns.value.trim().replace(/\s+/g, ' '); // normalize spaces
        if(userAns === "") return;

        btnCheck.style.display = 'none';
        inputAns.disabled = true;

        // Controleer of het exact overeenkomt met een van beide opties
        let isCorrect = (userAns === targetUK || userAns === targetUS);
        let feedbackHTML = "";

        if (isCorrect) {
            score++;
            document.getElementById('score-counter').innerText = score;
            feedback.className = "feedback-box feedback-correct";
            feedbackHTML = "💥 BOOM! Helemaal perfect!";
            createExplosion(e, 'KABOOM!');
        } else {
            feedback.className = "feedback-box feedback-wrong";
            inputAns.classList.add('shake');
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 400);

            let lowerUser = userAns.toLowerCase();
            let lowerUK = targetUK.toLowerCase();
            let lowerUS = targetUS.toLowerCase();

            // Smart feedback op basis van wat ze waarschijnlijk probeerden
            if (lowerUser === lowerUK || lowerUser === lowerUS) {
                feedbackHTML = `Oeps! Je hebt de juiste woorden, maar let op je HOOFDLETTERS! <br><span class="feedback-rule">Gouden regel 1: Dagen en maanden krijgen altijd een hoofdletter.</span>`;
            } else if (lowerUser === lowerUS.replace(',', '')) {
                feedbackHTML = `Bijna perfect Amerikaans! Maar je bent één heel belangrijk ding vergeten... <br><span class="feedback-rule">Gouden regel 2: ALTIJD een komma na de dag in het Amerikaans!</span>`;
            } else if (lowerUser === lowerUK.replace('the ', '').replace(' of', '') || lowerUser === lowerUK.replace(' of', '')) {
                feedbackHTML = `Bijna perfect Brits! Maar je bent de kleine woordjes vergeten. <br><span class="feedback-rule">Vergeet "the" en "of" niet in de Britse uitspraak!</span>`;
            } else {
                feedbackHTML = `Helaas! Kijk goed naar de spelling van de rangtelwoorden en de maanden.`;
            }

            feedbackHTML += `<br><br>Je had twee juiste opties:<br>
            🇬🇧 Brits: <strong style="color:white; font-size:1.3rem;">${targetUK}</strong><br>
            🇺🇸 Amerikaans: <strong style="color:white; font-size:1.3rem;">${targetUS}</strong>`;
        }

        feedback.innerHTML = feedbackHTML;
        feedback.style.display = 'block';
        btnNext.style.display = 'inline-block';
    }

    function nextQuestion() {
        if (currentQ >= 10) {
            endGame();
            return;
        }

        currentQ++;
        document.getElementById('q-counter').innerText = currentQ;
        
        btnNext.style.display = 'none';
        feedback.style.display = 'none';
        inputAns.disabled = false;
        btnSpin.style.display = 'inline-block';
        qArea.style.display = 'none';
        
        wDay.innerText = "...";
        wNum.innerText = "?";
        wMonth.innerText = "...";
    }

    function endGame() {
        document.getElementById('game-panel').style.display = 'none';
        document.getElementById('end-panel').style.display = 'block';
        document.getElementById('final-score-text').innerText = `${score} / 10`;
    }

    function createExplosion(e, message) {
        if(!e) return;
        const x = e.clientX || window.innerWidth / 2; 
        const y = e.clientY || window.innerHeight / 2;
        
        const flash = document.getElementById('flash');
        flash.style.opacity = '0.3';
        setTimeout(() => { flash.style.opacity = '0'; }, 150);

        const txt = document.createElement('div');
        txt.className = 'boom-text';
        txt.innerText = message;
        txt.style.left = (x - 80) + 'px';
        txt.style.top = (y - 80) + 'px';
        document.body.appendChild(txt);
        setTimeout(() => txt.remove(), 800);
    }
</script>

</body>
</html>
