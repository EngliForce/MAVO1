<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeakUp! | English Practice</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --primary-accent: #00f2fe;
            --secondary-accent: #4facfe;
            --text-color: #ffffff;
            --question-yellow: #ffff00;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; color: var(--text-color);
            overflow-x: hidden;
        }

        .container {
            width: 95%; max-width: 600px;
            background: var(--glass-bg); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 2rem; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center; min-height: 550px;
            display: flex; flex-direction: column; justify-content: center;
            margin: 10px;
        }

        .screen { display: none; width: 100%; animation: fadeIn 0.5s ease; }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .mode-selector {
            display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2);
            padding: 6px; border-radius: 15px;
        }

        .mode-btn {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: transparent; color: white; cursor: pointer;
            font-weight: bold; transition: 0.3s ease; display: flex;
            align-items: center; justify-content: center; gap: 8px; font-size: 1rem;
        }

        .mode-btn.active { background: var(--primary-accent); color: #004e52; box-shadow: 0 4px 15px rgba(0,242,254,0.3); }

        .instruction-box {
            text-align: left; background: rgba(0, 0, 0, 0.2); padding: 1.2rem;
            border-radius: 15px; margin-bottom: 1.5rem; font-size: 0.95rem; line-height: 1.4;
        }
        .example-good { color: #99ff99; font-weight: bold; }
        .rule-item { margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; }

        .player-setup {
            background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left;
            border: 1px solid var(--glass-border);
        }
        input, select {
            width: 100%; padding: 12px; border-radius: 8px; border: none; margin: 8px 0;
            background: white; font-size: 1rem; color: #333;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border);
            padding: 14px; border-radius: 12px; color: white; cursor: pointer;
            transition: 0.3s; font-size: 1.1rem; width: 100%; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .option-btn:hover { background: rgba(255, 255, 255, 0.25); }

        .action-btn {
            padding: 16px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: bold; font-size: 1.1rem; transition: 0.2s; width: 100%;
        }
        .start-btn { background: var(--primary-accent); color: #004e52; margin-top: 10px; }
        .next-btn { background: #4facfe; color: white; }
        .back-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid white; margin-top: 10px;}

        .turn-indicator { display: flex; justify-content: space-around; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .player-tag { padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; opacity: 0.5; background: rgba(0,0,0,0.3); }
        .player-tag.active { opacity: 1; background: var(--primary-accent); color: #004e52; font-weight: bold; transform: scale(1.05); }

        .question-card {
            background: rgba(0, 0, 0, 0.25); padding: 2rem; border-radius: 20px;
            margin: 15px 0; min-height: 180px; display: flex; flex-direction: column;
            justify-content: center; border: 1px solid rgba(255,255,255,0.1);
        }
        
        #questionDisplay {
            color: var(--question-yellow);
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.3;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .role-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; opacity: 0.9; color: white; }

        @media (max-width: 768px) {
            .container { padding: 1.5rem; min-height: auto; }
            #questionDisplay { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setupScreen" class="screen active">
        <h1>SpeakUp! 🗣️</h1>
        
        <div class="mode-selector">
            <button id="btnSolo" class="mode-btn" onclick="setMode('solo')">
                <i class="fas fa-user"></i> Solo / Parent
            </button>
            <button id="btnTogether" class="mode-btn active" onclick="setMode('together')">
                <i class="fas fa-user-friends"></i> Together
            </button>
        </div>

        <div class="instruction-box">
            <div class="rule-item">
                <i class="fas fa-comment-dots" style="color: var(--primary-accent)"></i>
                <span><b>Avoid "Yes" or "No"!</b> Use full sentences and add details (Who, What, Where, When, Why). Be as detailed as possible.</span>
            </div>
            <p><i>Ex: "Do you like pizza?"</i><br><span class="example-good">"Yes, I love pizza. Especially pepperoni pizza. It is my favourite food!"</span></p>
        </div>

        <div id="p1Area" class="player-setup">
            <label id="p1Label"><b>Speaker 1</b></label>
            <input type="text" id="p1Name" placeholder="Name">
            <select id="p1Level">
                <option value="preA1">Pre-A1 ⭐</option>
                <option value="A1">A1 ⭐⭐</option>
                <option value="A2">A2 ⭐⭐⭐</option>
                <option value="B1">B1 ⭐⭐⭐⭐</option>
            </select>
        </div>

        <div id="p2Area" class="player-setup">
            <label><b>Speaker 2</b></label>
            <input type="text" id="p2Name" placeholder="Name">
            <select id="p2Level">
                <option value="preA1">Pre-A1 ⭐</option>
                <option value="A1">A1 ⭐⭐</option>
                <option value="A2">A2 ⭐⭐⭐</option>
                <option value="B1">B1 ⭐⭐⭐⭐</option>
            </select>
        </div>

        <button class="action-btn start-btn" onclick="startApp()">Start Practice!</button>
    </div>

    <div id="topicScreen" class="screen">
        <h2 id="topicTitle">Choose a Topic</h2>
        <div id="topicList"></div>
        <button class="action-btn back-btn" onclick="showScreen('setupScreen')">Back</button>
    </div>

    <div id="questionScreen" class="screen">
        <div class="turn-indicator" id="turnIndicator">
            <div id="tag1" class="player-tag">Player 1</div>
            <div id="tag2" class="player-tag">Player 2</div>
        </div>
        
        <div class="question-card">
            <div class="role-label" id="roleLabel">Asking...</div>
            <div id="questionDisplay">Question?</div>
        </div>

        <button class="action-btn next-btn" onclick="generateQuestion()">Next Question</button>
        <button class="action-btn back-btn" onclick="showScreen('topicScreen')">Change Topic</button>
    </div>
</div>

            "Food & Eating Habits": ["What is your favourite meal that someone cooks for you?", "Can you cook any dishes by yourself?", "What is a traditional meal from your country?", "Do you prefer eating at home or going to a restaurant?", "What kind of snacks do you like to eat while watching a movie?", "How often does your family sit down to eat together?"],

            "Technology & Internet": ["How many hours a day do you spend online?", "What is your favourite website or social media app?", "Do you think the internet makes schoolwork easier?", "What do you use your smartphone for the most?", "How has technology changed the way you talk to your friends?", "Could you live for a week without any technology?"],

        B1: {

    let p1 = { name: '', level: '' };
    let p2 = { name: '', level: '' };
    let currentTopic = '';
    let currentMode = 'together';
    let asker = 1;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btnSolo').classList.toggle('active', mode === 'solo');
        document.getElementById('btnTogether').classList.toggle('active', mode === 'together');
        document.getElementById('p2Area').style.display = (mode === 'solo') ? 'none' : 'block';
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startApp() {
        p1.name = document.getElementById('p1Name').value || 'Speaker 1';
        p1.level = document.getElementById('p1Level').value;
        
        if (currentMode === 'together') {
            p2.name = document.getElementById('p2Name').value || 'Speaker 2';
            p2.level = document.getElementById('p2Level').value;
            document.getElementById('turnIndicator').style.display = 'flex';
        } else {
            p2.name = 'Partner/Parent';
            p2.level = p1.level;
            document.getElementById('turnIndicator').style.display = 'none';
        }

        const topicList = document.getElementById('topicList');
        topicList.innerHTML = '';
        Object.keys(data[p1.level]).forEach(topic => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `${topic} <i class="fas fa-chevron-right"></i>`;
            btn.onclick = () => selectTopic(topic);
            topicList.appendChild(btn);
        });

        document.getElementById('tag1').innerText = p1.name;
        document.getElementById('tag2').innerText = p2.name;
        showScreen('topicScreen');
    }

    function selectTopic(topic) {
        currentTopic = topic;
        asker = 1; 
        generateQuestion();
        showScreen('questionScreen');
    }

    function generateQuestion() {
        let answererName, askerName, levelToUse;

        if (currentMode === 'together') {
            asker = (asker === 1) ? 2 : 1;
            askerName = (asker === 1) ? p1.name : p2.name;
            answererName = (asker === 1) ? p2.name : p1.name;
            levelToUse = (asker === 1) ? p2.level : p1.level;

            document.getElementById('tag1').classList.toggle('active', asker === 1);
            document.getElementById('tag2').classList.toggle('active', asker === 2);
            document.getElementById('roleLabel').innerText = `${askerName} asks ${answererName}:`;
        } else {
            askerName = "Parent / Partner";
            answererName = p1.name;
            levelToUse = p1.level;
            document.getElementById('roleLabel').innerText = `${askerName} asks ${answererName}:`;
        }

        const questions = data[levelToUse][currentTopic] || data[levelToUse]["Personal Information"];
        const randomQ = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('questionDisplay').innerText = randomQ;
    }
</script>
