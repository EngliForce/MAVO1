    let currentQuestions = []; // Hier komen de 10 geselecteerde vragen in
    let currentQuestionIndex = 0;
    let score = 0;

    const questionNumberEl = document.getElementById("question-number");
    const scoreDisplayEl = document.getElementById("score-display");
    const questionTextEl = document.getElementById("question-text");
    const userInputEl = document.getElementById("user-answer");
    const feedbackBoxEl = document.getElementById("feedback-box");
    const feedbackTitleEl = document.getElementById("feedback-title");
    const feedbackTextEl = document.getElementById("feedback-text");
    const checkBtnEl = document.getElementById("check-btn");
    const nextBtnEl = document.getElementById("next-btn");
    
    const quizScreenEl = document.getElementById("quiz-screen");
    const resultScreenEl = document.getElementById("result-screen");
    const finalScoreEl = document.getElementById("final-score");
    const resultTitleEl = document.getElementById("result-title");
    const resultCommentEl = document.getElementById("result-comment");

    userInputEl.addEventListener("keyup", function(event) {
        if (event.key === "Enter" && checkBtnEl.style.display !== "none") {
            checkTypedAnswer();
        }
    });

    function normalizeApostrophe(text) {
        return text.replace(/[‘’'’`´‘]/g, "'");
    }

    // SLIMME FUNCTIE OM DE DATABASE TE SCHUDDEN EN ER 10 TE PAKKEN
    function setupQuizQuestions() {
        // Schud de hele database (Fisher-Yates Shuffle)
        let shuffled = [...masterQuestionDatabase];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        // Pak de eerste 10 zinnen uit de geschudde lijst
        currentQuestions = shuffled.slice(0, 10);
    }

    function loadQuestion() {
        feedbackBoxEl.style.display = "none";
        feedbackBoxEl.className = "feedback-box";
        nextBtnEl.style.display = "none";
        checkBtnEl.style.display = "block";
        
        userInputEl.disabled = false;
        userInputEl.value = "";
        
        const currentQuestion = currentQuestions[currentQuestionIndex];
        questionNumberEl.innerText = `Missie: ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
        questionTextEl.innerHTML = currentQuestion.sentence;
        
        setTimeout(() => userInputEl.focus(), 100);
    }

    function checkTypedAnswer() {
        const currentQuestion = currentQuestions[currentQuestionIndex];
        
        let studentAnswer = userInputEl.value.trim().toLowerCase().replace(/\s+/g, ' ');
        studentAnswer = normalizeApostrophe(studentAnswer);
        
        if (studentAnswer === "") {
            alert("Typ eerst een antwoord in de tijdmachine!");
            return;
        }

        userInputEl.disabled = true;
        checkBtnEl.style.display = "none";

        const targetCorrect = normalizeApostrophe(currentQuestion.correctAnswer);
        let isCorrect = (studentAnswer === targetCorrect);
        
        if (!isCorrect && currentQuestion.alternativeAnswers) {
            isCorrect = currentQuestion.alternativeAnswers.some(alt => {
                return studentAnswer === normalizeApostrophe(alt);
            });
        }

        if (isCorrect) {
            score++;
            scoreDisplayEl.innerText = `⚡ Score: ${score}`;
            feedbackTitleEl.innerText = "💥 ZAP! HELEMAAL GOED!";
            feedbackBoxEl.classList.add("correct-style");
        } else {
            feedbackTitleEl.innerText = "🚨 SPELLING ALERT!";
            feedbackBoxEl.classList.add("wrong-style");
        }

        let correctDisplay = currentQuestion.correctAnswer;
        if(currentQuestion.alternativeAnswers) {
            currentQuestion.alternativeAnswers.forEach(alt => {
                correctDisplay += ` óf ${alt}`;
            });
        }

        feedbackTextEl.innerHTML = `Jouw antwoord: <b>${userInputEl.value}</b><br>Geaccepteerd: <b style="color: var(--hero-yellow); font-size: 1.1rem;">${correctDisplay}</b><br><br>${currentQuestion.rationale}`;
        
        feedbackBoxEl.style.display = "block";
        nextBtnEl.style.display = "block";
        nextBtnEl.focus();
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizScreenEl.style.display = "none";
        resultScreenEl.style.display = "block";
        finalScoreEl.innerText = `Jouw score: ${score} / ${currentQuestions.length}`;
        
        if (score === 10) {
            resultTitleEl.innerText = "👑 TIME LORD ALERT!";
            resultCommentEl.innerText = "Perfect! Jij kunt vlekkeloos Engelse vragen en ontkenningen typen in het verleden!";
        } else if (score >= 7) {
            resultTitleEl.innerText = "⚡ SUPERHELD IN OPLEIDING!";
            resultCommentEl.innerText = "Heel goed gedaan! De type-kracht is sterk in jou.";
        } else {
            resultTitleEl.innerText = "⏳ TIJDLUS-GEVAAR...";
            resultCommentEl.innerText = "Let goed op dat het hoofdwerkwoord na 'did' of 'didn't' GEEN -ed krijgt. Probeer een nieuwe ronde!";
        }
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        scoreDisplayEl.innerText = `⚡ Score: ${score}`;
        quizScreenEl.style.display = "block";
        resultScreenEl.style.display = "none";
        setupQuizQuestions(); // Genereer direct 10 splinternieuwe vragen!
        loadQuestion();
    }

    // Eerste start
    setupQuizQuestions();
    loadQuestion();
</script>
