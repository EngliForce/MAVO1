<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Mastery Check - Ultimate Edition ⚡</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff007f;
            --neon-purple: #9d00ff;
            --neon-green: #39ff14;
            --bg-dark: #0a0612;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1e0b36, var(--bg-dark));
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
        }
        .glow-1 { top: 10%; left: 10%; background: var(--neon-cyan); }
        .glow-2 { bottom: 10%; right: 10%; background: var(--neon-pink); }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-purple);
        }

        p.subtitle {
            text-align: center;
            color: #b3b3b3;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .instruction-text {
            text-align: center;
            font-weight: bold;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
            font-size: 1.1rem;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-pink));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.8), 0 0 10px var(--neon-cyan);
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .progress-container {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.3s ease;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .category-tag {
            color: var(--neon-cyan);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        .question-box {
            font-size: 1.4rem;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 12px;
            color: #fff;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            transform: scale(1.01);
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .result-card:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.15);
        }

        .result-card h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-card h3::after {
            content: '▼';
            font-size: 0.8rem;
            color: var(--neon-cyan);
            transition: transform 0.2s;
        }

        .result-card.expanded h3::after {
            transform: rotate(180deg);
        }

        .result-score-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .result-score-fill {
            height: 100%;
            border-radius: 4px;
        }

        .score-good { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
        .score-medium { background: orange; box-shadow: 0 0 8px orange; }
        .score-bad { background: var(--neon-pink); box-shadow: 0 0 8px var(--neon-pink); }

        .status-text {
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: bold;
        }

        .review-details {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--glass-border);
        }

        .result-card.expanded .review-details {
            display: block;
        }

        .review-item {
            margin-bottom: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .review-item:last-child {
            margin-bottom: 0;
        }

        .review-q {
            font-weight: 500;
            color: #e0e0e0;
            margin-bottom: 4px;
        }

        .review-a {
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .text-wrong { color: var(--neon-pink); text-shadow: 0 0 4px rgba(255, 0, 127, 0.2); }
        .text-correct { color: var(--neon-green); text-shadow: 0 0 4px rgba(57, 255, 20, 0.2); }

        .total-score-box {
            text-align: center;
            margin-bottom: 35px;
            padding: 20px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            border-radius: 16px;
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.1);
        }

        .total-score-box h2 {
            font-size: 2rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }
    </style>
</head>

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz() {
            activeQuizQuestions = [];
            currentQuestionIndex = 0;
            categoryScores = {};
            userAnswersLog = [];

            for (const category in itemDatabase) {
                categoryScores[category] = { correct: 0, total: 10 };
                let shuffledCategoryQuestions = shuffleArray([...itemDatabase[category]]);
                let selectedQuestions = shuffledCategoryQuestions.slice(0, 10).map(q => {
                    return {
                        ...q,
                        category: category,
                        o: shuffleArray([...q.o])
                    };
                });
                activeQuizQuestions = activeQuizQuestions.concat(selectedQuestions);
            }

            shuffleArray(activeQuizQuestions);
            totalQuestionsCount = activeQuizQuestions.length;

            showScreen('quiz-screen');
            loadQuestion();
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function loadQuestion() {
            if (currentQuestionIndex >= totalQuestionsCount) {
                showResults();
                return;
            }

            const currentQuestion = activeQuizQuestions[currentQuestionIndex];
            
            document.getElementById('question-number').innerText = `Vraag ${currentQuestionIndex + 1} / ${totalQuestionsCount}`;
            document.getElementById('category-name').innerText = currentQuestion.category;
            const progressPercent = (currentQuestionIndex / totalQuestionsCount) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            document.getElementById('question-text').innerText = currentQuestion.q;
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            currentQuestion.o.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => checkAnswer(option, currentQuestion);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOption, questionObj) {
            const isCorrect = selectedOption.toLowerCase() === questionObj.a.toLowerCase();
            
            if (isCorrect) {
                categoryScores[questionObj.category].correct++;
            }

            userAnswersLog.push({
                q: questionObj.q,
                category: questionObj.category,
                userAnswer: selectedOption,
                correctAnswer: questionObj.a,
                isCorrect: isCorrect
            });

            currentQuestionIndex++;
            loadQuestion();
        }

                let reviewHTML = '';

                categoryLog.forEach(item => {
                    reviewHTML += `
                        <div class="review-item">
                            <div class="review-q"><strong>Vraag:</strong> ${item.q}</div>
                            <div class="review-a">
                                ${item.isCorrect 
                                    ? `<span class="text-correct">✓ Goed ingevuld: ${item.userAnswer}</span>` 
                                    : `<span class="text-wrong">✗ Jouw antwoord: ${item.userAnswer}</span><br><span class="text-correct">→ Correcte antwoord: ${item.correctAnswer}</span>`
                                }
                            </div>
                        </div>
                    `;
                });

                const card = document.createElement('div');
                card.className = 'result-card';
                card.setAttribute('onclick', 'toggleCard(this)');
                card.innerHTML = `
                    <div>
                        <h3>${category}</h3>
                        <p>${score} van de ${total} goed</p>
                        <div class="result-score-bar">
                            <div class="result-score-fill ${statusClass}" style="width: ${percentage}%"></div>
                        </div>
                        <div class="status-text" style="color: ${score >= 8 ? 'var(--neon-green)' : score >= 6 ? 'orange' : 'var(--neon-pink)'}">${statusText}</div>
                    </div>
                    <div class="review-details">
                        ${reviewHTML}
                    </div>
                `;
                resultsList.appendChild(card);
            }

            document.getElementById('total-score-text').innerText = `${totalCorrect} / ${totalQuestionsCount} correct`;
        }

        function resetQuiz() {
            showScreen('start-screen');
        }
    </script>
</body>
</html>
