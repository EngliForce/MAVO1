<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACK JE FAALANGST - Startpagina</title>
    <style>
        :root {
            --primary-color: #6B9080;
            --bg-color: #F6FFF8;
            --card-bg: #FFFFFF;
            --text-color: #333333;
            --button-hover: #A4C3B2;
            --accent-color: #CCE3DE;
            --page-badge-bg: #EAF4F4; /* Deze variabele heb ik voor je toegevoegd voor de labels! */
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 94vw;
            max-width: 1100px;
            padding: 20px;
            text-align: center;
        }
        header {
            margin-bottom: 30px;
        }
        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--primary-color);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: clamp(1.2rem, 2vw, 1.8rem);
            color: #555;
            margin-top: 5px;
            font-style: italic;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .session-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px 15px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 3px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .session-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            background-color: var(--accent-color);
        }
        .session-number {
            font-size: 1rem;
            font-weight: bold;
            color: var(--primary-color);
            background: var(--page-badge-bg);
            padding: 4px 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .session-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--text-color);
        }
        .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        footer {
            margin-top: 40px;
            font-size: 1rem;
            color: #888;
        }
        /* Voor schermen met 3 tegels naast elkaar */
        @media (min-width: 900px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>HACK JE FAALANGST</h1>
        <div class="subtitle">van stress naar relax</div>
    </header>

    <div class="grid">
        <a href="https://engliforce.github.io/MAVO1/hjf_introductie.html" class="session-card">
            <div class="icon">🎬</div>
            <div class="session-number">Introductie</div>
            <div class="session-title">Welkom</div>
        </a>

        <a href="https://engliforce.github.io/MAVO1/hjf_bijeenkomst_1.html" class="session-card">
            <div class="icon">👋</div>
            <div class="session-number">Bijeenkomst 1</div>
            <div class="session-title">Kennismaken</div>
        </a>
        <a href="https://engliforce.github.io/MAVO1/hjf_bijeenkomst_2.html" class="session-card">
            <div class="icon">🌬️</div>
            <div class="session-number">Bijeenkomst 2</div>
            <div class="session-title">Gedachten</div>
        </a>
        <a href="https://engliforce.github.io/MAVO1/hjf_bijeenkomst_3.html" class="session-card">
            <div class="icon">📊</div>
            <div class="session-number">Bijeenkomst 3</div>
            <div class="session-title">Gevoel</div>
        </a>
        <a href="https://engliforce.github.io/MAVO1/hjf_bijeenkomst_4.html" class="session-card">
            <div class="icon">🧘</div>
            <div class="session-number">Bijeenkomst 4</div>
            <div class="session-title">Gedrag</div>
        </a>
        <a href="https://engliforce.github.io/MAVO1/hjf_bijeenkomst_5.html" class="session-card">
            <div class="icon">🌟</div>
            <div class="session-number">Bijeenkomst 5</div>
            <div class="session-title">Kwaliteiten</div>
        </a>
        <a href="https://engliforce.github.io/MAVO1/hjf_bijeenkomst_6.html" class="session-card">
            <div class="icon">🚀</div>
            <div class="session-number">Bijeenkomst 6</div>
            <div class="session-title">Mindset</div>
        </a>
    </div>

    <footer>
        &copy; 2026 - Hack je Faalangst: van stress naar relax
    </footer>
</div>
</body>
</html>
