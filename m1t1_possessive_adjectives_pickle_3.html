        ghostsActive = false;
        prepTimeLeft = 10;

        document.getElementById('lvl-title').innerText = `Round ${currentRound} of ${totalRounds}`;
        
        currentTask = roundQuestions[currentRound - 1];

        let clonedAnswers = JSON.parse(JSON.stringify(currentTask.answers));
        shuffleArr(clonedAnswers);
        shuffledAnswers = clonedAnswers;

        player = { x: 1, y: 1 };
        
        ghosts = [
            { x: 13, y: 9, lastX: -1, lastY: -1, strategy: 'hunter' },
            { x: 13, y: 1, lastX: -1, lastY: -1, strategy: 'roamer' },
            { x: 1, y: 9,  lastX: -1, lastY: -1, strategy: 'ambusher' }
        ];

        let fixedSpots = [
            {x: 13, y: 1}, // Top-Right
            {x: 1,  y: 9}, // Bottom-Left
            {x: 13, y: 9}  // Bottom-Right
        ];

        const letters = ['A', 'B', 'C'];
        targets = shuffledAnswers.map((ans, idx) => {
            let spot = fixedSpots[idx];
            return { 
                x: spot.x, 
                y: spot.y, 
                letter: letters[idx], 
                correct: ans.correct 
            };
        });

        let optionsHtml = '';
        shuffledAnswers.forEach((ans, idx) => {
            optionsHtml += `
                <div class="option-item">
                    <div class="option-badge">${letters[idx]}</div>
                    <div>${ans.text}</div>
                </div>
            `;
        });

        let html = `
            <div class="maze-hud">
                <span>🎯 SCORE: ${score}/${totalRounds}</span>
                <span id="prep-timer-badge" style="color: #ffb703;">⏳ Ghosts come in: 10s</span>
                <span>ROUND: ${currentRound}/${totalRounds}</span>
            </div>
            <div class="q-display">${currentTask.q}</div>
            
            <div class="game-board-layout">
                <div class="options-panel">
                    <div class="options-title">💡 Options</div>
                    ${optionsHtml}
                </div>
                <div>
                    <canvas id="mazeCanvas" width="360" height="264"></canvas>
                </div>
            </div>
            <div class="controls-hint">⌨️ Arrow keys/WASD to move | Press ENTER on a circle</div>
        `;
        document.getElementById('game-content').innerHTML = html;
        document.getElementById('feedback-area').innerHTML = "";

        canvas = document.getElementById('mazeCanvas');
        ctx = canvas.getContext('2d');
        mazeActive = true;

        window.onkeydown = function(e) {
            if (!mazeActive) return;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { movePlayer(0, -1); e.preventDefault(); }
            else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { movePlayer(0, 1); e.preventDefault(); }
            else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { movePlayer(-1, 0); e.preventDefault(); }
            else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { movePlayer(1, 0); e.preventDefault(); }
            else if (e.key === 'Enter') { checkActivation(); e.preventDefault(); }
        };

        prepTimer = setInterval(() => {
            prepTimeLeft--;
            let timerEl = document.getElementById('prep-timer-badge');
            if (timerEl) {
                if (prepTimeLeft > 0) {
                    timerEl.innerText = `⏳ Ghosts come in: ${prepTimeLeft}s`;
                } else {
                    timerEl.innerText = `👻 Ghosts are active!`;
                    timerEl.style.color = '#e74c3c';
                }
            }

            if (prepTimeLeft <= 0) {
                clearInterval(prepTimer);
                ghostsActive = true;
                gameInterval = setInterval(updateGhosts, 500);
            }
        }, 1000);

        drawMaze();
    }

    function shuffleArr(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function movePlayer(dx, dy) {
        if (!mazeActive) return;
        let nx = player.x + dx;
        let ny = player.y + dy;
        if (fixedMaze[ny] && fixedMaze[ny][nx] === 0) {
            player.x = nx;
            player.y = ny;
            if (ghostsActive) {
                checkGhostCollisionsOnly();
            }
            drawMaze();
        }
    }

    function updateGhosts() {
        if (!mazeActive || !ghostsActive) return;

        ghosts.forEach((ghost) => {
            let dirs = [{x:0, y:-1}, {x:0, y:1}, {x:-1, y:0}, {x:1, y:0}];
            let validMoves = [];

            dirs.forEach(d => {
                let mx = ghost.x + d.x;
                let my = ghost.y + d.y;
                if (fixedMaze[my] && fixedMaze[my][mx] === 0) {
                    validMoves.push({x: mx, y: my});
                }
            });

            if (validMoves.length === 0) return;

            let nonBacktrackMoves = validMoves.filter(m => !(m.x === ghost.lastX && m.y === ghost.lastY));
            let chosenMoves = nonBacktrackMoves.length > 0 ? nonBacktrackMoves : validMoves;

            let targetMove;

            if (ghost.strategy === 'hunter') {
                chosenMoves.sort((a, b) => {
                    let distA = Math.hypot(player.x - a.x, player.y - a.y);
                    let distB = Math.hypot(player.x - b.x, player.y - b.y);
                    return distA - distB;
                });
                targetMove = chosenMoves[0];
            } else if (ghost.strategy === 'ambusher') {
                chosenMoves.sort((a, b) => {
                    let distA = Math.hypot((player.x + 2) - a.x, (player.y + 2) - a.y);
                    let distB = Math.hypot((player.x + 2) - b.x, (player.y + 2) - b.y);
                    return distA - distB;
                });
                targetMove = Math.random() < 0.7 ? chosenMoves[0] : chosenMoves[Math.floor(Math.random() * chosenMoves.length)];
            } else {
                targetMove = chosenMoves[Math.floor(Math.random() * chosenMoves.length)];
            }

            ghost.lastX = ghost.x;
            ghost.lastY = ghost.y;
            ghost.x = targetMove.x;
            ghost.y = targetMove.y;
        });

        checkGhostCollisionsOnly();
        drawMaze();
    }

    function checkActivation() {
        if (!mazeActive) return;
        targets.forEach((t) => {
            if (t.x === player.x && t.y === player.y) {
                mazeActive = false;
                clearInterval(gameInterval);
                clearInterval(prepTimer);
                if (t.correct) {
                    score++;
                    currentRound++;
                    if (currentRound > totalRounds) {
                        showFinalWin();
                    } else {
                        document.getElementById('feedback-area').innerHTML = `<span style="color:#2ecc71; font-size:1.2rem; font-family:'Oswald';">✨ CORRECT! NEXT ROUND...</span>`;
                        setTimeout(startMazeRound, 1000);
                    }
                } else {
                    document.getElementById('feedback-area').innerHTML = `<span style="color:#e74c3c; font-size:1.2rem; font-family:'Oswald';">❌ WRONG ANSWER! Try again.</span>`;
                    setTimeout(startMazeRound, 1200);
                }
            }
        });
    }

    function checkGhostCollisionsOnly() {
        ghosts.forEach(ghost => {
            if (ghost.x === player.x && ghost.y === player.y) {
                mazeActive = false;
                clearInterval(gameInterval);
                clearInterval(prepTimer);
                document.getElementById('feedback-area').innerHTML = `<span style="color:#e74c3c; font-size:1.2rem; font-family:'Oswald';">👻 CAUGHT BY A GHOST! Try again.</span>`;
                setTimeout(startMazeRound, 1200);
            }
        });
    }

    function drawMaze() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let cellW = canvas.width / 15;
        let cellH = canvas.height / 11;

        for (let r = 0; r < fixedMaze.length; r++) {
            for (let c = 0; c < fixedMaze[r].length; c++) {
                if (fixedMaze[r][c] === 1) {
                    ctx.fillStyle = '#1e293b';
                    ctx.fillRect(c * cellW, r * cellH, cellW, cellH);
                    ctx.strokeStyle = '#334155';
                    ctx.strokeRect(c * cellW, r * cellH, cellW, cellH);
                } else {
                    ctx.fillStyle = '#0f172a';
                    ctx.fillRect(c * cellW, r * cellH, cellW, cellH);
                }
            }
        }

        targets.forEach(t => {
            let cx = t.x * cellW + cellW / 2;
            let cy = t.y * cellH + cellH / 2;
            ctx.fillStyle = '#ffb703';
            ctx.beginPath();
            ctx.arc(cx, cy, cellW * 0.43, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = '#000';
            ctx.font = 'bold 13px Oswald';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(t.letter, cx, cy);
        });

        let px = player.x * cellW + cellW / 2;
        let py = player.y * cellH + cellH / 2;
        ctx.fillStyle = '#2ecc71';
        ctx.beginPath();
        ctx.arc(px, py, cellW * 0.42, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '13px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('😃', px, py);

        if (ghostsActive) {
            ghosts.forEach(ghost => {
                let gx = ghost.x * cellW + cellW / 2;
                let gy = ghost.y * cellH + cellH / 2;
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(gx, gy, cellW * 0.42, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillText('👻', gx, gy);
            });
        }
    }
    
    function showFinalWin() {        
        document.getElementById('lvl-title').innerText = "QUEST COMPLETE";        
        document.getElementById('game-content').innerHTML = `
            <div class="big-win">🌟 AMAZING JOB! 🌟</div>
            <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1000&q=80" class="final-img" alt="Library">
            <p style="margin: 5px 0 15px 0;">You successfully conquered the maze and mastered Have and Have Got!</p>
            <button class="btn-action" onclick="currentRound=0; score=0; init();">Play Again</button>
        `;        
        confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });    }
    
    init();
</script>
