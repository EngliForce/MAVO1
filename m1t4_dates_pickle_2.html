<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Builder: British & American Dates</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        body { font-family: 'Fredoka One', cursive; background: #e0f2fe; overflow: hidden; height: 100vh; }
        
        .block-anim {
            animation: dropBlock 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes dropBlock {
            0% { transform: translateY(-500px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .brick {
            width: 380px;
            height: 38px;
            background: #f87171;
            border: 2px solid #b91c1c;
            border-radius: 6px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            box-shadow: 0 3px 0 #991b1b;
            padding: 0 10px;
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            60% { transform: translateX(8px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const DAYS = ["zondag", "maandag", "dinsdag", "woensdag", "donderdag", "vrijdag", "zaterdag"];
        const MONTHS = ["januari", "februari", "maart", "april", "mei", "juni", "juli", "augustus", "september", "oktober", "november", "december"];
        
        const DAYS_EN = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const MONTHS_EN = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        const getOrdinal = (n) => {
            const s = ["th", "st", "nd", "rd"];
            const v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        };

        const numberToWords = (n) => {
            const words = {
                1: "first", 2: "second", 3: "third", 4: "fourth", 5: "fifth", 6: "sixth", 7: "seventh", 8: "eighth", 9: "ninth", 10: "tenth",
                11: "eleventh", 12: "twelfth", 13: "thirteenth", 14: "fourteenth", 15: "fifteenth", 16: "sixteenth", 17: "seventeenth", 18: "eighteenth", 19: "nineteenth", 20: "twentieth",
                21: "twenty-first", 22: "twenty-second", 23: "twenty-third", 24: "twenty-fourth", 25: "twenty-fifth", 26: "twenty-sixth", 27: "twenty-seventh", 28: "twenty-eighth", 29: "twenty-ninth", 30: "thirtieth", 31: "thirty-first"
            };
            return words[n];
        };

        const generateRandomTask = () => {
            const dayIdx = Math.floor(Math.random() * 7);
            const monthIdx = Math.floor(Math.random() * 12);
            const date = Math.floor(Math.random() * 31) + 1;
            
            // Simpele correctie voor maanden met 30 dagen of februari
            let finalDate = date;
            if (monthIdx === 1 && date > 28) finalDate = 28;
            if ([3, 5, 8, 10].includes(monthIdx) && date > 30) finalDate = 30;

            const dayNL = DAYS[dayIdx];
            const monthNL = MONTHS[monthIdx];
            const dayEN = DAYS_EN[dayIdx];
            const monthEN = MONTHS_EN[monthIdx];
            const dateWord = numberToWords(finalDate);

            return {
                q: `${dayNL} ${finalDate} ${monthNL}`,
                br: `${dayEN} the ${dateWord} of ${monthEN}`,
                us: `${dayEN}, ${monthEN} ${dateWord}`
            };
        };

        const App = () => {
            const [blocks, setBlocks] = useState([]);
            const [currentTask, setCurrentTask] = useState(generateRandomTask());
            const [input, setInput] = useState("");
            const [phase, setPhase] = useState('START');
            const [isShaking, setIsShaking] = useState(false);
            const [lastError, setLastError] = useState("");

            const checkAnswer = (e) => {
                e.preventDefault();
                const userVal = input.trim();
                
                if (userVal === currentTask.br || userVal === currentTask.us) {
                    setBlocks([...blocks, { id: Date.now(), text: input }]);
                    setLastError("");
                    if (blocks.length + 1 >= 15) {
                        setPhase('WIN');
                    } else {
                        setCurrentTask(generateRandomTask());
                        setInput("");
                    }
                } else {
                    setIsShaking(true);
                    setLastError(`Fout! Let op de komma bij US en 'the/of' bij UK.`);
                    setBlocks(prev => prev.slice(0, -1));
                    setTimeout(() => setIsShaking(false), 500);
                    setInput("");
                }
            };

            return (
                <div className="h-screen w-full flex bg-sky-100 overflow-hidden relative">
                    <div className="w-1/2 flex flex-col items-center justify-end pb-10 border-r-4 border-white/30 bg-gradient-to-t from-green-200 to-sky-100">
                        <div className={`flex flex-col-reverse items-center ${isShaking ? 'shake' : ''}`}>
                            <div className="w-96 h-10 bg-green-700 rounded-t-xl border-b-4 border-green-900 flex items-center justify-center text-white text-xs">FOUNDATION</div>
                            {blocks.map((block) => (
                                <div key={block.id} className="brick block-anim">{block.text}</div>
                            ))}
                        </div>
                    </div>

                    <div className="w-1/2 flex flex-col items-center justify-center p-8 bg-white/40">
                        <div className="text-center mb-6">
                            <h1 className="text-4xl text-blue-900">Date Architect</h1>
                            <p className="text-xs text-red-600 font-bold uppercase mt-2 tracking-widest">⚠️ UK: No Comma • US: With Comma</p>
                        </div>

                        {phase === 'START' && (
                            <button onClick={() => setPhase('PLAY')} className="px-12 py-6 bg-blue-600 text-white text-3xl rounded-2xl shadow-xl hover:bg-blue-700">START</button>
                        )}

                        {phase === 'PLAY' && (
                            <div className="w-full max-w-xl bg-white p-8 rounded-[2rem] shadow-2xl border-4 border-blue-200">
                                <div className="text-center mb-6">
                                    <h2 className="text-3xl text-gray-800 lowercase first-letter:uppercase">{currentTask.q}</h2>
                                </div>
                                <form onSubmit={checkAnswer}>
                                    <input 
                                        autoFocus
                                        className="w-full p-4 text-lg border-2 border-gray-100 rounded-xl outline-none focus:border-red-400 text-center mb-2"
                                        placeholder="Typ de Engelse datum..."
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                    />
                                    {lastError && <p className="text-red-500 text-[10px] text-center mb-4 font-bold leading-tight">{lastError}</p>}
                                    <div className="bg-slate-50 p-4 rounded-xl text-[11px] text-slate-600 border border-slate-200 grid grid-cols-2 gap-4">
                                        <div>
                                            <p className="font-bold border-b border-slate-200 mb-1">British (UK):</p>
                                            <p>Day the [date] of [Month]</p>
                                        </div>
                                        <div>
                                            <p className="font-bold border-b border-slate-200 mb-1">American (US):</p>
                                            <p>Day, [Month] [date]</p>
                                        </div>
                                    </div>
                                </form>
                                <div className="mt-6 text-center text-blue-900 font-bold">HOOGTE: {blocks.length} / 15</div>
                            </div>
                        )}

                        {phase === 'WIN' && (
                            <div className="text-center bg-white p-10 rounded-[2rem] shadow-2xl border-4 border-yellow-400">
                                <h2 className="text-5xl text-yellow-500">EXPERT BUILDER! 🌍</h2>
                                <p className="text-xl text-blue-800 mt-4 italic">You mastered all 365 days.</p>
                                <button onClick={() => window.location.reload()} className="mt-8 px-10 py-4 bg-blue-600 text-white rounded-full text-xl hover:bg-blue-700">Opnieuw</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
